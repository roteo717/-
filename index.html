<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>日常点検システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red:      #C8292A;
  --red-dk:   #A82020;
  --red-lt:   #FFF1F1;
  --green:    #16A34A;
  --green-lt: #F0FDF4;
  --orange:   #D97706;
  --orange-lt:#FFFBEB;
  --bg:       #FFFFFF;
  --surface:  #FFFFFF;
  --surface2: #F8F9FC;
  --border:   #E4E8EF;
  --text:     #111827;
  --text2:    #6B7280;
  --text3:    #9CA3AF;
  --navy:     #1E3A8A;
  --r-sm:     10px;
  --r:        16px;
  --r-lg:     20px;
  --shadow:   0 1px 3px rgba(0,0,0,0.05), 0 4px 14px rgba(0,0,0,0.06);
  --shadow-md:0 4px 24px rgba(0,0,0,0.10);
  /* Inspector light theme */
  --insp-bg:    #F8F9FC;
  --insp-card:  #FFFFFF;
  --insp-card2: #F1F3F8;
  --insp-border:#E4E8EF;
  --insp-text:  #111827;
  --insp-text2: #6B7280;
  --insp-red:   #C8292A;
  --insp-green: #16A34A;
  --insp-orange:#D97706;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:'Noto Sans JP',-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;color:var(--text);}
#app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);}
.screen{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── Header ── */
.phdr{
  background:#FFFFFF;
  border-bottom:1px solid var(--border);
  padding:calc(env(safe-area-inset-top,0px) + 16px) 20px 18px;
  display:flex;align-items:flex-end;gap:14px;
  flex-shrink:0;overflow:hidden;position:relative;z-index:10;
}
.phdr::before{content:'';position:absolute;left:0;bottom:0;width:100%;height:2px;background:linear-gradient(90deg,var(--red) 0%,var(--red-dk) 40%,transparent 100%);pointer-events:none;}
.hdr-back-btn{
  width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;z-index:1;
  transition:transform .12s,background .15s;touch-action:manipulation;
}
.hdr-back-btn:active{transform:scale(.90);background:var(--border);}
.hdr-center{flex:1;position:relative;z-index:1;min-width:0;}
.hdr-eyebrow{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.5px;margin-bottom:3px;}
.hdr-title{font-size:21px;font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1.1;}
.hdr-action-btn{
  display:flex;align-items:center;gap:6px;
  background:var(--surface2);border:1px solid var(--border);border-radius:22px;
  padding:8px 16px;height:36px;color:var(--text2);font-size:13px;font-weight:600;
  cursor:pointer;flex-shrink:0;white-space:nowrap;position:relative;z-index:1;
  transition:transform .12s,background .15s,color .15s;touch-action:manipulation;font-family:inherit;
}
.hdr-action-btn:active{transform:scale(.94);background:var(--border);}
.home-hero{
  background:#FFFFFF;
  border-bottom:1px solid var(--border);
  padding:calc(env(safe-area-inset-top,0px) + 20px) 20px 24px;
  flex-shrink:0;position:relative;overflow:hidden;
}
.home-hero::after{content:'';position:absolute;left:0;bottom:0;width:100%;height:2px;background:linear-gradient(90deg,var(--red) 0%,var(--red-dk) 40%,transparent 100%);}

/* ── Scroll ── */
.scroll{overflow-y:auto;overflow-x:hidden;flex:1;padding:16px 16px calc(env(safe-area-inset-bottom,0px) + 90px);-webkit-overflow-scrolling:touch;background:var(--surface2);}

/* ── Cards ── */
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:10px;border:1px solid var(--border);}
.card-tap{cursor:pointer;transition:transform .12s,opacity .12s;}
.card-tap:active{transform:scale(.98);opacity:.85;}
.section-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin:18px 0 8px 2px;}
.section-label:first-child{margin-top:0;}

/* ── Inspection Cards ── */
.icard{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;margin-bottom:10px;border:1.5px solid var(--border);transition:border-color .2s,background .2s;user-select:none;}
.icard.rok{border-color:var(--green);background:var(--green-lt);}
.icard.rng{border-color:var(--red);background:var(--red-lt);}

/* ── Judge Buttons ── */
.jbtn{flex:1;height:52px;border-radius:14px;border:1.5px solid;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;touch-action:manipulation;transition:transform .1s,background .12s,box-shadow .12s;}
.jbtn:active{transform:scale(.94);}
.jok{background:var(--green-lt);color:var(--green);border-color:var(--green);}
.jok:active{background:var(--green);color:white;box-shadow:0 4px 18px rgba(22,163,74,0.3);}
.jng{background:var(--red-lt);color:var(--red);border-color:var(--red);}
.jng:active{background:var(--red);color:white;box-shadow:0 4px 18px rgba(200,41,42,0.3);}
@media(min-width:769px){
  .jok:hover{background:var(--green);color:white;}
  .jng:hover{background:var(--red);color:white;}
}

/* ── Badges ── */
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;letter-spacing:.2px;}
.bOk{background:var(--green-lt);color:var(--green);}
.bNg{background:var(--red-lt);color:var(--red);}
.bWarn{background:var(--orange-lt);color:var(--orange);}
.bGray{background:var(--surface2);color:var(--text3);}

/* ── Bottom Tabs ── */
.btabs{display:flex;border-top:1px solid var(--border);padding:8px 0 calc(env(safe-area-inset-bottom,0px) + 8px);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;z-index:20;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);background:rgba(255,255,255,0.96);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 2px;border:none;background:none;font-size:10px;font-weight:600;color:var(--text3);touch-action:manipulation;font-family:inherit;transition:color .15s;}
.tab.active{color:var(--red);}

/* ── Progress ── */
.prog-wrap{background:var(--surface2);border-radius:6px;height:6px;overflow:hidden;}
.prog-fill{height:100%;border-radius:6px;transition:width .4s cubic-bezier(.4,0,.2,1);}

/* ── Pill Selector ── */
.pill-row{display:flex;gap:4px;background:var(--surface2);border-radius:12px;padding:3px;border:1px solid var(--border);}
.pill{flex:1;padding:7px 4px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text2);touch-action:manipulation;transition:all .15s;font-family:inherit;}
.pill.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.10);border:1px solid var(--border);}
/* ── Inspection-type pill row (home screen) ── */
.itype-row{display:flex;gap:6px;padding:3px;}
.itype-pill{flex:1;padding:10px 6px 9px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;touch-action:manipulation;font-family:inherit;text-align:center;transition:background .15s,border-color .15s,transform .1s;}
.itype-pill:active{transform:scale(.96);}
.itype-pill .itp-label{font-size:13px;font-weight:700;color:var(--text2);display:block;line-height:1;}
.itype-pill .itp-sub{font-size:10px;font-weight:500;color:var(--text3);display:block;margin-top:4px;line-height:1.2;}
.itype-pill.active{background:var(--red);border-color:var(--red);box-shadow:0 4px 16px rgba(200,41,42,0.24);}
.itype-pill.active .itp-label{color:white;}
.itype-pill.active .itp-sub{color:rgba(255,255,255,0.78);}

/* ── Bulk Bar ── */
.bulk-bar{background:linear-gradient(90deg,rgba(200,41,42,.05),transparent);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(200,41,42,.12);}

/* ── Overlay / Sheet ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:50;display:flex;align-items:flex-end;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surface);border-radius:28px 28px 0 0;padding:26px 20px calc(env(safe-area-inset-bottom,0px) + 26px);width:100%;max-height:88vh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.34,1.2,.64,1);box-shadow:0 -12px 60px rgba(0,0,0,0.12),0 0 0 1px var(--border);}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 22px;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ── Form ── */
.finput{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:15px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s;}
.finput:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(30,58,138,0.08);}
.flabel{font-size:13px;color:var(--text2);display:block;margin-bottom:6px;font-weight:500;}

/* ── Toast ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:24px;font-size:13px;font-weight:600;color:white;z-index:99;white-space:nowrap;pointer-events:none;animation:fadeUp .25s ease;font-family:inherit;box-shadow:0 8px 32px rgba(0,0,0,0.22);letter-spacing:.2px;}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* ── Utility ── */
.icon-circle{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.empty-state{text-align:center;padding:48px 20px;color:var(--text2);}
.btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,#C8292A,#A82020);color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(200,41,42,0.28);transition:transform .12s,box-shadow .12s;touch-action:manipulation;font-family:inherit;letter-spacing:.2px;}
.btn-primary:active{transform:scale(.97);}
.btn-ghost{width:100%;padding:13px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;cursor:pointer;color:var(--text2);font-weight:500;transition:transform .12s,background .15s;touch-action:manipulation;font-family:inherit;}
.btn-ghost:active{transform:scale(.97);}
@keyframes cardIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card,.icard{animation:cardIn .2s ease both;}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.10);border-radius:2px;}
@media(min-width:769px){
  #app{max-width:900px;}
  .btabs{max-width:900px;}
  .hdr-action-btn:hover{background:var(--surface2);color:var(--text);}
}

/* ── Calendar Grid ── */
.cal-screen{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;}
.cal-month{font-size:17px;font-weight:700;letter-spacing:-.3px;}
.cal-nav-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;transition:background .12s;flex-shrink:0;}
.cal-nav-btn:active{background:rgba(0,0,0,.15);}
.cal-filter-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;touch-action:manipulation;font-family:inherit;white-space:nowrap;}
.cal-unreported{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;background:var(--red-lt);color:var(--red);font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;border:none;font-family:inherit;touch-action:manipulation;}
.cal-body{display:flex;flex:1;overflow:hidden;}
.cal-left{flex-shrink:0;width:90px;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;}
.cal-right{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;flex-direction:column;-webkit-overflow-scrolling:touch;}
.cal-left-hdr{height:44px;flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border);}
.cal-right-hdr{display:flex;height:44px;flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border);}
.cal-day-col{min-width:80px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:0.5px solid var(--border);padding:4px 2px;}
.cal-day-col.today{background:rgba(200,41,42,.06);}
.cal-day-num{font-size:15px;font-weight:700;line-height:1;color:var(--text);}
.cal-day-col.today .cal-day-num{color:var(--red);}
.cal-day-wd{font-size:9px;font-weight:600;color:var(--text2);margin-top:2px;letter-spacing:.3px;}
.cal-day-col.today .cal-day-wd{color:var(--red);}
.cal-day-col.sun .cal-day-num,.cal-day-col.sun .cal-day-wd{color:#1D4ED8;}
.cal-day-col.sat .cal-day-num,.cal-day-col.sat .cal-day-wd{color:#C62828;}
.cal-scroll-body{display:flex;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.cal-left-body{width:90px;flex-shrink:0;overflow:hidden;border-right:1px solid var(--border);}
.cal-right-body{flex:1;overflow:hidden;}
.cal-group-hdr{display:flex;align-items:center;background:#1E293B;color:white;font-size:11px;font-weight:700;padding:5px 8px;letter-spacing:.2px;}
.cal-group-hdr.line{background:#F1F3F8;color:var(--text2);font-size:10px;font-weight:600;padding:4px 8px;}
.cal-eq-left{display:flex;align-items:center;padding:0 6px 0 8px;border-bottom:0.5px solid var(--border);min-height:52px;}
.cal-eq-right-row{display:flex;border-bottom:0.5px solid var(--border);min-height:52px;}
.cal-eq-name-txt{font-size:11px;font-weight:600;color:var(--text);line-height:1.3;word-break:break-all;}
.cal-cell{min-width:80px;flex-shrink:0;border-right:0.5px solid var(--border);padding:4px;display:flex;flex-direction:column;gap:3px;justify-content:center;align-items:flex-start;}
.cal-cell.today-col{background:rgba(200,41,42,.04);}
.cal-badge{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:600;padding:3px 7px;border-radius:20px;white-space:nowrap;max-width:72px;overflow:hidden;text-overflow:ellipsis;}
.cal-badge.ok{background:#EFF6FF;color:#1D4ED8;}
.cal-badge.ng{background:var(--red-lt);color:var(--red);}
.cal-badge.partial{background:var(--orange-lt);color:var(--orange);}
.cal-badge.done-daily{background:#E8F5E9;color:#16A34A;}
.cal-more{font-size:9px;font-weight:700;color:var(--text2);padding:2px 5px;background:rgba(0,0,0,.07);border-radius:10px;align-self:flex-start;}

</style>
</head>

/* ─── 定期点検スケジュール計算 ─── */
// 休日（土日）の場合は前の平日に移動
function toPrevWeekday(d){
  const x=new Date(d);
  while(x.getDay()===0||x.getDay()===6)x.setDate(x.getDate()-1);
  return x;
}
function toDateStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

// 今月の10日点検予定日（10日・20日・月末）を休日調整して返す
function get10DaySchedule(){
  const [y,m]=TODAY.split('-').map(Number);
  const lastDay=new Date(y,m,0).getDate();
  const raw=[10,20,lastDay];
  const seen=new Set();
  return raw.map(d=>{
    const adjusted=toPrevWeekday(new Date(y,m-1,d));
    const ds=toDateStr(adjusted);
    if(seen.has(ds))return null;
    seen.add(ds);
    return{scheduled:d,date:ds,day:adjusted.getDate()};
  }).filter(Boolean);
}

// 今月の月次点検予定日（月末 → 休日なら前平日）
function getMonthlySchedule(){
  const [y,m]=TODAY.split('-').map(Number);
  const lastDay=new Date(y,m,0).getDate();
  const adjusted=toPrevWeekday(new Date(y,m-1,lastDay));
  return{scheduled:lastDay,date:toDateStr(adjusted),day:adjusted.getDate()};
}

// 今日が定期点検日かチェック → 該当する点検種別の配列を返す
function getTodayScheduledTypes(){
  const alerts=[];
  const ten=get10DaySchedule();
  if(ten.some(s=>s.date===TODAY))alerts.push('10日点検');
  const monthly=getMonthlySchedule();
  if(monthly.date===TODAY)alerts.push('月次点検');
  return alerts;
}

// 次の定期点検日を返す（種別ごと）
function getNextScheduleLabel(type){
  const WDAYS=['日','月','火','水','木','金','土'];
  if(type==='10日点検'){
    const list=get10DaySchedule();
    const next=list.find(s=>s.date>=TODAY)||list[0];
    const d=new Date(next.date);
    return`${d.getMonth()+1}月${d.getDate()}日(${WDAYS[d.getDay()]})`;
  }
  if(type==='月次点検'){
    const s=getMonthlySchedule();
    const d=new Date(s.date);
    return`${d.getMonth()+1}月${d.getDate()}日(${WDAYS[d.getDay()]})`;
  }
  return'';
}

/* ═══════════ PRINT HELPER ═══════════ */
function printHtml(html){
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  let fr=document.getElementById('_print_frame');
  if(!fr){fr=document.createElement('iframe');fr.id='_print_frame';fr.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;border:none;';document.body.appendChild(fr);}
  fr.onload=function(){
    try{fr.contentWindow.focus();fr.contentWindow.print();}catch(e){}
    setTimeout(()=>URL.revokeObjectURL(url),60000);
  };
  fr.src=url;
}

// 週間サマリーPDF（カレンダー画面から）
function exportHistoryWeekPDF(){
  const offset=S.histWeekOffset||0;
  const today=new Date();
  const dow=today.getDay();
  const startOfWeek=new Date(today);
  startOfWeek.setDate(today.getDate()-dow+(offset*7));
  const days=Array.from({length:7},(_,i)=>{const d=new Date(startOfWeek);d.setDate(d.getDate()+i);return d;});
  const toStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const dayStrs=days.map(toStr);
  const WDAYS=['日','月','火','水','木','金','土'];

  const fromLbl=`${days[0].getMonth()+1}月${days[0].getDate()}日(${WDAYS[days[0].getDay()]})`;
  const toLbl=`${days[6].getMonth()+1}月${days[6].getDate()}日(${WDAYS[days[6].getDay()]})`;
  const adminName=S.currentName||'管理者';
  const genDate=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});

  // Collect all inspection data for this week
  const rows=[];
  S.lines.forEach(line=>{
    line.equip.forEach(eq=>{
      dayStrs.forEach(ds=>{
        const dayDow=new Date(ds).getDay();
        const keys=Object.keys(S.insps).filter(k=>k.startsWith(eq.id+':')&&S.insps[k].date===ds);
        if(!keys.length)return;
        keys.forEach(key=>{
          const type=key.split(':')[1];
          if((dayDow===0||dayDow===6)&&(type==='10日点検'||type==='月次点検'))return;
          const insp=S.insps[key];
          const items=typeItems(eq,type);
          const rs=insp.results;
          const done=items.filter(i=>rs[i.id]).length;
          const ngItems=items.filter(i=>rs[i.id]?.r==='ng');
          const total=items.length;
          let status='完了',statusCls='ok';
          if(ngItems.length>0){status=`異常 ${ngItems.length}件`;statusCls='ng';}
          else if(done<total){status=`一部 ${done}/${total}`;statusCls='partial';}
          const d=new Date(ds);
          rows.push({
            date:`${d.getMonth()+1}/${d.getDate()}(${WDAYS[d.getDay()]})`,
            line:line.name,
            desc:line.desc,
            eq:eq.name,
            type,
            status,
            statusCls,
            ngDetail:ngItems.map(i=>`${i.n}：${rs[i.id]?.comment||'異常'}`).join('<br>')
          });
        });
      });
    });
  });

  // Collect anomalies for this week
  const weekAnoms=S.anomalies.filter(a=>dayStrs.includes(a.date));

  const statusBg={ok:'#e8f5e9',ng:'#ffebee',partial:'#fff3e0'};
  const statusColor={ok:'#2e7d32',ng:'#c62828',partial:'#e65100'};

  const tableRows=rows.length>0?rows.map(r=>`
    <tr>
      <td class="td-date">${r.date}</td>
      <td class="td-line">${r.line}<br><span class="sub">${r.desc}</span></td>
      <td class="td-eq">${r.eq}</td>
      <td class="td-type">${r.type}</td>
      <td class="td-status" style="background:${statusBg[r.statusCls]};color:${statusColor[r.statusCls]};font-weight:700;">${r.status}</td>
      <td class="td-detail">${r.ngDetail||'－'}</td>
    </tr>`).join(''):`<tr><td colspan="6" style="text-align:center;padding:16px;color:#888;">この週の点検記録はありません</td></tr>`;

  const anomRows=weekAnoms.length>0?weekAnoms.map(a=>{
    const eq=getEq(a.eid);const l=getLn(a.lid);
    const stMap={open:'未対応',['in-progress']:'対応中',resolved:'解決済'};
    const stBg={open:'#ffebee',['in-progress']:'#fff3e0',resolved:'#e8f5e9'};
    const stCol={open:'#c62828',['in-progress']:'#e65100',resolved:'#2e7d32'};
    const d=new Date(a.date);
    return`<tr>
      <td>${d.getMonth()+1}/${d.getDate()}(${WDAYS[d.getDay()]})</td>
      <td>${l?.name||'-'}<br><span class="sub">${eq?.name||'-'}</span></td>
      <td>${a.iname}</td>
      <td>${a.comment}</td>
      <td style="background:${stBg[a.status]};color:${stCol[a.status]};font-weight:700;">${stMap[a.status]||a.status}</td>
      <td>${a.by}</td>
    </tr>`;
  }).join(''):`<tr><td colspan="6" style="text-align:center;padding:12px;color:#888;">この週の異常記録はありません</td></tr>`;

  const html=`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">

function exportHistoryDayPDF(date){

    line.equip.forEach(eq=>{
      const keys=Object.keys(S.insps).filter(k=>k.startsWith(eq.id+':')&&S.insps[k].date===date);
      if(!keys.length){
        rows.push({line:line.name,desc:line.desc,eq:eq.name,type:'－',status:'未実施',statusCls:'pending',items:[]});
        return;
      }
      keys.forEach(key=>{
        const type=key.split(':')[1];

  const anomRows=dayAnoms.length>0?dayAnoms.map(a=>{

/* ═══════════ NAME SELECT ═══════════ */
function addName(){
  const input=document.getElementById('new-name-input');
  const val=input?.value?.trim();
  if(!val){toast('名前を入力してください','warn');return;}
  if(S.names[S.currentRole].includes(val)){toast('すでに登録されています','warn');return;}
  S.names[S.currentRole].push(val);
  toast(`「${val}」を追加しました`);
  render();
  // フォーカスを戻す
  setTimeout(()=>{const i=document.getElementById('new-name-input');if(i){i.value='';i.focus();}},50);
}
function delName(name){
  if(!confirm(`「${name}」を削除しますか？`))return;
  S.names[S.currentRole]=S.names[S.currentRole].filter(n=>n!==name);
  if(S.currentName===name)S.currentName=null;
  toast(`「${name}」を削除しました`,'warn');render();
}

function renderHome(){
  if(S.currentRole==='inspector')return renderInspectorHome();
  return renderAdminHome();
}

/* ─── Inspector: change inspector ─── */
function inspChangeUser(){
  localStorage.removeItem('dk_insp_name');
  localStorage.removeItem('dk_insp_lines');
  S.currentName=null;S.currentRole=null;
  S.inspSelectedLines=[];S.inspLastLines=[];
  nav('ROLE_SELECT');
}
/* ─── Inspector: toggle line ─── */
function inspToggleLine(lid){
  const i=S.inspSelectedLines.indexOf(lid);
  if(i>=0)S.inspSelectedLines.splice(i,1);
  else S.inspSelectedLines.push(lid);
  // update card UI without full re-render
  const card=document.getElementById('ilc-'+lid);
  if(card){
    const on=S.inspSelectedLines.includes(lid);
    card.classList.toggle('ilc-on',on);
  }
  inspUpdateStartBtn();
}
function inspUpdateStartBtn(){
  const n=S.inspSelectedLines.length;
  const btn=document.getElementById('insp-start-btn');
  const pill=document.getElementById('insp-sel-cnt');
  if(!btn)return;
  btn.disabled=n===0;
  if(n>0){pill.textContent=n+' ライン';pill.style.display='';}
  else pill.style.display='none';
}
function inspQuickStart(){
  S.inspSelectedLines=[...S.inspLastLines];
  inspDoStart();
}
function inspDoStart(){
  if(!S.inspSelectedLines.length)return;
  localStorage.setItem('dk_insp_lines',JSON.stringify(S.inspSelectedLines));
  S.inspLastLines=[...S.inspSelectedLines];
  nav('INSP_RUN');
}

/* ═══════════ LINE DETAIL ═══════════ */
function renderLineDetail(){
  const l=getLn(S.selectedLine);if(!l)return renderHome();
  const bulkBtn=`<button class="hdr-action-btn" onclick="S.bulkActive=true;S.bulkLineId='${l.id}';S.bulkIdx=0;nav('INSPECTION',{selectedEq:'${l.equip[0].id}'})">${PLAY_ICO} 一括</button>`;
  const rows=l.equip.map(eq=>{
    const st=eqStatus(eq.id);
    const items=typeItems(eq,S.inspType);
    const insp=getInsps(eq.id,S.inspType);
    const done=insp?items.filter(i=>insp.results[i.id]).length:0;
    const total=items.length;
    const pct=total>0?Math.round(done/total*100):0;
    const dotColor=st==='done'?'var(--green)':st==='ng'?'var(--red)':st==='partial'?'var(--orange)':'var(--border)';
    const barColor=st==='done'?'var(--green)':st==='ng'?'var(--red)':'var(--orange)';
    const lbl=st==='done'?'完了':st==='ng'?'異常あり':st==='partial'?`${done}/${total}`:'未実施';
    const lblCls=st==='done'?'bOk':st==='ng'?'bNg':st==='partial'?'bWarn':'bGray';
    return`<div class="card card-tap" onclick="nav('INSPECTION',{selectedEq:'${eq.id}'})" style="padding:14px 16px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:${total>0?'10px':'0'};">
        <div style="width:9px;height:9px;border-radius:50%;background:${dotColor};flex-shrink:0;${st==='partial'||st==='ng'?'box-shadow:0 0 0 3px '+dotColor+'22;':''}"></div>
        <div style="flex:1;min-width:0;">
          <span style="font-weight:700;font-size:15px;color:var(--text);">${eq.name}</span>
          <span style="font-size:12px;color:var(--text2);margin-left:6px;font-weight:500;">${l.name}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
          <span class="badge ${lblCls}">${lbl}</span>
          ${CHEVR}
        </div>
      </div>
      ${total>0?`<div style="margin-left:19px;">
        <div class="prog-wrap" style="background:rgba(0,0,0,0.06);">
          <div class="prog-fill" style="width:${pct}%;background:${barColor};"></div>
        </div>
      </div>`:''}
    </div>`;
  }).join('');
  return`${phdr(l.name,'HOME',S.inspType,bulkBtn)}
  <div class="scroll">
    ${rows}
    <button onclick="S.modal={type:'addEq',lid:'${l.id}'};render();" style="width:100%;padding:14px;border:1.5px dashed var(--border);background:none;border-radius:var(--r);color:var(--text2);cursor:pointer;font-size:14px;margin-top:4px;touch-action:manipulation;font-family:inherit;">＋ 設備を追加</button>
  </div>${btabs()}`;
}

/* ═══════════ INSPECTION ═══════════ */
function renderInspection(){
  const eq=getEq(S.selectedEq);if(!eq)return renderHome();
  const items=typeItems(eq,S.inspType);const insp=getInsps(S.selectedEq,S.inspType);const rs=insp?.results||{};
  const done=items.filter(i=>rs[i.id]).length;const pend=items.length-done;const pct=Math.round(done/items.length*100);
  const bulkBar=S.bulkActive?`<div class="bulk-bar">
    <div><div style="font-size:11px;color:var(--red);font-weight:700;margin-bottom:1px;">ライン一括点検</div><div style="font-size:12px;color:var(--text2);">${getLn(S.bulkLineId).name}</div></div>
    <div style="font-size:22px;font-weight:700;color:var(--red);">${S.bulkIdx+1} <span style="font-size:13px;font-weight:500;color:var(--text2);">/ ${getLn(S.bulkLineId).equip.length}</span></div>
  </div>`:'';
  const backDest=S.bulkActive?null:'LINE_DETAIL';
  const icards=items.map((it,idx)=>{
    const r=rs[it.id];const isOk=r?.r==='ok';const isNg=r?.r==='ng';
    const btns=!r
      ?`<div style="display:flex;gap:10px;margin-top:14px;">
          <button class="jbtn jng" onclick="setResult('${it.id}','ng')">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
            異常

            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="2.2"/></svg>
            正常
          </button>
        </div>`

          <button onclick="resetResult('${it.id}')" style="padding:5px 14px;border:1px solid var(--border);border-radius:20px;background:none;color:var(--text2);font-size:12px;cursor:pointer;touch-action:manipulation;font-family:inherit;">やり直し</button>
        </div>`;
    return`<div class="icard ${isOk?'rok':isNg?'rng':''}" data-iid="${it.id}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
        <div style="flex:1;">
          <div style="font-size:11px;color:var(--text3);font-weight:500;margin-bottom:4px;">No.${idx+1} · ${it.t}点検</div>
          <div style="font-size:16px;font-weight:600;line-height:1.3;">${it.n}</div>
          ${r?.comment?`<div style="font-size:12px;color:var(--red);margin-top:8px;padding:8px 10px;background:rgba(200,41,42,.08);border-radius:8px;"><span style="color:var(--red);vertical-align:middle;display:inline-flex;align-items:center;gap:4px;"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M3.5 4.5h7M3.5 7h5M3.5 9.5h3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></span> ${r.comment}</div>`:''}

/* ═══════════ HISTORY ═══════════ */
function renderHistory(){
  if(S.histView==='detail'&&S.histDate)return renderHistoryDetail(S.histDate);
  S.histView='list';return renderHistoryList();
}

function getHistoryDates(){
  // 今日を含む過去30日間 + inspsにある日付をすべてマージして降順で返す
  const ds=new Set();
  Object.values(S.insps).forEach(insp=>ds.add(insp.date));
  for(let i=0;i<30;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    ds.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  }
  return Array.from(ds).sort((a,b)=>b.localeCompare(a));
}

function getDateSummary(date){
  const eqMap={};
  Object.entries(S.insps).forEach(([key,insp])=>{
    if(insp.date!==date)return;
    const [eid,type]=key.split(':');
    const eq=getEq(eid);if(!eq)return;
    const items=typeItems(eq,type);const rs=insp.results;
    if(!eqMap[eid])eqMap[eid]={ok:0,ng:0,filled:0,total:0};
    eqMap[eid].ok+=items.filter(i=>rs[i.id]?.r==='ok').length;
    eqMap[eid].ng+=items.filter(i=>rs[i.id]?.r==='ng').length;
    eqMap[eid].filled+=items.filter(i=>rs[i.id]).length;
    eqMap[eid].total+=items.length;
  });
  const totalEq=S.lines.reduce((s,l)=>s+l.equip.length,0);
  const inspected=Object.keys(eqMap).length;
  const ngEq=Object.values(eqMap).filter(e=>e.ng>0).length;
  const doneEq=Object.values(eqMap).filter(e=>e.ng===0&&e.filled===e.total&&e.total>0).length;
  let status='未入力';
  if(inspected>0){
    if(ngEq>0)status='異常';
    else if(doneEq===totalEq)status='完了';
    else status='一部';
  }
  return{status,inspected,ngEq,doneEq,totalEq};
}

function getEqStatusForDate(eid,date){
  const keys=Object.keys(S.insps).filter(k=>k.startsWith(eid+':')&&S.insps[k].date===date);
  if(!keys.length)return'pending';
  let hasNg=false,filled=0,total=0;
  keys.forEach(key=>{
    const eq=getEq(eid);const type=key.split(':')[1];
    const items=eq?typeItems(eq,type):[];const rs=S.insps[key].results;
    total+=items.length;filled+=items.filter(i=>rs[i.id]).length;
    if(items.some(i=>rs[i.id]?.r==='ng'))hasNg=true;
  });
  if(hasNg)return'ng';
  if(filled===total&&total>0)return'done';
  if(filled>0)return'partial';
  return'pending';
}

function changeDate(offset){
  const dates=getHistoryDates();
  const ni=dates.indexOf(S.histDate)+offset;
  if(ni>=0&&ni<dates.length){S.histDate=dates[ni];render();}
}

function renderHistoryList(){
  const now=new Date();
  S.histYear=S.histYear||now.getFullYear();
  S.histMonth=S.histMonth||now.getMonth()+1;
  if(!S.histFilter)S.histFilter='all';
  if(S.histSearch===undefined)S.histSearch='';
  if(S.histExpandedEq===undefined)S.histExpandedEq=null;
  const nowY=now.getFullYear(),nowM=now.getMonth()+1;
  if(S.histYear>nowY||(S.histYear===nowY&&S.histMonth>nowM)||nowY-S.histYear>2){S.histYear=nowY;S.histMonth=nowM;}
  const histYear=S.histYear,histMonth=S.histMonth;
  const monthStr=`${histYear}-${String(histMonth).padStart(2,'0')}`;
  const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const WDAYS=['日','月','火','水','木','金','土'];


  const daysInMonth=new Date(histYear,histMonth,0).getDate();
  const visibleLines=(S.currentRole==='inspector'&&S.inspSelectedLines&&S.inspSelectedLines.length>0)
    ?S.lines.filter(l=>S.inspSelectedLines.includes(l.id)):S.lines;

  // Per-equipment month data
  const allEqData=[];
  visibleLines.forEach(line=>{
    line.equip.forEach(eq=>{
      const dailyItems=eq.items.filter(i=>i.t==='毎日');
      const cells={};
      let totalExpected=0,totalDone=0,totalNg=0,missedDays=0;
      for(let d=1;d<=daysInMonth;d++){
        const ds=`${monthStr}-${String(d).padStart(2,'0')}`;
        const dow=new Date(ds).getDay();
        const isFuture=new Date(ds)>now;
        const isWknd=dow===0||dow===6;
        if(!isWknd&&!isFuture)totalExpected++;
        const key=eq.id+':毎日点検';
        const insp=S.insps[key];
        if(insp&&insp.date===ds){
          const rs=insp.results||{};
          const done=dailyItems.filter(i=>rs[i.id]).length;
          const hasNg=dailyItems.some(i=>rs[i.id]?.r==='ng');
          cells[ds]={done,total:dailyItems.length,hasNg,filled:done===dailyItems.length&&dailyItems.length>0};
          if(!isWknd){totalDone++;if(hasNg)totalNg++;}
        } else {
          cells[ds]={done:0,total:dailyItems.length,hasNg:false,filled:false,missing:!isFuture&&!isWknd};
          if(!isFuture&&!isWknd)missedDays++;
        }
      }
      Object.keys(S.insps).filter(k=>k.startsWith(eq.id+':')&&S.insps[k].date&&S.insps[k].date.startsWith(monthStr)).forEach(k=>{
        const ds=S.insps[k].date;
        if(!cells[ds]){const rs=S.insps[k].results||{};const done=dailyItems.filter(i=>rs[i.id]).length;const hasNg=dailyItems.some(i=>rs[i.id]?.r==='ng');cells[ds]={done,total:dailyItems.length,hasNg,filled:done===dailyItems.length&&dailyItems.length>0};}
      });
      const rate=totalExpected>0?Math.round(totalDone/totalExpected*100):0;
      allEqData.push({eq,line,cells,rate,totalExpected,totalDone,totalNg,missedDays,dailyItems});
    });
  });

  const sumOk=allEqData.filter(e=>e.totalNg===0&&e.missedDays===0&&e.totalDone>0).length;
  const sumNg=allEqData.filter(e=>e.totalNg>0).length;
  const sumMissed=allEqData.filter(e=>e.missedDays>0).length;

  let prevY=histYear,prevM=histMonth-1;if(prevM<=0){prevM=12;prevY--;}
  let nextY=histYear,nextM=histMonth+1;if(nextM>12){nextM=1;nextY++;}
  const isLatest=(histYear===nowY&&histMonth===nowM);

  let filtered=allEqData;
  if(S.histFilter==='missing')filtered=filtered.filter(e=>e.missedDays>0||e.totalNg>0);
  if(S.histSearch)filtered=filtered.filter(e=>e.eq.name.includes(S.histSearch)||e.line.name.includes(S.histSearch));

  function calendarRow(eqData){
    const {eq,cells}=eqData;
    const firstDow=new Date(`${monthStr}-01`).getDay(); // 0=Sun
    // Build grid cells: blank starters + day cells
    const gridCells=[];
    // blank cells for days before month starts (Mon-based: shift so Mon=0)
    const startOffset=(firstDow+6)%7; // Mon=0,...,Sun=6
    for(let i=0;i<startOffset;i++) gridCells.push({blank:true});
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${monthStr}-${String(d).padStart(2,'0')}`;
      const dow=new Date(ds).getDay();
      const c=cells[ds];
      const isToday=ds===TODAY;
      const isFuture=new Date(ds)>now;
      const isWknd=dow===0||dow===6;
      let sym='',bg='transparent',color='#D1D5DB',border='transparent',textColor='#C0C8D8';
      if(isFuture){sym='';bg='transparent';color='#E5E7EB';}
      else if(isWknd&&!c?.filled){sym='—';color='#D1D5DB';}
      else if(c?.hasNg){sym='×';bg='#FFF1F1';color='#C8292A';border='rgba(200,41,42,0.3)';}
      else if(c?.filled){sym='○';bg='#F0FDF4';color='#16A34A';border='rgba(22,163,74,0.2)';}
      else if(c?.done>0){sym='△';bg='#FFFBEB';color='#D97706';border='rgba(217,119,6,0.2)';}
      else if(c?.missing){sym='×';bg='#FFF1F1';color='#C8292A';border='rgba(200,41,42,0.2)';}
      const clickable=(!isFuture&&(c?.filled||c?.done>0));
      gridCells.push({d,ds,sym,bg,color,border,isToday,isWknd,isFuture,clickable,dow});
    }
    // pad to complete last row
    while(gridCells.length%7!==0) gridCells.push({blank:true});

    const WDAYS=['月','火','水','木','金','土','日'];
    const wdayHdr=WDAYS.map((w,i)=>`<div style="text-align:center;font-size:9px;font-weight:700;color:${i===5?'#2563EB':i===6?'#C8292A':'#9CA3AF'};padding-bottom:4px;">${w}</div>`).join('');

    const rows=[];
    for(let i=0;i<gridCells.length;i+=7){
      const week=gridCells.slice(i,i+7);
      const cells7=week.map(c=>{
        if(c.blank) return`<div></div>`;
        const isSat=c.dow===6,isSun=c.dow===0;
        const dayCol=c.isToday?'#2563EB':isSat?'#2563EB':isSun?'#C8292A':'#6B7280';
        return`<div ${c.clickable?`onclick="S.histView='detail';S.histDate='${c.ds}';S.histEqId='${eq.id}';render();"`:''} style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 2px;border-radius:7px;background:${c.bg};border:1px solid ${c.border};cursor:${c.clickable?'pointer':'default'};${c.isToday?'box-shadow:0 0 0 2px #2563EB;':''}min-height:34px;" ${c.clickable?`onmousedown="this.style.opacity='.7'" onmouseup="this.style.opacity='1'" onmouseleave="this.style.opacity='1'"`:''}>
          <div style="font-size:9px;font-weight:600;color:${c.isFuture?'#D1D5DB':dayCol};line-height:1;">${c.d}</div>
          <div style="font-size:11px;font-weight:700;color:${c.color};line-height:1.2;">${c.sym}</div>
        </div>`;
      }).join('');
      rows.push(`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;width:100%;">${cells7}</div>`);
    }

    return`<div style="padding:10px 12px 14px;background:#FAFAFA;border-top:1px solid #F1F3F8;width:100%;box-sizing:border-box;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <span style="font-size:10px;font-weight:600;color:#9CA3AF;">日別：</span>
        <span style="font-size:10px;color:#16A34A;font-weight:700;">○ 正常</span>
        <span style="font-size:10px;color:#D97706;font-weight:700;">△ 一部</span>
        <span style="font-size:10px;color:#C8292A;font-weight:700;">× NG/未実施</span>
      </div>
      <div style="width:100%;box-sizing:border-box;">
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;width:100%;">${wdayHdr}</div>
        <div style="display:flex;flex-direction:column;gap:3px;width:100%;">${rows.join('')}</div>
      </div>
    </div>`;
  }

  const eqCards=filtered.length>0?filtered.map(eqData=>{
    const {eq,line,rate,totalExpected,totalDone,missedDays,totalNg}=eqData;
    const isExpanded=S.histExpandedEq===eq.id;
    const hasIssue=missedDays>0||totalNg>0;
    const allGood=rate===100&&totalNg===0&&totalExpected>0;
    const barColor=totalNg>0?'#C8292A':rate<50?'#D97706':'#16A34A';
    return`<div style="background:white;border-radius:18px;border:1.5px solid ${totalNg>0?'rgba(200,41,42,0.25)':hasIssue?'rgba(217,119,6,0.2)':'#F1F3F8'};box-shadow:${totalNg>0?'0 2px 12px rgba(200,41,42,0.07)':'0 1px 6px rgba(0,0,0,0.04)'};overflow:hidden;min-width:0;max-width:100%;box-sizing:border-box;">
      <div onclick="S.histExpandedEq=${isExpanded?'null':`'${eq.id}'`};render();" style="padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;" onmousedown="this.parentElement.style.background='#FAFAFA'" onmouseup="this.parentElement.style.background='white'" onmouseleave="this.parentElement.style.background='white'">
        <div style="width:10px;height:10px;border-radius:50%;flex-shrink:0;background:${totalNg>0?'#C8292A':hasIssue?'#D97706':'#16A34A'};box-shadow:0 0 0 3px ${totalNg>0?'rgba(200,41,42,0.15)':hasIssue?'rgba(217,119,6,0.15)':'rgba(22,163,74,0.15)'};"></div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:7px;">
            <div style="font-size:15px;font-weight:700;color:#111827;">${eq.name}</div>
            <div style="font-size:11px;color:#9CA3AF;">${line.name}</div>
          </div>
          <div style="background:#F1F3F8;border-radius:4px;height:5px;overflow:hidden;margin-bottom:6px;">
            <div style="height:100%;width:${rate}%;background:${barColor};border-radius:4px;"></div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">

function renderHistoryDetail(date){
  const dates=getHistoryDates();
  const idx=dates.indexOf(date);
  const hasPrev=idx<dates.length-1,hasNext=idx>0;
  const d=new Date(date);const dw=['日','月','火','水','木','金','土'];
  const dl=`${d.getMonth()+1}月${d.getDate()}日(${dw[d.getDay()]})`;

  /* status icon helpers */
  const ico=(st)=>({
    done:`<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="var(--green)" stroke-width="1.8"/><path d="M6 10l3 3 5-5" stroke="var(--green)" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    ng:`<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="var(--red)" stroke-width="1.8"/><path d="M7 7l6 6M13 7l-6 6" stroke="var(--red)" stroke-width="1.9" stroke-linecap="round"/></svg>`,
    partial:`<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="var(--orange)" stroke-width="1.8"/><path d="M10 6v5M10 13v1" stroke="var(--orange)" stroke-width="1.9" stroke-linecap="round"/></svg>`,
    pending:`<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="var(--text3)" stroke-width="1.8"/><path d="M10 6v4l2.5 2.5" stroke="var(--text3)" stroke-width="1.8" stroke-linecap="round"/></svg>`,
  }[st]);
  const stLbl={done:'完了',ng:'異常',partial:'一部',pending:'未実施'};
  const stBg={done:'var(--green-lt)',ng:'var(--red-lt)',partial:'var(--orange-lt)',pending:'rgba(0,0,0,.05)'};
  const stCol={done:'var(--green)',ng:'var(--red)',partial:'var(--orange)',pending:'var(--text3)'};

  const lineBlocks=S.lines.map(l=>{
    const eqList=S.histEqId?l.equip.filter(eq=>eq.id===S.histEqId):l.equip;
    if(!eqList.length)return'';
    const eqRows=eqList.map(eq=>{
      const st=getEqStatusForDate(eq.id,date);
      const ngItems=[];
      Object.keys(S.insps).filter(k=>k.startsWith(eq.id+':')&&S.insps[k].date===date).forEach(key=>{
        const type=key.split(':')[1];
        typeItems(eq,type).filter(i=>S.insps[key].results[i.id]?.r==='ng').forEach(i=>ngItems.push(i.n));
      });
      return`<div style="display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:0.5px solid var(--border);">
        <div style="flex:1;min-width:0;">
          <div style="font-size:14px;font-weight:600;">${eq.name}</div>
          ${ngItems.length>0?`<div style="font-size:11px;color:var(--red);margin-top:2px;">${ngItems.join(' / ')}</div>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
          <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:${stBg[st]};color:${stCol[st]};">${stLbl[st]}</span>
          ${ico(st)}
        </div>
      </div>`;
    }).join('');
    return`<div class="card" style="margin-bottom:10px;padding:14px 16px;">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;padding-bottom:8px;border-bottom:1.5px solid var(--border);">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2.5" stroke="var(--text2)" stroke-width="1.4"/><path d="M4 7h6M4 10h4" stroke="var(--text2)" stroke-width="1.3" stroke-linecap="round"/></svg>
        <span style="font-size:12px;font-weight:700;color:var(--text2);">${l.name}</span>
        <span style="font-size:11px;color:var(--text3);">${l.desc}</span>
      </div>
      ${eqRows}
    </div>`;
  }).join('');

  /* date nav buttons */
  const navBtns=`<div style="display:flex;gap:6px;flex-shrink:0;">
    <button onclick="changeDate(1)" style="width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,${hasPrev?.2:.07});color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;opacity:${hasPrev?1:.4};" ${hasPrev?'':'disabled'}>
      <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M6 1L1 7l5 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button onclick="changeDate(-1)" style="width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,${hasNext?.2:.07});color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;opacity:${hasNext?1:.4};" ${hasNext?'':'disabled'}>
      <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M2 1l5 6-5 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>`;

  /* custom header with back → list */
  const histEq=S.histEqId?S.lines.flatMap(l=>l.equip).find(e=>e.id===S.histEqId):null;
  const hdr=`<div class="phdr">
    <button class="hdr-back-btn" onclick="S.histView='list';S.histEqId=null;render();">${BACK_ICO}</button>
    <div class="hdr-center" style="display:flex;flex-direction:column;align-items:flex-start;gap:1px;min-width:0;">
      <div class="hdr-eyebrow" style="margin:0;white-space:nowrap;">${histEq?histEq.name:'点検状況'}</div>
      <div class="hdr-title" style="font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${dl}</div>
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0;">
      ${S.currentRole==='admin'?`<button onclick="openEqPdfModal()" class="hdr-action-btn" style="padding:8px 10px;">${PDF_ICO} 月次</button>`:''}
      ${navBtns}
    </div>
  </div>`;

  return`${hdr}<div class="scroll">${lineBlocks}</div>${btabs()}`;
}

/* ═══════════ ANOMALY ═══════════ */
function renderAnomaly(){
  const open=S.anomalies.filter(a=>a.status==='open');const ip=S.anomalies.filter(a=>a.status==='in-progress');const res=S.anomalies.filter(a=>a.status==='resolved');
  const acard=a=>{
    const eq=getEq(a.eid);const l=getLn(a.lid);
    const isOpen=a.status==='open';const isIp=a.status==='in-progress';
    const col=isOpen?'#F97316':isIp?'#FFB020':'#34C759';
    const lbl=isOpen?'未対応':isIp?'対応中':'解決済';
    return`<div style="background:#FFFFFF;border:1px solid ${isOpen?'rgba(249,115,22,0.3)':isIp?'rgba(255,176,32,0.2)':'rgba(0,0,0,0.07)'};border-radius:16px;padding:16px;margin-bottom:10px;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px;">
        <div style="flex:1;min-width:0;">
          <div style="display:inline-block;background:${isOpen?'rgba(249,115,22,0.18)':isIp?'rgba(255,176,32,0.14)':'rgba(52,199,89,0.12)'};color:${col};font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:8px;">${lbl}</div>
          <div style="font-weight:700;font-size:16px;color:#111111;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${a.iname}</div>
          <div style="font-size:12px;color:#777777;">${eq?.name||'-'} · ${l?.name||'-'} · ${a.date}</div>
        </div>
      </div>
      <div style="font-size:13px;padding:10px 12px;background:#F0F1F5;border-radius:10px;color:#7A8090;margin-bottom:${a.status!=='resolved'?'12px':'0'};line-height:1.5;">${a.comment}</div>
      ${isOpen?`<button onclick="anomStatus('${a.id}','in-progress')" style="width:100%;padding:12px;background:rgba(249,115,22,0.15);border:1.5px solid rgba(249,115,22,0.35);border-radius:12px;color:#F97316;font-size:14px;font-weight:700;cursor:pointer;touch-action:manipulation;font-family:inherit;transition:transform .1s,background .12s;" onmousedown="this.style.transform='scale(.97)';this.style.background='rgba(249,115,22,0.28)'" onmouseup="this.style.transform='';this.style.background='rgba(249,115,22,0.15)'">対応開始</button>`:''}
      ${isIp?`<button onclick="anomStatus('${a.id}','resolved')" style="width:100%;padding:12px;background:rgba(52,199,89,0.15);border:1.5px solid rgba(52,199,89,0.35);border-radius:12px;color:#34C759;font-size:14px;font-weight:700;cursor:pointer;touch-action:manipulation;font-family:inherit;transition:transform .1s,background .12s;" onmousedown="this.style.transform='scale(.97)';this.style.background='rgba(52,199,89,0.28)'" onmouseup="this.style.transform='';this.style.background='rgba(52,199,89,0.15)'"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" style="display:inline-block;vertical-align:middle;margin-right:4px;"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>解決済にする</button>`:''}
    </div>`;
  };
  const totalActive=open.length+ip.length;
  return`<div style="display:flex;flex-direction:column;height:100vh;background:#F8F9FC;overflow:hidden;">
    <div style="background:#F7F7F9;padding:calc(env(safe-area-inset-top,0px) + 20px) 20px 18px;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:12px;">
        <button onclick="nav('HOME')" style="width:36px;height:36px;border-radius:50%;background:#FFFFFF;border:1px solid rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;flex-shrink:0;">${BACK_ICO}</button>
        <div style="flex:1;">
          <div style="font-size:11px;color:#888888;font-weight:600;letter-spacing:.8px;margin-bottom:2px;">異常管理</div>
          <div style="font-size:20px;font-weight:800;color:#111827;letter-spacing:-.4px;">未対応 <span style="color:#F97316;">${totalActive}</span>件</div>
        </div>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:0 16px calc(env(safe-area-inset-bottom,0px) + 88px);-webkit-overflow-scrolling:touch;">
      ${totalActive===0?`<div style="text-align:center;padding:60px 20px;"><div style="width:56px;height:56px;background:rgba(52,199,89,0.12);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;"><svg width="26" height="26" viewBox="0 0 26 26" fill="none"><circle cx="13" cy="13" r="10" stroke="#34C759" stroke-width="2"/><path d="M8 13l3.5 3.5 6.5-6.5" stroke="#34C759" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div style="font-size:16px;font-weight:700;color:#111111;margin-bottom:5px;">異常はありません</div></div>`:``}
      ${open.length>0?`<div style="font-size:11px;font-weight:700;color:#F97316;letter-spacing:.8px;margin:4px 2px 10px;">未対応 (${open.length})</div>${open.map(acard).join('')}`:''}
      ${ip.length>0?`<div style="font-size:11px;font-weight:700;color:#FFB020;letter-spacing:.8px;margin:${open.length?'18':'4'}px 2px 10px;">対応中 (${ip.length})</div>${ip.map(acard).join('')}`:''}
      ${res.length>0?`<div style="font-size:11px;font-weight:700;color:#999999;letter-spacing:.8px;margin:${totalActive?'18':'4'}px 2px 10px;">解決済 (${res.length})</div>${res.map(acard).join('')}`:''}
    </div>
  </div>${btabs()}`;
}

/* ── LINE_EQ_MGMT action helpers ── */
function leDelLine(lid){
  const l=getLn(lid);
  if(!confirm(`このラインを削除すると設備も全て削除されます。\n「${l.name}」を削除しますか？`))return;
  S.lines.splice(S.lines.indexOf(l),1);
  toast('ラインを削除しました');
}
function leDelEq(eid){
  const eq=getEq(eid);
  if(!confirm(`「${eq.name}」を削除しますか？`))return;
  for(const l of S.lines){const i=l.equip.findIndex(e=>e.id===eid);if(i!==-1){l.equip.splice(i,1);break;}}
  toast('設備を削除しました');
}
function addEqFullConfirm(lid){
  const n=document.getElementById('meqf-n')?.value?.trim();
  if(!n){toast('設備名を入力してください','warn');return;}
  const k=document.getElementById('meqf-k')?.value?.trim()||'';
  const customId=document.getElementById('meqf-id')?.value?.trim();
  const newId=customId||'E'+Date.now();
  getLn(lid).equip.push({id:newId,name:n,kind:k,eid:newId,lid,items:[{id:'I'+Date.now()+'a',n:'外観確認',t:'毎日'},{id:'I'+Date.now()+'b',n:'動作確認',t:'毎日'}]});
  S.modal=null;toast(`「${n}」を追加しました`);render();
}
function editEqConfirm(eid){
  const n=document.getElementById('meqe-n')?.value?.trim();
  if(!n){toast('設備名を入力してください','warn');return;}
  const k=document.getElementById('meqe-k')?.value?.trim()||'';
  const eq=getEq(eid);
  if(eq){eq.name=n;eq.kind=k;}
  S.modal=null;toast('設備を更新しました');render();
}
function editLineConfirm(lid){
  const n=document.getElementById('mle-n')?.value?.trim();
  if(!n){toast('ライン名を入力してください','warn');return;}
  const d=document.getElementById('mle-d')?.value?.trim()||'';
  const r=document.getElementById('mle-r')?.value?.trim()||'';
  const l=getLn(lid);
  if(l){l.name=n;l.desc=d;if(r)l.note=r;}
  S.modal=null;toast('ラインを更新しました');render();
}

function openEqPdfModal(){
  // Default: all equipment selected
  const allEids=S.lines.flatMap(l=>l.equip.map(e=>e.id));
  S.eqPdfModal={on:true,year:new Date().getFullYear(),month:new Date().getMonth()+1,eids:allEids};
  render();
}
function toggleEqPdfEid(eid){
  const m=S.eqPdfModal;
  m.eids=m.eids.includes(eid)?m.eids.filter(x=>x!==eid):[...m.eids,eid];
  render();
}
function toggleEqPdfLine(lid){
  const m=S.eqPdfModal;

  m.eids=allOn?m.eids.filter(id=>!lineEids.includes(id)):[...new Set([...m.eids,...lineEids])];
  render();
}

function exportEqMonthlyPDF(year, month, eids){
  const daysInMonth=new Date(year,month,0).getDate();
  const days=Array.from({length:daysInMonth},(_,i)=>i+1);
  const adminName=S.currentName||'管理者';
  const WDAYS=['日','月','火','水','木','金','土'];

  function ds(d){return`${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
  function getDow(d){return new Date(ds(d)).getDay();}
  function isWeekend(d){const dw=getDow(d);return dw===0||dw===6;}

  function getResult(eid,iid,inspType,day){
    const key=eid+':'+inspType;
    const insp=S.insps[key];
    if(!insp||insp.date!==ds(day))return'';
    return insp.results?.[iid]?.r||'';
  }
  function getComment(eid,iid,inspType,day){
    const key=eid+':'+inspType;
    const insp=S.insps[key];
    if(!insp||insp.date!==ds(day))return'';
    return insp.results?.[iid]?.comment||'';
  }

  // Build one page per equipment
  const pages=eids.map(eid=>{
    const eq=getEq(eid);
    if(!eq)return'';
    const line=getLn(eq.lid);
    const dailyItems=eq.items.filter(i=>i.t==='毎日');
    const tenItems=eq.items.filter(i=>i.t==='10日');
    const monthItems=eq.items.filter(i=>i.t==='月次');

    // Day header row — highlight weekends
    const dayHdrs=days.map(d=>{
      const dw=getDow(d);
      const sun=dw===0,sat=dw===6;
      const bg=sun?'#e3f0ff':sat?'#ffeaea':'#e8e8e8';
      const col=sun?'#1565C0':sat?'#C62828':'#333';
      return`<th class="day-th" style="background:${bg};color:${col};">${d}</th>`;
    }).join('');

    // Anomaly notes for this equipment this month
    const eqAnoms=S.anomalies.filter(a=>{
      if(a.eid!==eid)return false;
      const[ay,am]=a.date.split('-');
      return parseInt(ay)===year&&parseInt(am)===month;
    });
    const anomSection=eqAnoms.length>0?`
    <div class="anom-section">
      <div class="anom-title">▼ 異常記録</div>
      <table class="anom-table">
        <thead><tr><th>日付</th><th>点検項目</th><th>内容</th><th>対応状況</th><th>発見者</th></tr></thead>
        <tbody>
          ${eqAnoms.map(a=>{
            const stMap={open:'未対応',['in-progress']:'対応中',resolved:'解決済'};
            const stCol={open:'#c62828',['in-progress']:'#e65100',resolved:'#2e7d32'};
            const dd=new Date(a.date);
            return`<tr>
              <td>${dd.getMonth()+1}/${dd.getDate()}(${WDAYS[dd.getDay()]})</td>
              <td>${a.iname}</td>
              <td style="color:#c62828;">${a.comment}</td>
              <td style="color:${stCol[a.status]};font-weight:700;">${stMap[a.status]||a.status}</td>
              <td>${a.by}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`:'';

    function buildSection(items,label,inspType){
      if(!items.length)return'';
      const rows=items.map((it,idx)=>{
        const cells=days.map(d=>{
          const r=getResult(eid,it.id,inspType,d);
          const sym=r==='ok'?'○':r==='ng'?'×':'';
          const wknd=isWeekend(d);
          return`<td class="day-td${r==='ng'?' ng-cell':''}" style="${wknd?'background:#f9f9f9;':''}">${sym}</td>`;
        }).join('');
        const groupTd=idx===0?`<td class="group-td" rowspan="${items.length}">${label}</td>`:'';
        return`<tr>${groupTd}<td class="no-td">${idx+1}</td><td class="item-td">${it.n}</td>${cells}<td class="sig-td"></td><td class="sig-td"></td></tr>`;
      }).join('');
      const noteText={毎日点検:'毎日点検：機械使用前に実施',['10日点検']:'10日点検：10日ごとに1回実施',月次点検:'月次点検：月1回実施'}[inspType]||'';
      return`<tr class="section-note"><td colspan="${daysInMonth+5}">${noteText}</td></tr>${rows}`;
    }

    return`
    <div class="eq-page">
      <!-- Page header -->
      <div class="page-header">
        <div class="page-header-left">
          <div class="page-title">日常点検表</div>
          <div class="page-sub">${line.name}（${line.desc}）　▶　<strong>${eq.name}</strong></div>
        </div>
        <div class="page-header-right">
          <div>${year}年&nbsp;&nbsp;${month}月</div>
          <div>確認者：<strong>${adminName}</strong>（管理者）</div>
          <div>点検項目数：${eq.items.length}件</div>
        </div>
      </div>

      <!-- Main table -->
      <table>
        <thead>
          <tr class="hdr-row">
            <th class="group-td">区分</th>
            <th class="no-td">No</th>
            <th class="item-td">点　検　項　目</th>
            ${dayHdrs}
            <th class="sig-th">点検者</th>
            <th class="sig-th">確認者</th>
          </tr>
        </thead>
        <tbody>
          ${buildSection(dailyItems,'日\n常',  '毎日点検')}
          ${buildSection(tenItems,  '10\n日',  '10日点検')}
          ${buildSection(monthItems,'月\n次',  '月次点検')}
          ${!dailyItems.length&&!tenItems.length&&!monthItems.length?
            `<tr><td colspan="${daysInMonth+5}" style="text-align:center;padding:14px;color:#aaa;">点検項目が登録されていません</td></tr>`:''}
        </tbody>
      </table>

      <!-- Legend -->
      <div class="legend">
        <strong>記入例：</strong>
        <span>正常：<strong>○</strong></span>
        <span>異常：<strong style="color:#c62828;">×</strong></span>
        <span class="sun-leg">日曜</span>
        <span class="sat-leg">土曜</span>
        <span>異常発生時は異常記録欄に詳細を記入すること</span>
      </div>

      ${anomSection}
    </div>`;
  }).join('');

  const html=`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<title>設備別点検表 ${year}年${month}月</title>
<style>
@page{size:A3 landscape;margin:7mm;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;font-size:9px;background:white;color:#000;}
.eq-page{page-break-after:always;}
.eq-page:last-child{page-break-after:avoid;}
.page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px;padding-bottom:5px;border-bottom:2px solid #111;}
.page-title{font-size:15px;font-weight:800;margin-bottom:2px;}
.page-sub{font-size:9px;color:#444;}
.page-header-right{text-align:right;font-size:8px;color:#555;line-height:1.8;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
th,td{border:0.5px solid #777;padding:1px 2px;text-align:center;vertical-align:middle;}
.hdr-row th{background:#333;color:white;font-size:7.5px;font-weight:700;padding:3px 2px;}
.group-td{width:14px;font-size:7px;writing-mode:vertical-rl;text-orientation:upright;background:#555;color:white;font-weight:800;white-space:pre-line;line-height:1.3;}
.no-td{width:16px;font-size:8px;}
.item-td{width:130px;text-align:left;padding:2px 4px;font-size:8px;line-height:1.3;}
.day-th{width:${Math.max(10,Math.floor(650/daysInMonth))}px;font-size:7px;padding:1px;}
.day-td{font-size:9px;padding:1px;height:18px;}
.sig-th{width:28px;font-size:7px;background:#aaa;}
.sig-td{width:28px;height:18px;}
.ng-cell{background:#ffebee;color:#c62828;font-weight:800;}
.section-note td{background:#f5f5f5;text-align:left;padding:2px 6px;font-size:7.5px;color:#555;border-top:1px solid #999;font-style:italic;}
.legend{margin-top:4px;font-size:7.5px;display:flex;gap:14px;align-items:center;padding:3px 6px;border:0.5px solid #ccc;background:#fafafa;}
.sun-leg{color:#1565C0;font-weight:700;}
.sat-leg{color:#C62828;font-weight:700;}
.anom-section{margin-top:8px;}
.anom-title{font-size:9px;font-weight:800;background:#c62828;color:white;padding:3px 8px;}
.anom-table{width:100%;border-collapse:collapse;margin-top:0;}
.anom-table th{background:#444;color:white;font-size:8px;padding:3px 6px;text-align:left;border:0.5px solid #333;}
.anom-table td{font-size:8.5px;padding:3px 6px;border:0.5px solid #ddd;}
@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
</style></head><body>
${pages}
<script>window.onload=function(){window.print();}<\/script>
</body></html>`;

  printHtml(html);
}

/* ═══════════ INSP RUN (multi-line inspection) ═══════════ */
function renderInspRun(){
  const inspName=S.currentName||'点検者';
  // Gather all items across selected lines (only 毎日点検 items)
  const selLines=S.lines.filter(l=>S.inspSelectedLines.includes(l.id));
  const results=S.inspRunResults||{};
  let totalItems=0,doneItems=0;

  const lineGroupsHtml=selLines.map(line=>{
    const eqHtml=line.equip.map(eq=>{
      const items=eq.items.filter(i=>i.t==='毎日');
      totalItems+=items.length;
      const done=items.filter(i=>results[eq.id+'_'+i.id]).length;
      doneItems+=done;
      const allDone=done===items.length&&items.length>0;
      const itemsHtml=items.map(item=>{
        const key=eq.id+'_'+item.id;
        const ok=results[key]==='ok',ng=results[key]==='ng';
        return`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);" id="ir-${key}">
          <div style="flex:1;font-size:13px;color:#444444;font-weight:500;line-height:1.4;">${item.n}</div>
          <div style="display:flex;gap:8px;flex-shrink:0;">
            <button onclick="inspSetRes('${eq.id}','${item.id}','ok')" style="height:40px;min-width:52px;padding:0 14px;border-radius:10px;border:1.5px solid;font-size:18px;font-weight:700;cursor:pointer;touch-action:manipulation;font-family:inherit;transition:transform .1s,background .12s,box-shadow .12s;${ok?'background:#22C55E;color:white;border-color:#22C55E;box-shadow:0 4px 16px rgba(34,197,94,0.35);':'background:white;color:#22C55E;border-color:rgba(34,197,94,0.5);'}" id="ibtn-ok-${key}">○</button>
            <button onclick="inspSetRes('${eq.id}','${item.id}','ng')" style="height:40px;min-width:52px;padding:0 14px;border-radius:10px;border:1.5px solid;font-size:18px;font-weight:700;cursor:pointer;touch-action:manipulation;font-family:inherit;transition:transform .1s,background .12s,box-shadow .12s;${ng?'background:#C8292A;color:white;border-color:#C8292A;box-shadow:0 4px 16px rgba(200,41,42,0.35);':'background:white;color:#C8292A;border-color:rgba(200,41,42,0.5);'}" id="ibtn-ng-${key}">✕</button>
          </div>
        </div>`;
      }).join('');
      const pend=items.filter(i=>!results[eq.id+'_'+i.id]).length;
      const bulkBtn=(!allDone&&pend>0)?`<button onclick="inspBulkOkEq('${eq.id}')" style="width:100%;padding:10px;background:var(--green-lt);border:1px solid var(--green);border-radius:10px;color:var(--green);font-size:12px;font-weight:600;cursor:pointer;margin-top:10px;touch-action:manipulation;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        未入力 ${pend}件 をすべて正常に一括入力
      </button>`:'';
      return`<div style="background:#FFFFFF;border:1.5px solid ${allDone?'rgba(34,197,94,0.35)':'rgba(0,0,0,0.07)'};border-top:1px solid rgba(0,0,0,0.06);padding:16px;transition:border-color .2s;" id="ec-${eq.id}">
        <div style="font-size:14px;font-weight:700;color:#111111;display:flex;align-items:center;gap:8px;margin-bottom:${items.length?'12px':'0'};">
          ${eq.name}
          <span id="ep-${eq.id}" style="font-size:${allDone?'10':'11'}px;font-weight:700;padding:${allDone?'3px 9px':'0'};border-radius:8px;margin-left:auto;${allDone?'background:rgba(34,197,94,0.12);color:#16A34A;':'color:#AAAAAA;'}">${allDone?'完了':`${done}/${items.length}`}</span>
        </div>
        ${itemsHtml}${bulkBtn}
      </div>`;
    }).join('');
    return`<div style="margin:14px 16px 0;">
      <div style="background:#F7F7F9;border:1.5px solid rgba(0,0,0,0.08);border-radius:18px 18px 0 0;border-bottom:none;padding:12px 16px;display:flex;align-items:center;gap:10px;">
        <div style="width:8px;height:8px;border-radius:50%;background:#C8292A;flex-shrink:0;"></div>
        <div style="font-size:14px;font-weight:700;color:#111111;flex:1;">${line.name}</div>
        <div style="font-size:11px;color:#9CA3AF;font-weight:500;">${line.desc}</div>
      </div>
      ${eqHtml}
      <div style="border:1.5px solid rgba(0,0,0,0.08);border-top:none;border-radius:0 0 18px 18px;height:6px;background:#F7F7F9;"></div>
    </div>`;
  }).join('');

  const pct=totalItems>0?Math.round(doneItems/totalItems*100):0;

  return`
  <div style="display:flex;flex-direction:column;height:100vh;background:#F8F9FC;overflow:hidden;">
    <!-- Header -->
    <div style="padding:calc(env(safe-area-inset-top,0px) + 12px) 20px 12px;display:flex;align-items:center;gap:14px;flex-shrink:0;border-bottom:1px solid rgba(0,0,0,0.07);background:#FFFFFF;">
      <button onclick="nav('HOME')" style="width:38px;height:38px;border-radius:12px;background:#F0F0F2;border:1.5px solid rgba(0,0,0,0.09);display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;flex-shrink:0;">
        <svg width="9" height="15" viewBox="0 0 9 15" fill="none"><path d="M8 1.5L2 7.5l6 6" stroke="#666666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div style="flex:1;min-width:0;">
        <div style="font-size:11px;color:#AAAAAA;font-weight:600;margin-bottom:3px;">点検中</div>
        <div style="font-size:16px;font-weight:700;color:#111111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${inspName}</div>
      </div>
    </div>
    <!-- Progress -->
    <div style="padding:14px 20px;flex-shrink:0;background:#FFFFFF;border-bottom:1px solid rgba(0,0,0,0.07);">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:12px;color:#AAAAAA;font-weight:600;">進捗</div>
        <div style="font-size:14px;font-weight:700;color:#111111;">${doneItems} / ${totalItems}</div>
      </div>
      <div style="height:6px;background:#E8E8EC;border-radius:6px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#C8292A,#FF7070);border-radius:6px;transition:width .38s cubic-bezier(.4,0,.2,1);"></div>
      </div>
    </div>
    <!-- Content -->
    <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;" id="insp-run-scroll">
      ${lineGroupsHtml}
      <div style="height:16px;"></div>
    </div>
    <!-- Footer -->
    <div style="padding:14px 16px calc(env(safe-area-inset-bottom,0px) + 16px);flex-shrink:0;border-top:1px solid rgba(0,0,0,0.07);background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);">
      <button onclick="inspFinish()" style="width:100%;padding:16px;background:#22C55E;color:white;border:none;border-radius:18px;font-size:15px;font-weight:700;cursor:pointer;touch-action:manipulation;font-family:inherit;box-shadow:0 6px 24px rgba(34,197,94,0.28);display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s;" onmousedown="this.style.transform='scale(.97)'" onmouseup="this.style.transform=''">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2.5 9l5 5 8-8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        点検を完了する
      </button>
    </div>
  </div>`;
}

function inspBulkOkEq(eqId){
  if(!S.inspRunResults)S.inspRunResults={};
  const selLines=S.lines.filter(l=>S.inspSelectedLines.includes(l.id));
  let eq=null;
  for(const line of selLines){eq=line.equip.find(e=>e.id===eqId);if(eq)break;}
  if(!eq)return;
  const items=eq.items.filter(i=>i.t==='毎日');
  let cnt=0;
  items.forEach(it=>{
    if(!S.inspRunResults[eqId+'_'+it.id]){
      S.inspRunResults[eqId+'_'+it.id]='ok';
      cnt++;
    }
  });
  toast(cnt>0?`${cnt}件を○に一括入力しました`:'未入力の項目はありません',cnt>0?'ok':'info');
  const scrollEl=document.getElementById('insp-run-scroll');
  const scrollTop=scrollEl?scrollEl.scrollTop:0;
  render();
  requestAnimationFrame(()=>{const el=document.getElementById('insp-run-scroll');if(el)el.scrollTop=scrollTop;});
}

function inspSetRes(eqId,itemId,result){
  if(!S.inspRunResults)S.inspRunResults={};
  const key=eqId+'_'+itemId;
  S.inspRunResults[key]=result;
  // Update button styles inline (no re-render)
  const okBtn=document.getElementById('ibtn-ok-'+key);
  const ngBtn=document.getElementById('ibtn-ng-'+key);
  if(okBtn){
    if(result==='ok'){okBtn.style.cssText+='background:#22C55E;color:white;border-color:#22C55E;box-shadow:0 4px 16px rgba(34,197,94,0.35);';}
    else{okBtn.style.cssText='height:40px;min-width:52px;padding:0 14px;border-radius:10px;border:1.5px solid;font-size:18px;font-weight:700;cursor:pointer;touch-action:manipulation;font-family:inherit;transition:transform .1s,background .12s,box-shadow .12s;background:#F8F9FC;color:#22C55E;border-color:rgba(34,197,94,0.5);';}
  }
  if(ngBtn){
    if(result==='ng'){ngBtn.style.cssText+='background:#C8292A;color:white;border-color:#C8292A;box-shadow:0 4px 16px rgba(200,41,42,0.32);';}
    else{ngBtn.style.cssText='height:40px;min-width:52px;padding:0 14px;border-radius:10px;border:1.5px solid;font-size:18px;font-weight:700;cursor:pointer;touch-action:manipulation;font-family:inherit;transition:transform .1s,background .12s,box-shadow .12s;background:#F8F9FC;color:#C8292A;border-color:rgba(200,41,42,0.5);';}
  }
  // Update eq card header
  const selLines=S.lines.filter(l=>S.inspSelectedLines.includes(l.id));
  for(const line of selLines){
    const eq=line.equip.find(e=>e.id===eqId);
    if(eq){
      const items=eq.items.filter(i=>i.t==='毎日');
      const done=items.filter(i=>S.inspRunResults[eqId+'_'+i.id]).length;
      const allDone=done===items.length&&items.length>0;
      const card=document.getElementById('ec-'+eqId);
      const ep=document.getElementById('ep-'+eqId);
      if(card)card.style.borderColor=allDone?'rgba(34,197,94,0.35)':'#E4E8EF';
      if(ep){
        if(allDone){ep.textContent='完了';ep.style.cssText='font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;margin-left:auto;background:rgba(34,197,94,0.12);color:#16A34A;';}
        else{ep.textContent=done+'/'+items.length;ep.style.cssText='font-size:11px;font-weight:600;margin-left:auto;color:#9CA3AF;';}
      }
      break;
    }
  }
  // Update progress bar
  let total=0,doneAll=0;
  selLines.forEach(line=>line.equip.forEach(eq=>{
    const items=eq.items.filter(i=>i.t==='毎日');
    total+=items.length;
    doneAll+=items.filter(i=>S.inspRunResults[eq.id+'_'+i.id]).length;
  }));
  const pct=total>0?Math.round(doneAll/total*100):0;
  const fill=document.querySelector('#insp-run-scroll')?.closest('div')?.querySelector('.prog-fill');
  // Update the progress bar directly
  const progBars=document.querySelectorAll('[style*="width:'+Math.max(0,pct-1)+'%"]');
  // Simpler: find via parent traversal
  const progFill=document.evaluate('//div[contains(@style,"linear-gradient(90deg,#C8292A")]',document,null,XPathResult.FIRST_ORDERED_NODE_TYPE,null).singleNodeValue;
  if(progFill)progFill.style.width=pct+'%';
  const progNums=document.evaluate('//div[contains(text()," / ")]',document,null,XPathResult.FIRST_ORDERED_NODE_TYPE,null).singleNodeValue;
  if(progNums)progNums.textContent=doneAll+' / '+total;
}

function inspFinish(){
  if(!S.inspRunResults)S.inspRunResults={};
  const selLines=S.lines.filter(l=>S.inspSelectedLines.includes(l.id));
  let total=0,done=0,ng=0;
  selLines.forEach(line=>line.equip.forEach(eq=>{
    const items=eq.items.filter(i=>i.t==='毎日');
    total+=items.length;
    items.forEach(it=>{
      const r=S.inspRunResults[eq.id+'_'+it.id];
      if(r)done++;
      if(r==='ng')ng++;
    });
  }));
  if(done<total){toast(`未入力が ${total-done} 件あります`,'warn');return;}
  // Also store to S.insps for history
  selLines.forEach(line=>line.equip.forEach(eq=>{
    const items=eq.items.filter(i=>i.t==='毎日');
    const key=eq.id+':毎日点検';
    S.insps[key]={date:TODAY,results:{},by:S.currentName||'点検者',lines:S.inspSelectedLines.slice()};
    items.forEach(it=>{
      const r=S.inspRunResults[eq.id+'_'+it.id]||'ok';
      S.insps[key].results[it.id]={r,comment:'',photos:0};
      if(r==='ng'){
        const existing=S.anomalies.find(a=>a.eid===eq.id&&a.iid===it.id&&a.status!=='resolved');
        if(!existing)S.anomalies.push({id:'AN'+Date.now()+Math.random().toString(36).slice(2),lid:line.id,eid:eq.id,iid:it.id,iname:it.n,comment:'点検にてNG',status:'open',date:TODAY,by:S.currentName||'点検者'});
      }
    });
  }));
  S.inspRunResults={};
  toast(ng>0?`点検完了（異常 ${ng} 件）`:'点検完了！すべて正常です');
  setTimeout(()=>nav('HOME'),1600);
}


function render(){
  const sc=document.getElementById('screen');
  const prevScroll=(S.view==='INSP_RUN')?document.getElementById('insp-run-scroll')?.scrollTop:null;
  let body='';
  switch(S.view){
    case'ROLE_SELECT':body=renderRoleSelect();break;
    case'NAME_SELECT':body=renderNameSelect();break;
    case'HOME':body=renderHome();break;
    case'INSP_RUN':body=renderInspRun();break;
    case'LINE_DETAIL':body=renderLineDetail();break;
    case'INSPECTION':body=renderInspection();break;
    case'APPROVAL':body=renderApproval();break;
    case'HISTORY':body=renderHistory();break;
    case'ANOMALY':body=renderAnomaly();break;
    case'EQUIPMENT_MGMT':body=renderEqMgmt();break;
    case'LINE_MGMT':body=renderLineMgmt();break;
    case'ITEM_MGMT':body=renderItemMgmt();break;
    case'LINE_EQ_MGMT':body=renderLineEqMgmt();break;
    default:body=renderHome();
  }
  sc.innerHTML=body;
  if(prevScroll!=null)requestAnimationFrame(()=>{const el=document.getElementById('insp-run-scroll');if(el)el.scrollTop=prevScroll;});
  if(S.ngModal.on)sc.insertAdjacentHTML('beforeend',renderNgSheet());
  if(S.modal)sc.insertAdjacentHTML('beforeend',renderModalSheet());
  if(S.eqPdfModal.on)sc.insertAdjacentHTML('beforeend',renderEqPdfModal());
}

// ── LocalStorage restore for inspector ──
(function(){
  const sn=localStorage.getItem('dk_insp_name');
  const sl=JSON.parse(localStorage.getItem('dk_insp_lines')||'[]');
  if(sn){
    S.currentRole='inspector';
    S.currentName=sn;
    S.inspLastLines=sl;
    S.inspSelectedLines=sl.length?[...sl]:[];
    S.view='HOME';
  }
})();

render();
</script>
