<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>点検システム v17</title>
<style>
/* ── 基本デザイン設定 ── */
:root {
  --primary: #111827;    /* メインカラー（濃紺） */
  --bg: #F3F4F6;         /* 背景色 */
  --surface: #FFFFFF;    /* カード・背景 */
  --border: #D1D5DB;     /* 枠線 */
  --text: #111827;       /* 文字色 */
  --success: #16A34A;    /* 完了・OKの色 */
  --danger: #DC2626;     /* 異常・NGの色 */
  --hanko: #DC2626;      /* 印鑑の色 */
}

body {
  font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
  background-color: var(--bg);
  color: var(--text);
  margin: 0;
  padding-top: 70px; /* ナビの高さ分 */
}

/* ── トップナビゲーション ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; height: 60px;
  background: var(--primary); color: #fff; z-index: 1000;
  display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
}
.nav-logo { font-weight: 800; font-size: 16px; letter-spacing: 1px; }
.nav-links { display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.nav-item {
  padding: 8px 12px; border-radius: 4px; font-size: 13px; font-weight: 500;
  white-space: nowrap; color: #fff; text-decoration: none; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.2); transition: 0.2s;
}
.nav-item:hover { background: rgba(255,255,255,0.1); }
.nav-item.active { background: #fff; color: var(--primary); border-color: #fff; }

.container { padding: 10px; max-width: 900px; margin: 0 auto; }

/* ── 設備・ラインカード（コンパクト版） ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 12px; margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; transition: 0.2s;
}
.card:active { transform: scale(0.98); }
.card.completed { background: #F0FDF4; border-color: #BBF7D0; }
.card-info { flex: 1; }
.card-title { font-weight: 700; font-size: 15px; margin: 0; }
.card-sub { font-size: 12px; color: #6B7280; margin-top: 2px; }
.status-badge { font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 12px; }
.status-badge.done { background: var(--success); color: #fff; }
.status-badge.yet { background: #E5E7EB; color: #6B7280; }

/* ── 点検入力画面 ── */
.insp-row { background: #fff; border-bottom: 1px solid var(--border); padding: 15px 12px; }
.insp-label { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.btn-group { display: flex; gap: 10px; }
.btn-check {
  flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 6px;
  text-align: center; font-size: 14px; font-weight: bold; cursor: pointer; background: #fff;
}
input[type="radio"] { display: none; }
input[type="radio"]:checked + .btn-check.ok { background: var(--success); color: #fff; border-color: var(--success); }
input[type="radio"]:checked + .btn-check.ng { background: var(--danger); color: #fff; border-color: var(--danger); }

/* スマート・メモ（NG時のみ表示） */
.memo-box { display: none; margin-top: 10px; }
input[type="radio"].ng-input:checked ~ .memo-box { display: block; animation: slideDown 0.2s ease-out; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
textarea { width: 100%; border: 1px solid var(--border); border-radius: 4px; padding: 8px; font-size: 13px; }

/* ── 報告書（PDF/印刷用テーブル） ── */
.report-area { background: #fff; padding: 20px; border: 1px solid #000; margin-top: 20px; }
.report-title { text-align: center; font-size: 20px; font-weight: bold; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
.report-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.report-table th, .report-table td { border: 1px solid #000; padding: 8px; text-align: left; }
.report-table th { background: #F3F4F6; text-align: center; }

/* デジタル印（ハンコ） */
.hanko-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50px; }
.hanko {
  width: 44px; height: 44px; border: 2px solid var(--hanko); border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--hanko); font-family: "MS PMincho", "Sawarabi Mincho", serif; position: relative;
}
.hanko-name { font-size: 13px; font-weight: 900; line-height: 1; }
.hanko-date { font-size: 7px; margin-top: 1px; font-family: sans-serif; }

/* ── 印刷設定 ── */
@media print {
  nav, .no-print, .btn-action { display: none !important; }
  body { padding-top: 0; background: #fff; }
  .report-area { border: none; padding: 0; }
  .report-table { font-size: 10px; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">M-SYSTEM</div>
  <div class="nav-links" id="navLinks">
    </div>
</nav>

<div id="app" class="container"></div>

<script>
// ── データ管理 ──
const TODAY = new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-');
const S = {
  view: 'HOME',
  user: JSON.parse(localStorage.getItem('dk_user') || '{"name":"松井","role":"admin"}'),
  lines: [
    { id:'L1', name:'Aライン', items:['コンベア駆動部','光電センサ','非常停止ボタン'] },
    { id:'L2', name:'Bライン', items:['プレス油圧','安全カバー','金型固定ボルト'] }
  ],
  results: JSON.parse(localStorage.getItem('dk_res') || '{}'), // { "2026-04-16": { "L1": {done:true, by:"松井", at:"..."}, ... } }
  approvals: JSON.parse(localStorage.getItem('dk_app') || '{}')
};

// ── ルーター ──
function changeView(v) { S.view = v; render(); window.scrollTo(0,0); }

// ── メイン描画 ──
function render() {
  const app = document.getElementById('app');
  renderNav();

  if(S.view === 'HOME') {
    app.innerHTML = `
      <div style="padding:40px 10px; text-align:center;">
        <h1 style="font-size:24px;">${S.user.name}さん、お疲れ様です</h1>
        <p style="color:#6B7280;">実施する点検を選択してください</p>
      </div>
    `;
  }

  else if(S.view === 'DAILY_OP') {
    app.innerHTML = `<h2 style="font-size:18px;">日常点検ライン選択</h2>`;
    S.lines.forEach(l => {
      const isDone = S.results[TODAY]?.[l.id];
      const div = document.createElement('div');
      div.className = `card ${isDone ? 'completed' : ''}`;
      div.innerHTML = `
        <div class="card-info">
          <div class="card-title">${l.name}</div>
          <div class="card-sub">${l.items.length} 項目</div>
        </div>
        <div class="status-badge ${isDone?'done':'yet'}">${isDone?'完了':'未点検'}</div>
      `;
      div.onclick = () => { S.selectedLine = l; changeView('INSP_RUN'); };
      app.appendChild(div);
    });
  }

  else if(S.view === 'INSP_RUN') {
    const l = S.selectedLine;
    app.innerHTML = `<div style="display:flex; justify:space-between; align-items:center;">
      <h2 style="font-size:18px;">${l.name} 点検入力</h2>
      <button class="no-print" onclick="changeView('DAILY_OP')">戻る</button>
    </div>`;
    
    l.items.forEach((item, i) => {
      const qid = `q_${l.id}_${i}`;
      const div = document.createElement('div');
      div.className = 'insp-row';
      div.innerHTML = `
        <div class="insp-label">${item}</div>
        <div class="btn-group">
          <label style="flex:1;">
            <input type="radio" name="${qid}" value="OK" checked>
            <div class="btn-check ok">OK</div>
          </label>
          <label style="flex:1;">
            <input type="radio" name="${qid}" value="NG" class="ng-input">
            <div class="btn-check ng">NG</div>
            <div class="memo-box">
              <textarea placeholder="異常内容を記入"></textarea>
            </div>
          </label>
        </div>
      `;
      app.appendChild(div);
    });

    const b = document.createElement('button');
    b.innerHTML = '点検完了を登録';
    b.style = 'width:100%; padding:16px; background:var(--primary); color:#fff; border:none; border-radius:8px; font-weight:bold; margin-top:20px; font-size:16px;';
    b.onclick = () => {
      if(!S.results[TODAY]) S.results[TODAY] = {};
      S.results[TODAY][l.id] = { done: true, by: S.user.name, at: TODAY };
      localStorage.setItem('dk_res', JSON.stringify(S.results));
      alert('点検を登録しました');
      changeView('DAILY_OP');
    };
    app.appendChild(b);
  }

  else if(S.view === 'REPORT') {
    app.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center;" class="no-print">
        <h3>点検報告書</h3>
        <button onclick="window.print()" style="padding:8px 16px; background:#000; color:#fff; border-radius:4px;">PDF/印刷</button>
      </div>
      <div class="report-area">
        <div class="report-title">設備点検実績報告書 (${TODAY})</div>
        <table class="report-table">
          <thead>
            <tr>
              <th width="15%">ライン</th>
              <th width="40%">点検項目</th>
              <th width="10%">結果</th>
              <th width="17%">点検者</th>
              <th width="17%">管理者</th>
            </tr>
          </thead>
          <tbody>
            ${S.lines.map(l => {
              const res = S.results[TODAY]?.[l.id];
              const apprv = S.approvals[TODAY]?.[l.id];
              return l.items.map((item, i) => `
                <tr>
                  ${i===0 ? `<td rowspan="${l.items.length}" style="text-align:center; font-weight:bold;">${l.name}</td>` : ''}
                  <td>${item}</td>
                  <td style="text-align:center; color:${res?'green':'#ccc'}">${res?'OK':'未'}</td>
                  ${i===0 ? `
                    <td rowspan="${l.items.length}" class="hanko-container">
                      ${res ? `<div class="hanko"><span class="hanko-name">${res.by}</span><span class="hanko-date">${res.at}</span></div>` : ''}
                    </td>
                    <td rowspan="${l.items.length}" class="hanko-container">
                      ${apprv ? `<div class="hanko"><span class="hanko-name">${apprv.by}</span><span class="hanko-date">${apprv.at}</span></div>` : 
                       (res && S.user.role==='admin' ? `<button class="no-print" onclick="approveLine('${l.id}')">承認印</button>` : '-')}
                    </td>
                  ` : ''}
                </tr>
              `).join('');
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  }
}

// ── 承認処理 ──
window.approveLine = (lid) => {
  if(!S.approvals[TODAY]) S.approvals[TODAY] = {};
  S.approvals[TODAY][lid] = { by: S.user.name, at: TODAY };
  localStorage.setItem('dk_app', JSON.stringify(S.approvals));
  render();
};

// ── ナビ描画 ──
function renderNav() {
  const links = document.getElementById('navLinks');
  const isAdmin = S.user.role === 'admin';
  const menu = [
    { id: 'HOME', txt: 'ホーム' },
    { id: 'DAILY_OP', txt: '日常点検' },
    { id: '10H_OP', txt: '10h点検' },
    { id: 'MONTH_OP', txt: '月次点検' }
  ];
  if(isAdmin) {
    menu.push({ id: 'REPORT', txt: 'レポート' });
    menu.push({ id: 'USER', txt: '設定' });
  }
  
  links.innerHTML = menu.map(m => `
    <div class="nav-item ${S.view === m.id ? 'active' : ''}" onclick="changeView('${m.id}')">${m.txt}</div>
  `).join('');
}

// 起動
render();
</script>
</body>
</html>
