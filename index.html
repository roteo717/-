<style>
:root{
  --primary:#E24B4A;--primary-dk:#A32D2D;
  --ok:#3B6D11;--ok-bg:#EAF3DE;
  --ng:#A32D2D;--ng-bg:#FCEBEB;
  --warn-bg:#FAEEDA;--warn:#854F0B;
  --color-background-primary:#FFFFFF;
  --color-background-secondary:#F3F4F6;
  --color-background-tertiary:#F0F0F0;
  --color-text-primary:#1A1A1A;
  --color-text-secondary:#6B7280;
  --color-border-tertiary:#E0E0E0;
  --color-border-secondary:#C9CDD6;
  --border-radius-lg:12px;
  --border-radius-md:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;}

/* ── Layout ── */
#app-wrap{display:flex;width:100%;height:100vh;background:var(--color-background-tertiary);overflow:hidden;}
#sidebar{width:220px;flex-shrink:0;background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;overflow:hidden;}
#screen{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;position:relative;}

/* ── Header ── */
.hdr{background:var(--primary);color:white;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.hdr-title{font-size:17px;font-weight:500;flex:1;}
.hdr-back{background:rgba(255,255,255,0.22);border:none;color:white;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hdr-act{background:rgba(255,255,255,0.2);border:none;color:white;padding:5px 12px;border-radius:14px;cursor:pointer;font-size:13px;}

/* ── Sidebar (desktop) ── */
.sb-brand{background:var(--primary);padding:16px;color:white;flex-shrink:0;}
.sb-brand-title{font-size:14px;font-weight:600;}
.sb-brand-sub{font-size:11px;opacity:.75;margin-top:2px;}
.sb-nav{padding:10px 0;flex:1;overflow-y:auto;}
.sb-item{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;font-size:14px;color:var(--color-text-secondary);border:none;background:none;width:100%;text-align:left;transition:background .15s,color .15s;position:relative;}
.sb-item:hover{background:var(--color-background-secondary);}
.sb-item.active{background:rgba(226,75,74,0.09);color:var(--primary);font-weight:500;}
.sb-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--primary);border-radius:0 3px 3px 0;}
.sb-ic{font-size:18px;width:22px;text-align:center;}
.sb-badge{margin-left:auto;background:var(--primary);color:white;border-radius:10px;padding:1px 7px;font-size:11px;}
.sb-section{font-size:10px;font-weight:600;color:var(--color-text-secondary);padding:14px 18px 4px;letter-spacing:.05em;opacity:.7;}
.sb-pdf{margin:10px 12px;padding:10px;background:var(--color-background-secondary);border:none;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;color:var(--color-text-primary);display:flex;align-items:center;gap:8px;width:calc(100% - 24px);}
.sb-pdf:hover{background:var(--color-border-tertiary);}

/* ── Bottom tabs (mobile only) ── */
.btabs{display:flex;background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary);padding:6px 0 10px;position:absolute;bottom:0;left:0;right:0;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 2px;border:none;background:none;font-size:10px;color:var(--color-text-secondary);}
.tab.active{color:var(--primary);}
.ti{font-size:20px;}

/* ── Cards & Content ── */
.scroll{overflow-y:auto;padding:14px 16px 90px;flex:1;}
.card{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:14px;margin-bottom:10px;}
.card-tap{cursor:pointer;transition:opacity .15s;}.card-tap:active{opacity:.75;}
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px;white-space:nowrap;}
.bOk{background:var(--ok-bg);color:var(--ok);}
.bNg{background:var(--ng-bg);color:var(--ng);}
.bWarn{background:var(--warn-bg);color:var(--warn);}
.bGray{background:var(--color-background-secondary);color:var(--color-text-secondary);}
.icard{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:2px solid var(--color-border-tertiary);padding:16px;margin-bottom:10px;transition:border-color .2s,background .2s;user-select:none;touch-action:pan-y;}
.icard.rok{border-color:var(--ok);background:var(--ok-bg);}
.icard.rng{border-color:var(--ng);background:var(--ng-bg);}
.jbtn{width:68px;height:68px;border-radius:50%;border:2px solid;cursor:pointer;font-size:26px;font-weight:500;transition:transform .1s;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.jbtn:active{transform:scale(.9);}
.jok{background:var(--ok-bg);color:var(--ok);border-color:var(--ok);}
.jok.sel{background:var(--ok);color:white;}
.jng{background:var(--ng-bg);color:var(--ng);border-color:var(--ng);}
.jng.sel{background:var(--ng);color:white;}
.pbtn{background:var(--primary);color:white;border:none;border-radius:var(--border-radius-md);padding:13px;font-size:15px;font-weight:500;cursor:pointer;width:100%;transition:opacity .15s;}
.pbtn:active{opacity:.8;}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);z-index:50;display:flex;align-items:flex-end;}
.sheet{background:var(--color-background-primary);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:85%;overflow-y:auto;}
.finput{width:100%;padding:10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary);}
.flabel{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:5px;}
.toast{position:absolute;bottom:75px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:18px;font-size:13px;font-weight:500;color:white;z-index:99;white-space:nowrap;pointer-events:none;}
.pdf-btn{background:rgba(255,255,255,0.22);border:none;color:white;padding:5px 11px;border-radius:14px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px;flex-shrink:0;}
.pdf-btn:active{opacity:.7;}

/* ── Desktop layout (≥768px) ── */
@media(min-width:768px){
  #sidebar{display:flex;}
  .btabs{display:none!important;}
  .hdr-back{display:flex;}
  .scroll{padding-bottom:20px;}
  .toast{bottom:20px;}
  /* wider grid for home quick actions */
  .home-grid{grid-template-columns:repeat(4,1fr)!important;}
}
/* ── Mobile layout (<768px) ── */
@media(max-width:767px){
  #sidebar{display:none;}
  .btabs{display:flex;}
  .scroll{padding-bottom:90px;}
}
@media print{
  body{margin:0;padding:0;background:white;}
  #app-wrap{max-width:100%!important;border:none!important;border-radius:0!important;min-height:unset!important;overflow:visible!important;}
  #screen{height:auto!important;display:block!important;}
  .btabs,.pdf-btn,.hdr-back{display:none!important;}
  .scroll{overflow:visible!important;padding-bottom:20px!important;}
  #print-report{display:block!important;}
  #main-app{display:none!important;}
}
@media screen{#print-report{display:none;}}
</style>
<meta name="viewport" content="width=device-width,initial-scale=1">
<div id="app-wrap">
  <div id="sidebar">
    <div class="sb-brand">
      <div class="sb-brand-title">日常点検システム</div>
      <div class="sb-brand-sub" id="sb-date"></div>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <button class="sb-pdf" onclick="printReport()">🖨 PDF出力</button>
  </div>
  <div id="screen" style="display:flex;flex-direction:column;"></div>
</div>
<div id="print-report"></div>
<script>
const TODAY='2026-04-09';
const S={
  view:'HOME',selectedLine:null,selectedEq:null,inspType:'毎日点検',
  bulkActive:false,bulkLineId:null,bulkIdx:0,
  modal:null,ngModal:{on:false,itemId:null,comment:'',photos:0},
  lines:[
    {id:'L1',name:'組立ライン',desc:'A棟1F',equip:[
      {id:'E1',name:'組立機A',lid:'L1',items:[{id:'i11',n:'油圧ゲージ確認',t:'毎日'},{id:'i12',n:'潤滑油レベル',t:'毎日'},{id:'i13',n:'異音・異臭確認',t:'毎日'},{id:'i14',n:'ベルト張力確認',t:'10日'},{id:'i15',n:'フィルター清掃',t:'月次'}]},
      {id:'E2',name:'組立機B',lid:'L1',items:[{id:'i21',n:'油圧ゲージ確認',t:'毎日'},{id:'i22',n:'回転数確認',t:'毎日'},{id:'i23',n:'温度確認',t:'毎日'},{id:'i24',n:'カップリング点検',t:'10日'}]},
      {id:'E3',name:'コンベア1',lid:'L1',items:[{id:'i31',n:'ベルト状態確認',t:'毎日'},{id:'i32',n:'駆動部潤滑',t:'毎日'},{id:'i33',n:'テンション調整',t:'10日'}]},
      {id:'E4',name:'溶接ロボット',lid:'L1',items:[{id:'i41',n:'アーム動作確認',t:'毎日'},{id:'i42',n:'ワイヤー残量',t:'毎日'},{id:'i43',n:'冷却水確認',t:'毎日'},{id:'i44',n:'キャリブレーション',t:'月次'}]},
      {id:'E5',name:'検査装置',lid:'L1',items:[{id:'i51',n:'センサー動作確認',t:'毎日'},{id:'i52',n:'精度チェック',t:'10日'}]},
    ]},
    {id:'L2',name:'加工ライン',desc:'A棟2F',equip:[
      {id:'E6',name:'NC旋盤1',lid:'L2',items:[{id:'i61',n:'主軸回転確認',t:'毎日'},{id:'i62',n:'クーラント確認',t:'毎日'},{id:'i63',n:'刃具摩耗確認',t:'毎日'},{id:'i64',n:'精度測定',t:'10日'}]},
      {id:'E7',name:'マシニングセンタ',lid:'L2',items:[{id:'i71',n:'ATC動作確認',t:'毎日'},{id:'i72',n:'切削油確認',t:'毎日'},{id:'i73',n:'主軸温度確認',t:'毎日'},{id:'i74',n:'スピンドル点検',t:'月次'}]},
      {id:'E8',name:'研削盤',lid:'L2',items:[{id:'i81',n:'砥石状態確認',t:'毎日'},{id:'i82',n:'冷却液確認',t:'毎日'},{id:'i83',n:'バランス調整',t:'10日'}]},
    ]},
    {id:'L3',name:'塗装ライン',desc:'B棟1F',equip:[
      {id:'E9',name:'塗装ブース1',lid:'L3',items:[{id:'i91',n:'排気ファン確認',t:'毎日'},{id:'i92',n:'フィルター状態',t:'毎日'},{id:'i93',n:'塗料粘度確認',t:'毎日'}]},
      {id:'E10',name:'乾燥炉',lid:'L3',items:[{id:'i101',n:'温度プロファイル確認',t:'毎日'},{id:'i102',n:'バーナー状態確認',t:'毎日'},{id:'i103',n:'チェーン潤滑',t:'10日'}]},
    ]},
  ],
  insps:{},
  approvals:[
    {id:'A1',lid:'L1',eid:'E1',type:'10日点検',date:'2026-04-08',status:'pending',by:'山田太郎',approver:null},
    {id:'A2',lid:'L2',eid:'E6',type:'月次点検',date:'2026-04-05',status:'pending',by:'佐藤花子',approver:null},
    {id:'A3',lid:'L1',eid:'E3',type:'10日点検',date:'2026-04-01',status:'approved',by:'田中一郎',approver:'鈴木部長'},
  ],
  anomalies:[
    {id:'AN1',lid:'L1',eid:'E2',iid:'i22',iname:'回転数確認',comment:'異常振動あり。要確認',status:'open',date:'2026-04-09',by:'山田太郎'},
    {id:'AN2',lid:'L2',eid:'E6',iid:'i63',iname:'刃具摩耗確認',comment:'摩耗が著しい。交換が必要',status:'in-progress',date:'2026-04-08',by:'佐藤花子'},
  ],
};
function getLn(id){return S.lines.find(l=>l.id===id);}
function getEq(id){for(const l of S.lines){const e=l.equip.find(e=>e.id===id);if(e)return e;}return null;}
function getInsps(eid){return S.insps[eid];}
function typeItems(eq,type){
  const m={'毎日点検':'毎日','10日点検':'all2','月次点検':'all'};
  const t=m[type]||'毎日';
  if(t==='毎日')return eq.items.filter(i=>i.t==='毎日');
  if(t==='all2')return eq.items.filter(i=>i.t==='毎日'||i.t==='10日');
  return eq.items;
}
function lineStats(lid){
  const l=getLn(lid);
  let done=0,ng=0,pend=0;
  for(const eq of l.equip){
    const st=eqStatus(eq.id);
    if(st==='done')done++;else if(st==='ng')ng++;else pend++;
  }
  return{total:l.equip.length,done,ng,pend};
}
function eqStatus(eid){
  const eq=getEq(eid);
  const insp=getInsps(eid);
  const items=typeItems(eq,S.inspType);
  if(!insp||insp.type!==S.inspType||insp.date!==TODAY)return'pending';
  const rs=insp.results;
  if(items.some(i=>rs[i.id]?.r==='ng'))return'ng';
  if(items.every(i=>rs[i.id]))return'done';
  return'partial';
}
function pendApprovals(){return S.approvals.filter(a=>a.status==='pending');}
function openAnoms(){return S.anomalies.filter(a=>a.status!=='resolved');}
function toast(msg,type='ok'){
  const w=document.getElementById('app-wrap');
  const old=w.querySelector('.toast');if(old)old.remove();
  const t=document.createElement('div');
  t.className='toast';
  t.style.background=type==='ok'?'#27500A':type==='warn'?'#854F0B':'#185FA5';
  t.textContent=msg;w.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}
function nav(view,data={}){
  Object.assign(S,{view},data);render();
}
function setResult(itemId,r){
  if(r==='ng'){S.ngModal={on:true,itemId,comment:'',photos:0};render();return;}
  const eid=S.selectedEq;
  if(!S.insps[eid])S.insps[eid]={date:TODAY,type:S.inspType,results:{}};
  S.insps[eid].results[itemId]={r:'ok',comment:'',photos:0};
  render();
}
function bulkOk(){
  const eid=S.selectedEq;const eq=getEq(eid);
  const items=typeItems(eq,S.inspType);
  if(!S.insps[eid])S.insps[eid]={date:TODAY,type:S.inspType,results:{}};
  let cnt=0;
  items.forEach(it=>{if(!S.insps[eid].results[it.id]){S.insps[eid].results[it.id]={r:'ok',comment:'',photos:0};cnt++;}});
  toast(cnt>0?`${cnt}件を〇に一括入力しました`:'未入力の項目はありません',cnt>0?'ok':'info');
}
function resetResult(iid){
  const eid=S.selectedEq;
  if(S.insps[eid])delete S.insps[eid].results[iid];
  render();
}
function submitInsp(){
  const eid=S.selectedEq;const eq=getEq(eid);
  const items=typeItems(eq,S.inspType);
  const rs=S.insps[eid]?.results||{};
  const pend=items.filter(i=>!rs[i.id]).length;
  if(pend>0){toast(`未入力が${pend}件あります`,'warn');return;}
  if(S.inspType!=='毎日点検'){
    S.approvals.push({id:'A'+Date.now(),lid:eq.lid,eid,type:S.inspType,date:TODAY,status:'pending',by:'現場作業者',approver:null});
    toast('点検完了。承認申請しました');
  }else toast('点検完了しました');
  if(S.bulkActive){
    const l=getLn(S.bulkLineId);
    const ni=S.bulkIdx+1;
    if(ni<l.equip.length){S.bulkIdx=ni;S.selectedEq=l.equip[ni].id;render();}
    else{S.bulkActive=false;toast('ライン点検完了！');nav('LINE_DETAIL',{selectedLine:S.bulkLineId});}
  }else nav('LINE_DETAIL');
}
function approve(id){const a=S.approvals.find(x=>x.id===id);if(a){a.status='approved';a.approver='管理者';}toast('承認しました');render();}
function reject(id){const a=S.approvals.find(x=>x.id===id);if(a)a.status='rejected';toast('差し戻しました','warn');render();}
function anomStatus(id,st){
  const a=S.anomalies.find(x=>x.id===id);if(a)a.status=st;
  toast(st==='in-progress'?'対応開始しました':'解決済にしました');render();
}
function confirmNg(){
  const c=document.getElementById('ng-c')?.value?.trim()||'';
  if(!c){toast('コメントを入力してください','warn');return;}
  if(S.ngModal.photos===0){toast('写真を追加してください','warn');return;}
  S.ngModal.comment=c;
  const eid=S.selectedEq;const eq=getEq(eid);
  const iid=S.ngModal.itemId;const item=eq.items.find(i=>i.id===iid);
  if(!S.insps[eid])S.insps[eid]={date:TODAY,type:S.inspType,results:{}};
  S.insps[eid].results[iid]={r:'ng',comment:c,photos:S.ngModal.photos};
  if(!S.anomalies.find(a=>a.eid===eid&&a.iid===iid&&a.status!=='resolved')){
    S.anomalies.push({id:'AN'+Date.now(),lid:eq.lid,eid,iid,iname:item.n,comment:c,status:'open',date:TODAY,by:'現場作業者'});
  }
  S.ngModal={on:false,itemId:null,comment:'',photos:0};render();
}
function addEqConfirm(lid){
  const n=document.getElementById('meq-n')?.value?.trim();
  if(!n){toast('設備名を入力してください','warn');return;}
  getLn(lid).equip.push({id:'E'+Date.now(),name:n,lid,items:[{id:'I'+Date.now()+'a',n:'外観確認',t:'毎日'},{id:'I'+Date.now()+'b',n:'動作確認',t:'毎日'}]});
  S.modal=null;toast(`${n}を追加しました`);render();
}
function addLineConfirm(){
  const n=document.getElementById('mln-n')?.value?.trim();
  const d=document.getElementById('mln-d')?.value?.trim()||'';
  if(!n){toast('ライン名を入力してください','warn');return;}
  S.lines.push({id:'L'+Date.now(),name:n,desc:d,equip:[]});
  S.modal=null;toast(`${n}を追加しました`);render();
}
function delEq(eid){
  const eq=getEq(eid);
  if(!confirm(`${eq.name}を削除しますか？`))return;
  for(const l of S.lines){const i=l.equip.findIndex(e=>e.id===eid);if(i!==-1){l.equip.splice(i,1);break;}}
  toast('設備を削除しました');render();
}
function delLine(lid){
  const l=getLn(lid);if(!confirm(`${l.name}を削除しますか？`))return;
  S.lines.splice(S.lines.indexOf(l),1);toast('ラインを削除しました');render();
}
function fmtDate(ds){
  const d=new Date(ds);const dw=['日','月','火','水','木','金','土'];
  return`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日(${dw[d.getDay()]})`;
}
function hdr(title,back,extra=''){
  const bb=back?`<button class="hdr-back" onclick="nav('${back}')">‹</button>`:`<div style="width:30px;"></div>`;
  const pdfBtn=`<button class="pdf-btn" onclick="printReport()" title="PDF出力">🖨 PDF</button>`;
  return`<div class="hdr">${bb}<span class="hdr-title">${title}</span>${extra}${pdfBtn}</div>`;
}
function printReport(){
  const tots=S.lines.reduce((s,l)=>s+l.equip.length,0);
  const pa=pendApprovals().length,oa=openAnoms().length;
  let rows='';
  for(const l of S.lines){
    for(const eq of l.equip){
      const st=eqStatus(eq.id);
      const insp=S.insps[eq.id];
      const items=typeItems(eq,S.inspType);
      const done=insp?items.filter(i=>insp.results[i.id]).length:0;
      const ng=insp?items.filter(i=>insp.results[i.id]?.r==='ng').length:0;
      const stLabel=st==='done'?'完了':st==='ng'?'異常':st==='partial'?done+'/'+items.length+'件':'未実施';
      const stColor=st==='done'?'#3B6D11':st==='ng'?'#A32D2D':st==='partial'?'#854F0B':'#6B7280';
      rows+=`<tr><td style="padding:7px 9px;border:0.5px solid #E0E0E0;">${l.name}</td><td style="padding:7px 9px;border:0.5px solid #E0E0E0;">${eq.name}</td><td style="padding:7px 9px;border:0.5px solid #E0E0E0;color:${stColor};font-weight:500;">${stLabel}</td><td style="padding:7px 9px;border:0.5px solid #E0E0E0;">${ng>0?'異常 '+ng+'件':'−'}</td></tr>`;
    }
  }
  let anomRows='';
  for(const a of S.anomalies.filter(x=>x.status!=='resolved')){
    const eq=getEq(a.eid);const l=eq?S.lines.find(ln=>ln.id===a.lid):null;
    const stLabel=a.status==='open'?'未対応':'対応中';
    const stColor=a.status==='open'?'#A32D2D':'#854F0B';

    ${open.length===0&&ip.length===0?`<div class="card" style="text-align:center;color:var(--ok);padding:28px;"><div style="font-size:28px;margin-bottom:8px;">✓</div>異常はありません</div>`:''}
    ${res.length>0?`<div style="font-size:12px;color:var(--color-text-secondary);font-weight:500;margin:14px 0 8px;">解決済 (${res.length}件)</div>${res.map(acard).join('')}`:''}
  </div>${btabs()}`;
}
function renderEqMgmt(){
  return`${hdr('設備管理','HOME')}
  <div class="scroll">
    ${S.lines.map(l=>`
      <div style="margin-bottom:14px;">
        <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:7px;display:flex;justify-content:space-between;">
          <span>${l.name}</span>
          <button onclick="S.modal={type:'addEq',lid:'${l.id}'};render();" style="font-size:12px;color:var(--primary);background:none;border:none;cursor:pointer;">+ 追加</button>
        </div>
        ${l.equip.map(eq=>`
          <div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:11px 13px;margin-bottom:7px;">
            <div><div style="font-weight:500;font-size:14px;">${eq.name}</div><div style="font-size:12px;color:var(--color-text-secondary);">項目 ${eq.items.length}件</div></div>
            <button onclick="delEq('${eq.id}')" style="padding:5px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:none;color:var(--ng);font-size:12px;cursor:pointer;">削除</button>
          </div>`).join('')}
      </div>`).join('')}
  </div>${btabs()}`;
}
function renderLineMgmt(){
  return`${hdr('ライン管理','HOME')}
  <div class="scroll">
    ${S.lines.map(l=>`
      <div class="card" style="display:flex;align-items:center;justify-content:space-between;">
        <div><div style="font-weight:500;font-size:15px;">${l.name}</div><div style="font-size:12px;color:var(--color-text-secondary);">${l.desc} · 設備${l.equip.length}台</div></div>
        <button onclick="delLine('${l.id}')" style="padding:5px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:none;color:var(--ng);font-size:12px;cursor:pointer;">削除</button>
      </div>`).join('')}
    <button onclick="S.modal={type:'addLine'};render();" style="width:100%;padding:12px;border:1.5px dashed var(--color-border-secondary);background:none;border-radius:var(--border-radius-lg);color:var(--color-text-secondary);cursor:pointer;font-size:14px;margin-top:4px;">+ ラインを追加</button>
  </div>${btabs()}`;
}
function renderNgSheet(){
  return`<div class="overlay"><div class="sheet">
    <div style="font-size:17px;font-weight:500;margin-bottom:14px;color:var(--ng);">✗ 異常を記録</div>
    <div style="margin-bottom:12px;">
      <label class="flabel">コメント (必須)</label>
      <textarea id="ng-c" placeholder="異常内容を入力してください" style="width:100%;padding:10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:14px;resize:none;height:75px;background:var(--color-background-primary);color:var(--color-text-primary);"></textarea>
    </div>
    <div style="margin-bottom:18px;">
      <label class="flabel">写真 (必須)</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button onclick="S.ngModal.photos++;render();" style="width:66px;height:66px;border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);cursor:pointer;font-size:22px;color:var(--color-text-secondary);">+</button>
        ${Array.from({length:S.ngModal.photos},(_,i)=>`<div style="width:66px;height:66px;background:var(--ng-bg);border-radius:var(--border-radius-md);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--ng);">写真${i+1}</div>`).join('')}
      </div>
      ${S.ngModal.photos===0?`<div style="font-size:11px;color:var(--ng);margin-top:4px;">写真を1枚以上追加してください</div>`:''}
    </div>
    <div style="display:flex;gap:9px;">
      <button onclick="S.ngModal={on:false,itemId:null,comment:'',photos:0};render();" style="flex:1;padding:13px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:none;font-size:14px;cursor:pointer;color:var(--color-text-primary);">キャンセル</button>
      <button onclick="confirmNg()" style="flex:2;padding:13px;background:var(--ng);color:white;border:none;border-radius:var(--border-radius-md);font-size:14px;font-weight:500;cursor:pointer;">異常を登録</button>
    </div>
  </div></div>`;
}
function renderModalSheet(){
  const m=S.modal;let inner='';
  if(m.type==='addEq'){inner=`
    <div style="font-size:17px;font-weight:500;margin-bottom:14px;">設備を追加</div>
    <div style="margin-bottom:12px;"><label class="flabel">設備名</label><input id="meq-n" class="finput" type="text" placeholder="例: NC旋盤3"></div>
    <div style="display:flex;gap:9px;margin-top:14px;">
      <button onclick="S.modal=null;render();" style="flex:1;padding:13px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:none;font-size:14px;cursor:pointer;">キャンセル</button>
      <button onclick="addEqConfirm('${m.lid}')" style="flex:2;padding:13px;background:var(--primary);color:white;border:none;border-radius:var(--border-radius-md);font-size:14px;font-weight:500;cursor:pointer;">追加</button>
    </div>`;}
  else if(m.type==='addLine'){inner=`
    <div style="font-size:17px;font-weight:500;margin-bottom:14px;">ラインを追加</div>
    <div style="margin-bottom:10px;"><label class="flabel">ライン名</label><input id="mln-n" class="finput" type="text" placeholder="例: 検査ライン"></div>
    <div style="margin-bottom:14px;"><label class="flabel">場所</label><input id="mln-d" class="finput" type="text" placeholder="例: C棟1F"></div>
    <div style="display:flex;gap:9px;">
      <button onclick="S.modal=null;render();" style="flex:1;padding:13px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:none;font-size:14px;cursor:pointer;">キャンセル</button>
      <button onclick="addLineConfirm()" style="flex:2;padding:13px;background:var(--primary);color:white;border:none;border-radius:var(--border-radius-md);font-size:14px;font-weight:500;cursor:pointer;">追加</button>
    </div>`;}
  return`<div class="overlay"><div class="sheet">${inner}</div></div>`;
}
function renderSidebar(){
  const pa=pendApprovals().length,oa=openAnoms().length;
  const sb=document.getElementById('sb-nav');
  if(!sb)return;
  const items=[
    {v:'HOME',l:'ホーム',ic:'⌂'},
    {v:'APPROVAL',l:'承認確認',ic:'✓',badge:pa},
    {v:'ANOMALY',l:'異常管理',ic:'⚠',badge:oa},
    {v:'HISTORY',l:'点検履歴',ic:'≡'},
    {sep:true,label:'管理'},
    {v:'EQUIPMENT_MGMT',l:'設備管理',ic:'⚙'},
    {v:'LINE_MGMT',l:'ライン管理',ic:'🏭'},
  ];
  sb.innerHTML=items.map(it=>{
    if(it.sep)return`<div class="sb-section">${it.label}</div>`;
    return`<button class="sb-item${S.view===it.v?' active':''}" onclick="nav('${it.v}')">
      <span class="sb-ic">${it.ic}</span><span>${it.l}</span>
      ${it.badge>0?`<span class="sb-badge">${it.badge}</span>`:''}
    </button>`;
  }).join('');
  const d=document.getElementById('sb-date');
  if(d)d.textContent=fmtDate(TODAY);
}
function render(){
  const sc=document.getElementById('screen');
  let body='';
  switch(S.view){
    case'HOME':body=renderHome();break;
    case'LINE_DETAIL':body=renderLineDetail();break;
    case'INSPECTION':body=renderInspection();break;
    case'APPROVAL':body=renderApproval();break;
    case'HISTORY':body=renderHistory();break;
    case'ANOMALY':body=renderAnomaly();break;
    case'EQUIPMENT_MGMT':body=renderEqMgmt();break;
    case'LINE_MGMT':body=renderLineMgmt();break;
    default:body=renderHome();
  }
  sc.innerHTML=body;
  renderSidebar();
  if(S.ngModal.on)sc.insertAdjacentHTML('beforeend',renderNgSheet());
  if(S.modal)sc.insertAdjacentHTML('beforeend',renderModalSheet());
  setupSwipe();
}
function setupSwipe(){
  document.querySelectorAll('.icard').forEach(card=>{
    let sx=0,sy=0;
    const iid=card.dataset.iid;
    card.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
    card.addEventListener('touchend',e=>{
      const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
      const insp=getInsps(S.selectedEq);
      if(insp?.results[iid])return;
      if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>45){
        if(dx>0)setResult(iid,'ok');else setResult(iid,'ng');
      }
    },{passive:true});
  });
}
render();
</script>
