<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設備点検アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f5f6f8;
    min-height: 100vh;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .phone {
    width: 100%;
    max-width: 100%;
    background: #f5f6f8;
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* SVG Icon base style */
  .icon-svg {
    width: 22px; height: 22px;
    stroke: currentColor;
    stroke-width: 1.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    display: block;
  }
  .icon-svg-sm {
    width: 18px; height: 18px;
    stroke: currentColor;
    stroke-width: 1.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    display: inline-block;
    vertical-align: middle;
  }

  /* ── Role Select Screen ── */
  .role-screen {
    position: fixed; inset: 0; z-index: 100;
    background: linear-gradient(160deg, #1a2e50 0%, #2a4a7a 55%, #1e3a6a 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px;
    transition: opacity .4s ease, transform .4s ease;
  }
  .role-screen.fade-out {
    opacity: 0; transform: scale(1.04); pointer-events: none;
  }
  .role-screen.hidden { display: none; }

  .role-logo {
    margin-bottom: 10px;
    opacity: .9;
  }
  .role-app-name {
    font-size: 20px; font-weight: 700; color: #fff;
    letter-spacing: 1px; margin-bottom: 4px;
  }
  .role-app-sub {
    font-size: 12px; color: rgba(255,255,255,0.55);
    margin-bottom: 48px; letter-spacing: .5px;
  }

  .role-heading {
    font-size: 13px; color: rgba(255,255,255,0.65);
    margin-bottom: 20px; letter-spacing: .5px;
  }

  .role-cards {
    display: flex; gap: 14px; width: 100%; max-width: 340px;
    margin-bottom: 32px;
  }
  .role-card {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 24px 12px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    cursor: pointer;
    transition: background .2s, border-color .2s, transform .15s;
    user-select: none;
  }
  .role-card:hover { background: rgba(255,255,255,0.18); transform: translateY(-2px); }
  .role-card.selected {
    background: rgba(255,255,255,0.22);
    border-color: #e06020;
    transform: translateY(-2px);
  }
  .role-card-icon {
    width: 56px; height: 56px;
    border-radius: 16px;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    transition: background .2s;
  }
  .role-card.selected .role-card-icon { background: rgba(224,96,32,0.35); }
  .role-card-icon svg { width: 28px; height: 28px; stroke: #fff; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .role-card-name {
    font-size: 15px; font-weight: 700; color: #fff; letter-spacing: .5px;
  }
  .role-card-desc {
    font-size: 10px; color: rgba(255,255,255,0.6); text-align: center; line-height: 1.5;
  }
  .role-check {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, border-color .2s;
  }
  .role-card.selected .role-check {
    background: #e06020; border-color: #e06020;
  }
  .role-check svg { width: 11px; height: 11px; stroke: #fff; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0; transition: opacity .15s; }
  .role-card.selected .role-check svg { opacity: 1; }

  .role-btn {
    width: 100%; max-width: 340px;
    padding: 16px;
    border: none; border-radius: 16px;
    background: linear-gradient(135deg, #e06020, #c04010);
    color: #fff; font-size: 15px; font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer; opacity: .4;
    transition: opacity .2s, transform .15s;
    box-shadow: 0 6px 20px rgba(224,96,32,0.4);
  }
  .role-btn.ready { opacity: 1; }
  .role-btn.ready:hover { transform: scale(1.02); }

  .role-badge {
    margin-top: 24px;
    display: none; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 12px; padding: 8px 14px;
    font-size: 12px; color: rgba(255,255,255,0.8);
  }
  .role-badge.show { display: flex; }
  .role-badge-dot { width: 8px; height: 8px; border-radius: 50%; background: #4cd964; flex-shrink: 0; }

  /* ── Compact Header ── */
  .compact-header {
    background: linear-gradient(135deg, #1a2e50, #2a4a7a);
    padding: 14px 16px 12px;
  }
  .compact-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .compact-month {
    display: flex; align-items: baseline; gap: 6px;
  }
  .compact-year { font-size: 13px; color: rgba(255,255,255,0.7); }
  .compact-monthnum { font-size: 32px; font-weight: 700; color: #fff; line-height: 1; }
  .compact-monthname { font-size: 14px; color: rgba(255,255,255,0.85); }
  .compact-scores {
    display: flex; gap: 8px; justify-content: space-between;
  }
  .compact-pill {
    flex: 1;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 8px 10px;
    text-align: center;
  }
  .compact-pill .score-pill-label { color: rgba(255,255,255,0.75); }
  .compact-pill .score-val { color: #fff; font-size: 22px; }
  .compact-pill .score-val span { font-size: 13px; }
  .compact-pill .score-val.pct { font-size: 20px; }

  /* score nav used in compact header */
  .score-nav:hover { background: rgba(255,255,255,0.95); }
  .score-nav {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.88);
    border: none; cursor: pointer;
    font-size: 20px; color: #334;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .score-pill-label { font-size: 11px; color: #556; display: block; margin-bottom: 2px; }
  .score-val { font-size: 26px; font-weight: 700; color: #1a2e4a; line-height: 1; }
  .score-val span { font-size: 14px; }
  .score-val.pct { font-size: 22px; }

  /* ── Tabs ── */
  .tabs { display: flex; border-bottom: 1px solid #dde; background: #fff; }
  .tab {
    flex: 1; padding: 13px;
    text-align: center; cursor: pointer;
    font-size: 13px; color: #888; font-weight: 500;
    border-bottom: 2px solid transparent;
    transition: all .15s; letter-spacing: .3px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .tab .tab-icon { font-size: 20px; display: flex; justify-content: center; }
  .tab.active { border-bottom-color: #e06020; color: #e06020; }
  .tab.active .icon-svg { stroke: #e06020; }

  /* ── Calendar ── */
  .cal-head {
    display: grid;
    grid-template-columns: repeat(7,1fr);
    padding: 12px 12px 4px;
    background: #fff;
  }
  .cal-dh { text-align: center; font-size: 11px; font-weight: 500; color: #aab; padding: 4px 0; }
  .cal-dh.sat { color: #4a80c4; }
  .cal-dh.sun { color: #c44a4a; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7,1fr);
    padding: 4px 12px 12px;
    gap: 3px;
    background: #fff;
  }
  .cal-cell {
    display: flex; flex-direction: column;
    align-items: center;
    min-height: 54px; padding: 2px 0;
  }
  .day-num {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; cursor: pointer;
    transition: all .12s; user-select: none;
  }
  .day-num:hover:not(.empty):not(.past-no-log) { transform: scale(1.08); }
  .day-num.ok       { background: #d0eaff; color: #1a4a7a; font-weight: 600; }
  .day-num.warn     { background: #ffe8cc; color: #8a3c00; font-weight: 600; }
  .day-num.ng       { background: #ffd0d0; color: #8a0000; font-weight: 600; }
  .day-num.today    { border: 2px solid #e06020; color: #e06020; font-weight: 700; }
  .day-num.today.ok { border: 2px solid #e06020; background: #d0eaff; color: #1a4a7a; }
  .day-num.empty    { opacity: 0; pointer-events: none; }
  .day-num.past-no-log { color: #ccc; cursor: default; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 2px; }
  .dot-ok   { background: #3a9edc; }
  .dot-warn { background: #e08020; }
  .dot-ng   { background: #dc3a3a; }

  /* ── Legend ── */
  .legend {
    display: flex; gap: 12px;
    padding: 6px 14px 8px;
    background: #fff;
    border-top: 1px solid #eee;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #778; }
  .legend-dot  { width: 8px; height: 8px; border-radius: 50%; }

  /* ── Bottom Nav ── */
  .bottom-nav {
    display: flex; background: #fff;
    border-top: 1px solid #dde;
    padding: 10px 0 max(12px, env(safe-area-inset-bottom));
    position: sticky; bottom: 0;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    cursor: pointer; padding: 2px 0;
    color: #aab;
  }
  .nav-item.active { color: #e06020; }
  .nav-item.active .icon-svg { stroke: #e06020; }
  .nav-icon  { font-size: 22px; position: relative; display: flex; align-items: center; justify-content: center; }
  .nav-label { font-size: 10px; color: inherit; }
  .nav-plus {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, #e06020, #c04010);
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    margin-top: -16px;
    box-shadow: 0 4px 14px rgba(224,96,32,0.45);
    cursor: pointer; transition: transform .15s;
  }
  .nav-plus:hover { transform: scale(1.08); }
  .nav-plus .icon-svg { stroke: #fff; width: 26px; height: 26px; stroke-width: 2; }
  .notif-dot {
    width: 8px; height: 8px; background: #dc3a3a;
    border-radius: 50%; position: absolute; top: -2px; right: -4px;
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: none; align-items: flex-end; z-index: 20;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: #fff; width: 100%;
    border-radius: 22px 22px 0 0;
    padding: 20px 20px max(20px, env(safe-area-inset-bottom));
  }
  .modal-handle { width: 40px; height: 5px; background: #dde; border-radius: 3px; margin: 0 auto 16px; }
  .modal-title  { font-size: 16px; font-weight: 700; color: #1a2e4a; text-align: center; margin-bottom: 16px; }

  .check-row { margin-bottom: 16px; }
  .check-label {
    font-size: 13px; color: #667;
    display: flex; justify-content: space-between;
    margin-bottom: 8px;
  }
  .check-label strong { color: #1a2e4a; font-size: 14px; min-width: 28px; text-align: right; }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%; height: 5px;
    border-radius: 3px; outline: none;
    background: #dde;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px; height: 24px;
    background: #e06020; border-radius: 50%;
    cursor: pointer; box-shadow: 0 2px 6px rgba(224,96,32,0.4);
  }

  .status-select {
    display: flex; gap: 8px; margin-bottom: 16px;
  }
  .status-btn {
    flex: 1; padding: 11px 4px;
    border-radius: 12px; border: 2px solid #dde;
    font-size: 13px; font-weight: 600; cursor: pointer;
    background: #f5f6f8; color: #889; transition: all .15s;
    font-family: 'Noto Sans JP', sans-serif;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .status-btn .icon-svg-sm { stroke: currentColor; }
  .status-btn.sel-ok   { border-color: #3a9edc; background: #d0eaff; color: #1a4a7a; }
  .status-btn.sel-warn { border-color: #e08020; background: #ffe8cc; color: #8a3c00; }
  .status-btn.sel-ng   { border-color: #dc3a3a; background: #ffd0d0; color: #8a0000; }

  .modal-btns { display: flex; gap: 10px; margin-top: 18px; }
  .btn-cancel {
    flex: 1; padding: 14px;
    border: 1px solid #dde; border-radius: 14px;
    background: #fff; font-size: 14px;
    cursor: pointer; color: #889;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .btn-save {
    flex: 2; padding: 14px;
    border: none; border-radius: 14px;
    background: linear-gradient(135deg, #e06020, #c04010);
    font-size: 14px; cursor: pointer; color: #fff; font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    transition: opacity .15s;
  }
  .btn-save:hover { opacity: .88; }

  /* detail view */
  .detail-item {
    display: flex; align-items: center;
    padding: 12px 16px; border-bottom: 1px solid #eee;
    background: #fff; gap: 12px;
  }
  .detail-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: #eef2f8;
    display: flex; align-items: center; justify-content: center;
    color: #2a4a7a; flex-shrink: 0;
  }
  .detail-icon .icon-svg { width: 18px; height: 18px; stroke: #2a4a7a; stroke-width: 1.6; }
  .detail-name { flex: 1; font-size: 14px; color: #334; }
  .detail-score { font-size: 14px; font-weight: 700; }
  .detail-score.ok   { color: #1a6aaa; }
  .detail-score.warn { color: #cc5500; }
  .detail-score.ng   { color: #cc0000; }
  .detail-status {
    font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600;
  }
  .detail-status.ok   { background: #d0eaff; color: #1a4a7a; }
  .detail-status.warn { background: #ffe8cc; color: #8a3c00; }
  .detail-status.ng   { background: #ffd0d0; color: #8a0000; }

  /* ── Settings View ── */
  .settings-view {
    display: none; flex-direction: column;
    background: #f5f6f8; flex: 1; overflow-y: auto;
  }
  .settings-section { margin: 14px 14px 0; }
  .settings-section-title {
    font-size: 11px; font-weight: 700; color: #889;
    letter-spacing: .8px; padding: 0 4px; margin-bottom: 8px;
  }
  .settings-card {
    background: #fff; border-radius: 16px; overflow: hidden;
    margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .settings-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-bottom: 1px solid #f0f0f4;
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-row-icon {
    width: 34px; height: 34px; border-radius: 10px;
    background: #eef2f8; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .settings-row-icon svg { width: 17px; height: 17px; stroke: #2a4a7a; stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .settings-row-body { flex: 1; min-width: 0; }
  .settings-row-label { font-size: 10px; color: #aab; margin-bottom: 2px; }
  .settings-row-input {
    width: 100%; border: none; outline: none;
    font-size: 14px; color: #334; font-family: 'Noto Sans JP', sans-serif;
    background: transparent; padding: 0;
  }
  .settings-row-input:focus { color: #1a2e50; }
  .settings-save-wrap { padding: 4px 14px 14px; }
  .settings-save-btn {
    width: 100%; padding: 15px; border: none; border-radius: 14px;
    background: linear-gradient(135deg, #1a2e50, #2a4a7a);
    color: #fff; font-size: 15px; font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer; transition: opacity .15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .settings-save-btn:hover { opacity: .88; }
  .settings-save-btn svg { width: 18px; height: 18px; stroke: #fff; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .settings-toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(12px);
    background: #1a2e50; color: #fff; font-size: 13px;
    padding: 10px 22px; border-radius: 24px; opacity: 0;
    transition: opacity .25s, transform .25s; pointer-events: none;
    white-space: nowrap; box-shadow: 0 4px 14px rgba(0,0,0,0.2); z-index: 50;
  }
  .settings-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<!-- Role Selection Screen -->
<div class="role-screen" id="role-screen">
  <div class="role-logo">
    <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="56" height="56" rx="16" fill="rgba(255,255,255,0.12)"/>
      <path d="M14 38V24l14-10 14 10v14a2 2 0 01-2 2H16a2 2 0 01-2-2z" stroke="white" stroke-width="1.8" stroke-linejoin="round" fill="none"/>
      <path d="M22 40v-8h12v8" stroke="white" stroke-width="1.8" stroke-linejoin="round" fill="none"/>
      <circle cx="28" cy="24" r="3" stroke="white" stroke-width="1.6" fill="none"/>
    </svg>
  </div>
  <div class="role-app-name">設備点検アプリ</div>
  <div class="role-app-sub">Facility Inspection System</div>

  <div class="role-heading">ログインする役割を選択してください</div>

  <div class="role-cards">
    <!-- 点検者 -->
    <div class="role-card" id="card-inspector" onclick="selectRole('inspector')">
      <div class="role-card-icon">
        <svg viewBox="0 0 24 24">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <polyline points="9 12 11 14 15 10"/>
        </svg>
      </div>
      <div class="role-card-name">点検者</div>
      <div class="role-card-desc">現場での設備点検・<br>記録入力を行う</div>
      <div class="role-check">
        <svg viewBox="0 0 12 12"><polyline points="2 6 5 9 10 3"/></svg>
      </div>
    </div>
    <!-- 管理人 -->
    <div class="role-card" id="card-manager" onclick="selectRole('manager')">
      <div class="role-card-icon">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          <line x1="17" y1="11" x2="23" y2="11"/>
          <line x1="20" y1="8" x2="20" y2="14"/>
        </svg>
      </div>
      <div class="role-card-name">管理人</div>
      <div class="role-card-desc">点検結果の確認・<br>レポート管理を行う</div>
      <div class="role-check">
        <svg viewBox="0 0 12 12"><polyline points="2 6 5 9 10 3"/></svg>
      </div>
    </div>
  </div>

  <button class="role-btn" id="role-btn" onclick="enterApp()">ログイン</button>

  <div class="role-badge" id="role-badge">
    <span class="role-badge-dot"></span>
    <span id="role-badge-text"></span>
  </div>
</div>

<div class="phone" id="app-inner" style="display:none">

  <!-- Header -->
  <div class="compact-header">
    <div class="compact-nav">
      <button class="score-nav" onclick="prevMonth()">
        <svg class="icon-svg" style="width:18px;height:18px" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="compact-month">
        <span class="compact-year" id="year-label">2026</span>
        <span class="compact-monthnum" id="month-num">4</span>
        <span class="compact-monthname" id="month-name-el">April</span>
      </div>
      <button class="score-nav" onclick="nextMonth()">
        <svg class="icon-svg" style="width:18px;height:18px" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;min-height:22px;">
      <span id="header-role-badge" style="font-size:10px;color:rgba(255,255,255,0.65);background:rgba(255,255,255,0.12);padding:3px 10px;border-radius:20px;letter-spacing:.5px;"></span>
      <button onclick="logout()" style="display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:3px 10px 3px 8px;cursor:pointer;color:rgba(255,255,255,0.7);font-size:10px;font-family:inherit;transition:background .15s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">

<script>
const TODAY = new Date(2026, 3, 18);
let viewYear = 2026, viewMonth = 3;
let selectedDay = null;
let currentStatus = 'ok';
let currentTab = 0;

const MONTHS_EN = ['January','February','March','April','May','June',
                   'July','August','September','October','November','December'];

// SVG icon strings for facility list
const FACILITY_ICONS = {
  gear: `<svg class="icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>`,
  droplet: `<svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg>`,
  zap: `<svg class="icon-svg" viewBox="0 0 24 24"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
  flame: `<svg class="icon-svg" viewBox="0 0 24 24"><path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 01-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z"/></svg>`,
  shower: `<svg class="icon-svg" viewBox="0 0 24 24"><path d="M4 4l16 16"/><path d="M4.93 4.93A10 10 0 0119.07 19.07"/><path d="M12 3a9 9 0 019 9"/><circle cx="9" cy="15" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="15" r="1" fill="currentColor" stroke="none"/></svg>`,
  thermometer: `<svg class="icon-svg" viewBox="0 0 24 24"><path d="M14 14.76V3.5a2.5 2.5 0 00-5 0v11.26a4.5 4.5 0 105 0z"/></svg>`,
};

const FACILITIES = [
  { icon: FACILITY_ICONS.gear,        name:'空調設備 A棟' },
  { icon: FACILITY_ICONS.droplet,     name:'給排水設備' },
  { icon: FACILITY_ICONS.zap,         name:'電気設備' },
  { icon: FACILITY_ICONS.flame,       name:'消防設備' },
  { icon: FACILITY_ICONS.shower,      name:'衛生設備 B棟' },
  { icon: FACILITY_ICONS.thermometer, name:'冷凍設備' },
];

let entries = {
  '2026-4-1':  {equip:9,safety:9,comp:100,status:'ok'},
  '2026-4-2':  {equip:8,safety:8,comp:100,status:'ok'},
  '2026-4-3':  {equip:7,safety:8,comp:80, status:'warn'},
  '2026-4-5':  {equip:9,safety:9,comp:100,status:'ok'},
  '2026-4-6':  {equip:9,safety:9,comp:100,status:'ok'},
  '2026-4-7':  {equip:8,safety:8,comp:100,status:'ok'},
  '2026-4-8':  {equip:6,safety:7,comp:70, status:'warn'},
  '2026-4-9':  {equip:9,safety:9,comp:100,status:'ok'},
  '2026-4-10': {equip:9,safety:9,comp:100,status:'ok'},
  '2026-4-11': {equip:4,safety:5,comp:50, status:'ng'},
  '2026-4-12': {equip:8,safety:8,comp:90, status:'ok'},
  '2026-4-13': {equip:9,safety:9,comp:100,status:'ok'},
  '2026-4-14': {equip:9,safety:9,comp:100,status:'ok'},
  '2026-4-15': {equip:8,safety:9,comp:100,status:'ok'},
  '2026-4-16': {equip:7,safety:7,comp:80, status:'warn'},
  '2026-4-17': {equip:9,safety:9,comp:100,status:'ok'},
};

function key(y,m,d){ return y+'-'+(m+1)+'-'+d; }
function getDays(y,m){ return new Date(y,m+1,0).getDate(); }
function getFirstDow(y,m){ let d=new Date(y,m,1).getDay(); return d===0?6:d-1; }

function renderCalendar(){
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const days = getDays(viewYear,viewMonth);
  const start = getFirstDow(viewYear,viewMonth);
  const isCur = viewYear===TODAY.getFullYear() && viewMonth===TODAY.getMonth();

  document.getElementById('year-label').textContent    = viewYear;
  document.getElementById('month-num').textContent     = viewMonth+1;
  document.getElementById('month-name-el').textContent = MONTHS_EN[viewMonth];
  document.getElementById('avg-label-el').textContent  = (viewMonth+1)+'月の点検平均スコア';

  for(let i=0;i<start;i++){
    const c=document.createElement('div');
    c.className='cal-cell';
    c.innerHTML='<div class="day-num empty">·</div>';
    grid.appendChild(c);
  }
  for(let d=1;d<=days;d++){
    const k=key(viewYear,viewMonth,d);
    const e=entries[k];
    const isToday=isCur&&d===TODAY.getDate();
    const isPast=new Date(viewYear,viewMonth,d)<TODAY;

    let cls='day-num';
    let dot='';
    if(e){
      cls+=' '+e.status;
      dot=`<div class="status-dot dot-${e.status}"></div>`;
    } else if(isPast&&!isToday){ cls+=' past-no-log'; }
    if(isToday) cls+=' today';

    const cell=document.createElement('div');
    cell.className='cal-cell';
    cell.innerHTML=`<div class="${cls}" onclick="dayClick(${d})">${d}</div>${dot}`;
    grid.appendChild(cell);
  }
  updateAverages();
  renderList();
}

function updateAverages(){
  let eq=[],sf=[],cp=[];
  Object.keys(entries).forEach(k=>{
    const p=k.split('-');
    if(parseInt(p[0])===viewYear && parseInt(p[1])===(viewMonth+1)){
      eq.push(entries[k].equip);
      sf.push(entries[k].safety);
      cp.push(entries[k].comp);
    }
  });
  const avg=arr=>arr.length?(arr.reduce((a,b)=>a+b,0)/arr.length):null;
  const fmtScore=v=>{
    if(v===null) return '–';
    const f=v.toFixed(1).split('.');
    return f[0]+'<span>.'+f[1]+'</span>';
  };
  document.getElementById('avg-equip').innerHTML  = fmtScore(avg(eq));
  document.getElementById('avg-safety').innerHTML = fmtScore(avg(sf));
  const c=avg(cp);
  document.getElementById('avg-comp').innerHTML   = c===null?'–':Math.round(c)+'<span>%</span>';
}

function renderList(){
  const c=document.getElementById('list-content');
  const monthEntries=Object.keys(entries)
    .filter(k=>{ const p=k.split('-'); return parseInt(p[0])===viewYear&&parseInt(p[1])===(viewMonth+1); })
    .sort((a,b)=>parseInt(a.split('-')[2])-parseInt(b.split('-')[2]));

  if(!monthEntries.length){
    c.innerHTML='<div style="padding:24px;text-align:center;color:#aab;font-size:13px;">この月の記録はありません</div>';
    return;
  }
  c.innerHTML = monthEntries.map(k=>{
    const d=k.split('-')[2];
    const e=entries[k];
    const fac=FACILITIES[parseInt(d)%FACILITIES.length];
    const statusLabel={'ok':'正常','warn':'要注意','ng':'異常'}[e.status];
    return `<div class="detail-item">
      <div class="detail-icon">${fac.icon}</div>
      <div style="flex:1">
        <div class="detail-name">${(viewMonth+1)}/${d} ${fac.name}</div>
        <div style="font-size:10px;color:#aab;">設備:${e.equip} / 安全:${e.safety} / 完了:${e.comp}%</div>
      </div>
      <span class="detail-status ${e.status}">${statusLabel}</span>
    </div>`;
  }).join('');
}

function setTab(i){
  currentTab=i;
  document.querySelectorAll('.tab').forEach((t,idx)=>t.classList.toggle('active',idx===i));
  document.getElementById('view-cal').style.display      = i===0?'block':'none';
  document.getElementById('view-list').style.display     = i===1?'block':'none';
  document.getElementById('view-settings').style.display = 'none';
  setNavActive('nav-home');
}

function prevMonth(){ viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} renderCalendar(); }
function nextMonth(){ viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} renderCalendar(); }

function dayClick(d){
  selectedDay=d;
  const k=key(viewYear,viewMonth,d);
  const e=entries[k]||{equip:8,safety:8,comp:100,status:'ok'};
  document.getElementById('modal-title').textContent=(viewMonth+1)+'月'+d+'日の点検記録';
  document.getElementById('inp-equip').value=e.equip;
  document.getElementById('inp-safety').value=e.safety;
  document.getElementById('inp-comp').value=e.comp;
  document.getElementById('val-equip').textContent=e.equip;
  document.getElementById('val-safety').textContent=e.safety;
  document.getElementById('val-comp').textContent=e.comp;
  selectStatus(e.status);
  document.getElementById('modal').classList.add('open');
}

function openAdd(){ dayClick(TODAY.getDate()); }

function selectStatus(s){
  currentStatus=s;
  ['ok','warn','ng'].forEach(t=>{
    const b=document.getElementById('btn-'+t);
    b.className='status-btn'+(t===s?' sel-'+t:'');
  });
}

function closeModal(e){
  if(!e||e.target===document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
}

function saveEntry(){
  const k=key(viewYear,viewMonth,selectedDay);
  entries[k]={
    equip:  parseInt(document.getElementById('inp-equip').value),
    safety: parseInt(document.getElementById('inp-safety').value),
    comp:   parseInt(document.getElementById('inp-comp').value),
    status: currentStatus,
  };
  document.getElementById('modal').classList.remove('open');
  renderCalendar();
}

renderCalendar();

// ── Inspection item labels (editable by manager) ──
let inspectionItems = [
  { key: 'equip',  label: '設備状態スコア' },
  { key: 'safety', label: '安全確認スコア' },
  { key: 'comp',   label: '完了率（%）' },
];

// Facility icon pool (same order as FACILITIES)
const FAC_ICON_POOL = [
  FACILITY_ICONS.gear, FACILITY_ICONS.droplet, FACILITY_ICONS.zap,
  FACILITY_ICONS.flame, FACILITY_ICONS.shower, FACILITY_ICONS.thermometer,
];

function renderSettingsView() {
  // 点検項目 card
  const itemIcons = [
    `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>`,
    `<svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
    `<svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
  ];
  document.getElementById('settings-items-card').innerHTML = inspectionItems.map((item, i) =>
    `<div class="settings-row">
      <div class="settings-row-icon">${itemIcons[i]}</div>
      <div class="settings-row-body">
        <div class="settings-row-label">点検項目 ${i+1}</div>
        <input class="settings-row-input" id="set-item-${item.key}" value="${item.label}" placeholder="項目名を入力">
      </div>
    </div>`
  ).join('');

  // 設備名 card
  const facIconsSvg = [
    `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>`,
    `<svg viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg>`,
    `<svg viewBox="0 0 24 24"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
    `<svg viewBox="0 0 24 24"><path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 01-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z"/></svg>`,
    `<svg viewBox="0 0 24 24"><path d="M4 4l16 16"/><path d="M12 3a9 9 0 019 9"/><circle cx="9" cy="15" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="15" r="1" fill="currentColor" stroke="none"/></svg>`,
    `<svg viewBox="0 0 24 24"><path d="M14 14.76V3.5a2.5 2.5 0 00-5 0v11.26a4.5 4.5 0 105 0z"/></svg>`,
  ];
  document.getElementById('settings-facilities-card').innerHTML = FACILITIES.map((fac, i) =>
    `<div class="settings-row">
      <div class="settings-row-icon">${facIconsSvg[i % facIconsSvg.length]}</div>
      <div class="settings-row-body">
        <div class="settings-row-label">設備 ${i+1}</div>
        <input class="settings-row-input" id="set-fac-${i}" value="${fac.name}" placeholder="設備名を入力">
      </div>
    </div>`
  ).join('');
}

function saveSettings() {
  // Save inspection item labels
  inspectionItems.forEach(item => {
    const inp = document.getElementById('set-item-' + item.key);
    if (inp) item.label = inp.value.trim() || item.label;
  });
  // Update modal labels
  inspectionItems.forEach(item => {
    const el = document.getElementById('label-' + item.key);
    if (el) el.textContent = item.label;
  });
  // Save facility names
  FACILITIES.forEach((fac, i) => {
    const inp = document.getElementById('set-fac-' + i);
    if (inp) fac.name = inp.value.trim() || fac.name;
  });
  renderList();
  // Show toast
  const toast = document.getElementById('settings-toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

function openSettings() {
  renderSettingsView();
  document.getElementById('view-cal').style.display   = 'none';
  document.getElementById('view-list').style.display  = 'none';
  document.getElementById('view-settings').style.display = 'flex';
  setNavActive('nav-alert-or-settings');
}

function goHome() {
  document.getElementById('view-settings').style.display = 'none';
  setTab(currentTab);
  setNavActive('nav-home');
}

function setNavActive(id) {
  ['nav-home', 'nav-alert-or-settings'].forEach(nid => {
    const el = document.getElementById(nid);
    if (el) el.classList.toggle('active', nid === id);
  });
}

function navAlertOrSettings() {
  if (selectedRole === 'manager') openSettings();
}
let selectedRole = null;

function selectRole(role) {
  selectedRole = role;
  document.getElementById('card-inspector').classList.toggle('selected', role === 'inspector');
  document.getElementById('card-manager').classList.toggle('selected', role === 'manager');
  document.getElementById('role-btn').classList.add('ready');
  const label = role === 'inspector' ? '点検者としてログイン中' : '管理人としてログイン中';
  document.getElementById('role-badge-text').textContent = label;
  document.getElementById('role-badge').classList.add('show');
}

function enterApp() {
  if (!selectedRole) return;
  const screen = document.getElementById('role-screen');
  screen.classList.add('fade-out');
  setTimeout(() => {
    screen.classList.add('hidden');
    const app = document.getElementById('app-inner');
    app.style.display = 'flex';
    app.style.opacity = '0';
    app.style.transition = 'opacity .35s ease';
    requestAnimationFrame(() => { app.style.opacity = '1'; });
    const roleLabel = selectedRole === 'inspector' ? '点検者' : '管理人';
    const badge = document.getElementById('header-role-badge');
    if (badge) badge.textContent = roleLabel;

    // Switch alert ↔ settings based on role
    const iconEl  = document.getElementById('nav-alert-icon');
    const labelEl = document.getElementById('nav-alert-label');
    if (selectedRole === 'manager') {
      iconEl.innerHTML = `<svg class="icon-svg" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>`;
      labelEl.textContent = '設定';
    } else {
      iconEl.innerHTML = `<svg class="icon-svg" viewBox="0 0 24 24">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 01-3.46 0"/>
      </svg><span class="notif-dot"></span>`;
      labelEl.textContent = 'アラート';
    }
  }, 380);
}

function logout() {
  const app = document.getElementById('app-inner');
  app.style.transition = 'opacity .3s ease';
  app.style.opacity = '0';
  setTimeout(() => {
    app.style.display = 'none';
    // Reset role selection state
    selectedRole = null;
    document.getElementById('card-inspector').classList.remove('selected');
    document.getElementById('card-manager').classList.remove('selected');
    document.getElementById('role-btn').classList.remove('ready');
    document.getElementById('role-badge').classList.remove('show');
    document.getElementById('role-badge-text').textContent = '';
    // Show role screen again
    const screen = document.getElementById('role-screen');
    screen.classList.remove('hidden', 'fade-out');
    screen.style.opacity = '0';
    screen.style.transition = 'opacity .35s ease';
    requestAnimationFrame(() => { screen.style.opacity = '1'; });
  }, 280);
}
</script>
</body>
</html>
