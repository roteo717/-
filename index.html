        <!-- 複製ボタン -->
        <button onclick="event.stopPropagation();copyEquipment('${eq.id}');"
          title="この設備を複製"
          style="padding:5px 9px;background:#EEF2FF;border:1px solid #C7D2FE;border-radius:8px;color:#4F46E5;font-size:11px;font-weight:700;cursor:pointer;touch-action:manipulation;font-family:inherit;white-space:nowrap;flex-shrink:0;transition:all .15s;display:flex;align-items:center;gap:4px;"
          onmousedown="this.style.background='#C7D2FE'" onmouseup="this.style.background='#EEF2FF'">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><rect x="4" y="4" width="6" height="6" rx="1.2" stroke="currentColor" stroke-width="1.3"/><path d="M7 4V2.5A.5.5 0 006.5 2H2A.5.5 0 001.5 2.5v4.5a.5.5 0 00.5.5H4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          複製
        </button>
        <!-- 点検項目展開 -->
        <button onclick="event.stopPropagation();S.leItemExpanded.has('${eq.id}')?S.leItemExpanded.delete('${eq.id}'):S.leItemExpanded.add('${eq.id}');render();"
          style="padding:5px 9px;background:${expanded?'#FFF1F1':'#F1F3F8'};border:1px solid ${expanded?'rgba(200,41,42,0.3)':'#E4E8EF'};border-radius:8px;color:${expanded?'#C8292A':'#374151'};font-size:11px;font-weight:600;cursor:pointer;touch-action:manipulation;font-family:inherit;white-space:nowrap;flex-shrink:0;transition:all .15s;">
          ${expanded?'▲ 項目':'▼ 項目'}
        </button>
        <!-- ⋯ メニュー -->
        <div style="position:relative;">
          <button onclick="event.stopPropagation();S.leMenu=(S.leMenu&&S.leMenu.type==='eq'&&S.leMenu.id==='${eq.id}')?null:{type:'eq',id:'${eq.id}'};render();"
            style="width:28px;height:28px;border-radius:7px;background:${menuOpen?'#F1F3F8':'transparent'};border:none;color:#9CA3AF;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;">
            <svg width="13" height="3" viewBox="0 0 13 3" fill="none"><circle cx="1.5" cy="1.5" r="1.5" fill="currentColor"/><circle cx="6.5" cy="1.5" r="1.5" fill="currentColor"/><circle cx="11.5" cy="1.5" r="1.5" fill="currentColor"/></svg>
          </button>
          ${menuOpen ? `
          <div style="position:absolute;right:0;top:32px;background:#FFFFFF;border:1px solid #E4E8EF;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:100;min-width:110px;overflow:hidden;" onclick="event.stopPropagation()">
            <button onclick="S.leMenu=null;S.modal={type:'editEq',eid:'${eq.id}'};render();" style="width:100%;padding:10px 14px;background:none;border:none;color:#374151;font-size:12px;font-weight:500;text-align:left;cursor:pointer;display:flex;align-items:center;gap:8px;touch-action:manipulation;font-family:inherit;" onmousedown="this.style.background='#F8F9FC'" onmouseup="this.style.background=''">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 1.5l2.5 2.5-6.5 6.5H1.5V8L8 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
              名前変更
            </button>
            <div style="height:1px;background:#F3F4F6;margin:0 9px;"></div>
            <button onclick="S.leMenu=null;leDelEq('${eq.id}');" style="width:100%;padding:10px 14px;background:none;border:none;color:#C8292A;font-size:12px;font-weight:500;text-align:left;cursor:pointer;display:flex;align-items:center;gap:8px;touch-action:manipulation;font-family:inherit;" onmousedown="this.style.background='rgba(200,41,42,0.06)'" onmouseup="this.style.background=''">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1.5 3h9M3.5 3V2A.5.5 0 014 1.5h4a.5.5 0 01.5.5V3M4.5 5.5v4M7.5 5.5v4M2 3l.75 7.5a.5.5 0 00.5.5h5.5a.5.5 0 00.5-.5L10 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
              削除
            </button>
          </div>` : ''}
        </div>
      </div>
      <!-- 点検項目インライン展開 -->
      ${expanded ? `
      <div style="border-top:1px dashed #E4E8EF;background:#FAFBFD;padding:10px 12px 12px;">
        <div style="font-size:10px;font-weight:700;color:#9CA3AF;letter-spacing:.8px;margin-bottom:8px;">点検項目（${eq.items.length}件）</div>
        ${eq.items.length > 0 ? eq.items.map((it,idx) => `
        <div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#FFFFFF;border:1px solid #E4E8EF;border-radius:9px;margin-bottom:4px;">
          <span style="width:20px;height:20px;background:#F1F3F8;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#9CA3AF;flex-shrink:0;">${idx+1}</span>
          <span style="flex:1;font-size:12px;font-weight:500;color:#111827;line-height:1.3;">${it.n}</span>
          <span style="font-size:10px;font-weight:600;color:${freqColor(it.t)};background:${freqBg(it.t)};padding:2px 8px;border-radius:6px;white-space:nowrap;">${FREQ_LABELS[it.t]||it.t}</span>
          <button onclick="S.modal={type:'editItem',eid:'${eq.id}',iid:'${it.id}',freq:'${it.t}'};render();" style="padding:4px 8px;border:1px solid #E4E8EF;border-radius:6px;background:none;color:#6B7280;font-size:11px;font-weight:600;cursor:pointer;touch-action:manipulation;font-family:inherit;" onmousedown="this.style.background='#F1F3F8'" onmouseup="this.style.background=''">編集</button>
          <button onclick="delItem('${eq.id}','${it.id}')" style="padding:4px 8px;border:1px solid rgba(200,41,42,0.25);border-radius:6px;background:rgba(200,41,42,0.07);color:#C8292A;font-size:11px;font-weight:600;cursor:pointer;touch-action:manipulation;font-family:inherit;" onmousedown="this.style.background='rgba(200,41,42,0.15)'" onmouseup="this.style.background='rgba(200,41,42,0.07)'">削除</button>
        </div>`).join('') : `<div style="text-align:center;padding:12px;color:#9CA3AF;font-size:12px;">点検項目がありません</div>`}
        <button onclick="S.modal={type:'addItem',eid:'${eq.id}',freq:'毎日'};render();"
          style="width:100%;padding:10px;border:1.5px dashed #D1D5DB;background:transparent;border-radius:9px;color:#C8292A;cursor:pointer;font-size:12px;font-weight:600;margin-top:4px;touch-action:manipulation;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 1v8M1 5h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          点検項目を追加
        </button>
      </div>` : ''}
    </div>`;
  }).join('');

  // ─────────────────────────────────────────────
  // TAB B: ライン管理
  // ─────────────────────────────────────────────
  const lineMgmtHtml = S.lines.map((l, idx) => {
    const isFocus = S.leLineSel === l.id;
    const lineEqs = getLineEquip(l);
    return `
    <div style="background:#FFFFFF;border:1.5px solid ${isFocus?'#C8292A':'#E4E8EF'};border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color .2s;">
      <div style="padding:12px 14px;cursor:pointer;" onclick="S.leLineSel=(S.leLineSel==='${l.id}'?null:'${l.id}');render();">
        <!-- 上段：ドット + 名前 + 矢印 -->
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:8px;height:8px;border-radius:50%;background:${isFocus?'#C8292A':'#9CA3AF'};flex-shrink:0;transition:background .2s;"></div>
          <div style="flex:1;min-width:0;overflow:hidden;">
            <div style="font-size:14px;font-weight:700;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${l.name}</div>
            <div style="font-size:11px;color:#9CA3AF;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${l.desc||l.location||''} · 設備 ${lineEqs.length}台</div>
          </div>
          <svg width="7" height="12" viewBox="0 0 7 12" fill="none" style="transform:${isFocus?'rotate(90deg)':'rotate(0deg)'};transition:transform .2s;flex-shrink:0;"><path d="M1 1l5 5-5 5" stroke="#9CA3AF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <!-- 下段：設備タグ + ボタン -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:8px;">
          <div style="display:flex;gap:3px;flex-wrap:wrap;flex:1;min-width:0;">
            ${lineEqs.slice(0,3).map(e=>`<span style="font-size:10px;font-weight:600;color:#374151;background:#F1F3F8;padding:2px 7px;border-radius:6px;white-space:nowrap;">${eqDisplayName(e)}</span>`).join('')}
            ${lineEqs.length>3?`<span style="font-size:10px;color:#9CA3AF;padding:2px 4px;">+${lineEqs.length-3}</span>`:''}
          </div>
          <div style="display:flex;gap:5px;flex-shrink:0;">
            <button onclick="event.stopPropagation();S.modal={type:'editLine',lid:'${l.id}'};render();"
              style="padding:5px 12px;background:#F8F9FC;border:1px solid #E4E8EF;border-radius:7px;color:#6B7280;font-size:11px;font-weight:600;cursor:pointer;touch-action:manipulation;font-family:inherit;white-space:nowrap;">編集</button>
            <button onclick="event.stopPropagation();delLine('${l.id}')"
              style="padding:5px 12px;background:rgba(200,41,42,0.06);border:1px solid rgba(200,41,42,0.2);border-radius:7px;color:#C8292A;font-size:11px;font-weight:600;cursor:pointer;touch-action:manipulation;font-family:inherit;white-space:nowrap;">削除</button>
          </div>
        </div>
      </div>
      ${isFocus ? `
      <div style="border-top:1px solid #F0F1F6;padding:10px 14px;">
        <div style="font-size:10px;font-weight:700;color:#374151;letter-spacing:.8px;margin-bottom:8px;">このラインに含める設備（${S.equipments.length}台から選択）</div>
        ${S.equipments.length > 0 ? [...S.equipments].sort((a,b)=>(a.name||'').localeCompare(b.name||'','ja')).map(eq => {
          const checked = (l.equipmentIds||[]).includes(eq.id);
          return `<div onclick="v5ToggleLineEq('${l.id}','${eq.id}')"
            style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;cursor:pointer;background:${checked?'#FFF5F5':'transparent'};margin-bottom:4px;border:1px solid ${checked?'rgba(200,41,42,0.2)':'transparent'};transition:all .15s;">
            <div style="width:22px;height:22px;border-radius:7px;border:2px solid ${checked?'#C8292A':'#CBD5E1'};background:${checked?'#C8292A':'#FFFFFF'};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;">
              ${checked?`<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1.5 4.5l3 3 5-7" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:13px;font-weight:${checked?700:400};color:${checked?'#C8292A':'#374151'};">${eqDisplayName(eq)}</div>
              <div style="font-size:10px;color:#9CA3AF;margin-top:1px;">${eq.items.length}件の点検項目</div>
            </div>
            ${checked?`<span style="font-size:10px;font-weight:700;color:#C8292A;background:#FFF1F1;padding:2px 8px;border-radius:7px;flex-shrink:0;">✓ 登録済</span>`:''}
          </div>`;
        }).join('') : `<div style="padding:14px;text-align:center;color:#9CA3AF;font-size:12px;">設備マスターが空です。先に設備を追加してください。</div>`}
      </div>` : ''}
    </div>`;
  }).join('');

  // ─────────────────────────────────────────────
  // TAB C: 担当者紐づけ
  // ─────────────────────────────────────────────
  const asgnSt       = asgnState();
  const allAsgnNames = [...S.names.inspector, ...S.names.admin];
  const selName      = asgnSt.selName;
  const existAssign  = getUserAssignment(selName);
  const totalSel     = asgnSt.checked.length;
  const assignedCount = S.assignments ? S.assignments.length : 0;
  const totalInspectors = S.names?.inspector?.length || 0;
  const unassigned   = totalInspectors - assignedCount;

  const asgnNamePills = allAsgnNames.map(n => {
    const on = n === selName, saved = !!getUserAssignment(n);
    return `<button onclick="asgnSetName('${n.replace(/'/g,"\'")}');"
      style="flex-shrink:0;display:inline-flex;align-items:center;gap:5px;padding:6px 11px 6px 8px;border-radius:20px;border:2px solid ${on?'rgba(255,255,255,0.95)':'rgba(255,255,255,0.22)'};background:${on?'rgba(255,255,255,0.20)':'rgba(255,255,255,0.06)'};color:${on?'#FFFFFF':'rgba(255,255,255,0.60)'};font-size:12px;font-weight:${on?700:500};cursor:pointer;touch-action:manipulation;font-family:inherit;white-space:nowrap;transition:all .15s;letter-spacing:-.2px;">
      <span style="width:20px;height:20px;border-radius:50%;background:${on?'rgba(255,255,255,0.28)':'rgba(255,255,255,0.10)'};display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#FFFFFF;flex-shrink:0;">${n.replace(/\s/g,'').slice(0,2)}</span>
      ${n}${saved?`<svg width="5" height="5" viewBox="0 0 6 6"><circle cx="3" cy="3" r="3" fill="${on?'#86EFAC':'rgba(134,239,172,0.75)'}" /></svg>`:''}
    </button>`;
  }).join('');

  // ライン×設備ツリー for assignment
  const asgnLineBlocks = S.lines.map((line) => {
    const open    = asgnSt.openLines.includes(line.id);
    const eqIds   = getLineEquip(line).map(e => e.id);
    const selCnt  = eqIds.filter(id => asgnSt.checked.includes(id)).length;
    const allOn   = selCnt === eqIds.length && eqIds.length > 0;
    const someOn  = selCnt > 0 && !allOn;
    const hBg     = allOn?'#EEF2FF':someOn?'#F5F7FF':'#F8F9FC';
    const hBdr    = allOn?'#6366F1':someOn?'#A5B4FC':'#E4E8EF';
    const hClr    = allOn?'#3730A3':someOn?'#4338CA':'#374151';
    const eqRows  = getLineEquip(line).map(e=>{
      const on=asgnSt.checked.includes(e.id);
      return `<div onclick="asgnToggleEq('${e.id}')" style="display:flex;align-items:center;gap:14px;padding:12px 18px;border-top:1px solid #F0F1F6;cursor:pointer;background:${on?'#EEF2FF':'#FFFFFF'};transition:background .1s;">
        <div style="width:22px;height:22px;border-radius:7px;border:2px solid ${on?'#4F46E5':'#CBD5E1'};background:${on?'#4F46E5':'#FFFFFF'};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;">
          ${on?`<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1.5 4.5l3 3 5-7" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:14px;font-weight:${on?600:400};color:${on?'#1E1B4B':'#4B5563'};">${eqDisplayName(e)}</div>
          ${(e.equipmentNumber)?`<div style="font-size:10px;color:#9CA3AF;margin-top:1px;">${eqLineNames(e).join('・')}</div>`:''}
        </div>
        ${on?`<span style="font-size:10px;font-weight:700;color:#4F46E5;background:#EEF2FF;padding:3px 9px;border-radius:8px;border:1px solid #C7D2FE;">担当</span>`:''}
      </div>`;
    }).join('');
    return `<div style="border:2px solid ${hBdr};border-radius:16px;margin-bottom:10px;overflow:hidden;background:#FFFFFF;box-shadow:0 1px 4px rgba(0,0,0,0.05);transition:border-color .2s;">
      <div style="background:${hBg};display:flex;align-items:center;transition:background .2s;">
        <button onclick="asgnToggleOpen('${line.id}')" style="padding:15px 4px 15px 14px;background:none;border:none;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;">
          <svg width="9" height="14" viewBox="0 0 9 14" fill="none" style="transform:${open?'rotate(90deg)':'rotate(0deg)'};transition:transform .2s;flex-shrink:0;">
            <path d="M2 2l5 5L2 12" stroke="${hClr}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div onclick="asgnToggleLine('${line.id}')" style="flex:1;display:flex;align-items:center;gap:12px;padding:15px 14px 15px 8px;cursor:pointer;">
          <div style="width:22px;height:22px;border-radius:7px;border:2px solid ${allOn?'#4F46E5':someOn?'#818CF8':'#CBD5E1'};background:${allOn?'#4F46E5':someOn?'#EEF2FF':'#FFFFFF'};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;">
            ${allOn?`<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1.5 4.5l3 3 5-7" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:someOn?`<div style="width:8px;height:3px;background:#4F46E5;border-radius:2px;"></div>`:''}
          </div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:15px;font-weight:700;color:${hClr};">${line.name}</div>
            <div style="font-size:11px;color:#9CA3AF;margin-top:1px;">${line.desc||''}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-size:13px;font-weight:700;color:${selCnt>0?'#4F46E5':'#9CA3AF'};">${selCnt}/${eqIds.length}台</div>
            <div style="font-size:9px;font-weight:600;color:${selCnt>0?'#6366F1':'#C4C9D4'};margin-top:1px;">${selCnt>0?'選択中':'未選択'}</div>
          </div>
        </div>
      </div>
      ${open ? eqRows : ''}
    </div>`;
  }).join('');

  // ─────────────────────────────────────────────
  // タブナビゲーション
  // ─────────────────────────────────────────────
  const tabs = [
    {id:'equip', label:'設備マスター', icon:`<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1.5" y="4" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 4V3a2.5 2.5 0 015 0v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`, count: S.equipments.length},
    {id:'line',  label:'ライン管理',   icon:`<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1.5" y="1.5" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M4 5h7M4 7.5h5M4 10h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`, count: S.lines.length},
    {id:'assign',label:'担当者紐づけ',  icon:`<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="5" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M2 13c0-3.038 2.462-5.5 5.5-5.5S13 9.962 13 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>`, count: S.assignments.length},
  ];

  const tabBar = tabs.map(t => {
    const on = t.id === curTab;
    return `<button onclick="S.leTab='${t.id}';render();"
      style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border:none;background:none;cursor:pointer;touch-action:manipulation;font-family:inherit;border-bottom:2.5px solid ${on?'#C8292A':'transparent'};transition:border-color .2s;">
      <div style="color:${on?'#C8292A':'#9CA3AF'};transition:color .2s;">${t.icon}</div>
      <span style="font-size:10px;font-weight:${on?700:500};color:${on?'#C8292A':'#9CA3AF'};white-space:nowrap;transition:color .2s;">${t.label}</span>
      <span style="font-size:9px;font-weight:700;color:${on?'#C8292A':'#CBD5E1'};transition:color .2s;">${t.count}</span>
    </button>`;
  }).join('');

  // ─────────────────────────────────────────────
  // TAB C 担当者紐づけ — 保存ボタン

// [v5 NEW] ラインの equipmentIds をトグル（チェックボックス操作）
function v5ToggleLineEq(lid, eid){
  const l = getLn(lid);
  if(!l) return;
  l.equipmentIds = l.equipmentIds || [];
  const idx = l.equipmentIds.indexOf(eid);
  const eq = getEq(eid);
  if(idx >= 0){
    l.equipmentIds.splice(idx, 1);
    // [v6] lineIds sync
    if(eq && eq.lineIds){ eq.lineIds = eq.lineIds.filter(id=>id!==lid); }
    toast(`${eqDisplayName(eq)} をラインから外しました`, 'warn');
  } else {
    l.equipmentIds.push(eid);
    // [v6] lineIds sync
    if(eq){ eq.lineIds = eq.lineIds||[]; if(!eq.lineIds.includes(lid)) eq.lineIds.push(lid); }
    toast(`${eqDisplayName(eq)} を ${l.name} に追加しました`);
  }
  render();
}

function leDelLine(lid){
  // [v3] 削除を有効化（仕様通り）
  delLine(lid);
}
function leDelEq(eid){
  // [v5] マスターから削除 + 全ラインのequipmentIdsからも除去
  const eq=getEq(eid);
  if(!eq||!confirm(`「${eq.name}」を削除しますか？
※ 全ラインから外れます`))return;
  S.equipments=S.equipments.filter(e=>e.id!==eid);
  S.lines.forEach(l=>{l.equipmentIds=(l.equipmentIds||[]).filter(id=>id!==eid);});
  toast('設備を削除しました');render();
}

/* ═══════════ EQ MONTHLY PDF MODAL ═══════════ */
function openEqPdfModal(){
  // Default: all equipment selected
  const allEids=S.lines.flatMap(l=>getLineEquip(l).map(e=>e.id));
  S.eqPdfModal={on:true,year:new Date().getFullYear(),month:new Date().getMonth()+1,eids:allEids};
  render();
}
function toggleEqPdfEid(eid){
  const m=S.eqPdfModal;
  m.eids=m.eids.includes(eid)?m.eids.filter(x=>x!==eid):[...m.eids,eid];
  render();
}
function toggleEqPdfLine(lid){
  const m=S.eqPdfModal;
  const lineEids=getLineEquip(getLn(lid)).map(e=>e.id);
  const allOn=lineEids.every(id=>m.eids.includes(id));
  m.eids=allOn?m.eids.filter(id=>!lineEids.includes(id)):[...new Set([...m.eids,...lineEids])];
  render();
}

function renderEqPdfModal(){
  const m=S.eqPdfModal;
  const allEids=S.lines.flatMap(l=>getLineEquip(l).map(e=>e.id));
  const allSelected=allEids.every(id=>m.eids.includes(id));
  const now=new Date();
  // month nav bounds: don't go into future
  const isMaxMonth=m.year===now.getFullYear()&&m.month===now.getMonth()+1;
  const prevM=()=>{if(m.month===1){m.year--;m.month=12;}else m.month--;render();};
  const nextM=()=>{if(isMaxMonth)return;if(m.month===12){m.year++;m.month=1;}else m.month++;render();};

  const lineRows=S.lines.map(l=>{
    const lineAllOn=getLineEquip(l).every(e=>m.eids.includes(e.id));
    const lineSomeOn=getLineEquip(l).some(e=>m.eids.includes(e.id));
    return`
    <div style="margin-bottom:4px;">
      <!-- Line header row -->
      <div onclick="toggleEqPdfLine('${l.id}')" style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:#F0F1F5;border-radius:10px;cursor:pointer;touch-action:manipulation;margin-bottom:2px;" onmousedown="this.style.opacity='.7'" onmouseup="this.style.opacity='1'" onmouseleave="this.style.opacity='1'">
        <div style="width:18px;height:18px;border-radius:5px;border:1.5px solid ${lineAllOn?'#4F8EF7':'rgba(0,0,0,0.12)'};background:${lineAllOn?'#4F8EF7':lineSomeOn?'rgba(79,142,247,0.3)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;">
          ${lineAllOn?`<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`:(lineSomeOn?`<div style="width:8px;height:2px;background:#4F8EF7;border-radius:1px;"></div>`:'')}
        </div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:700;color:#333333;">${l.name}</div>
          <div style="font-size:11px;color:#888888;">${l.desc} · ${getLineEquip(l).length}台</div>
        </div>
        <div style="font-size:11px;color:#888888;">${getLineEquip(l).filter(e=>m.eids.includes(e.id)).length}/${getLineEquip(l).length}</div>
      </div>
      <!-- Equipment rows -->
      <div style="padding-left:12px;">
        ${getLineEquip(l).map(eq=>{
          const on=m.eids.includes(eq.id);
          return`<div onclick="toggleEqPdfEid('${eq.id}')" style="display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:8px;cursor:pointer;touch-action:manipulation;transition:background .12s;" onmousedown="this.style.background='rgba(0,0,0,0.04)'" onmouseup="this.style.background=''" onmouseleave="this.style.background=''">
            <div style="width:16px;height:16px;border-radius:4px;border:1.5px solid ${on?'#4F8EF7':'rgba(0,0,0,0.08)'};background:${on?'#4F8EF7':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;">
              ${on?`<svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5l2.5 2.5 4.5-5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:13px;font-weight:600;color:${on?'#E8EAF0':'#6A7080'};transition:color .15s;">${eq.name}</div>
              <div style="font-size:11px;color:#999999;">点検項目 ${eq.items.length}件</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  return`<div class="overlay" onclick="if(event.target===this){S.eqPdfModal.on=false;render();}">
  <div class="sheet" style="background:#FFFFFF;border-radius:24px 24px 0 0;max-height:90vh;">
    <div class="sheet-handle" style="background:rgba(0,0,0,0.10);"></div>

    <!-- Title -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
      <div style="width:40px;height:40px;background:rgba(79,142,247,0.15);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        ${PDF_ICO}
      </div>
      <div>
        <div style="font-size:17px;font-weight:800;color:#111111;">設備別月次PDF出力</div>
        <div style="font-size:12px;color:#777777;margin-top:1px;">設備ごとに1ページのPDFを作成します</div>
      </div>
    </div>

    <!-- Month selector -->
    <div style="margin-bottom:18px;">
      <div style="font-size:11px;font-weight:700;color:#888888;letter-spacing:.6px;margin-bottom:8px;">対象月</div>
      <div style="display:flex;align-items:center;gap:0;background:#F0F1F5;border-radius:12px;overflow:hidden;border:1px solid rgba(0,0,0,0.07);">
        <button onclick="(${prevM.toString()})()" style="width:44px;height:44px;background:none;border:none;color:#6A7080;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:color .15s;" onmousedown="this.style.color='#E8EAF0'" onmouseup="this.style.color='#6A7080'">‹</button>
        <div style="flex:1;text-align:center;font-size:17px;font-weight:800;color:#111111;letter-spacing:-.3px;">${m.year}年 ${m.month}月</div>
        <button onclick="(${nextM.toString()})()" style="width:44px;height:44px;background:none;border:none;color:${isMaxMonth?'#2A3040':'#6A7080'};cursor:${isMaxMonth?'default':'pointer'};touch-action:manipulation;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:color .15s;" ${isMaxMonth?'disabled':''} onmousedown="this.style.color='#E8EAF0'" onmouseup="this.style.color='#6A7080'">›</button>
      </div>

function exportEqMonthlyPDF(year, month, eids){
  const daysInMonth=new Date(year,month,0).getDate();
  const days=Array.from({length:daysInMonth},(_,i)=>i+1);
  const adminName=S.currentName||'管理者';
  const WDAYS=['日','月','火','水','木','金','土'];

  function ds(d){return`${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
  function getDow(d){return new Date(ds(d)).getDay();}
  function isWeekend(d){const dw=getDow(d);return dw===0||dw===6;}

  function getResult(eid,iid,inspType,day){
    const key=eid+':'+inspType;
    const insp=S.insps[key];
    if(!insp||insp.date!==ds(day))return'';
    return insp.results?.[iid]?.r||'';
  }
  function getComment(eid,iid,inspType,day){
    const key=eid+':'+inspType;
    const insp=S.insps[key];
    if(!insp||insp.date!==ds(day))return'';
    return insp.results?.[iid]?.comment||'';
  }

  // Build one page per equipment
  const pages=eids.map(eid=>{
    const eq=getEq(eid);
    if(!eq)return'';
    const line=getLn(eq.lid);
    const dailyItems=eq.items.filter(i=>i.t==='毎日');
    const tenItems=eq.items.filter(i=>i.t==='10日');
    const monthItems=eq.items.filter(i=>i.t==='月次');

    // Day header row — highlight weekends
    const dayHdrs=days.map(d=>{
      const dw=getDow(d);
      const sun=dw===0,sat=dw===6;
      const bg=sun?'#e3f0ff':sat?'#ffeaea':'#e8e8e8';
      const col=sun?'#1565C0':sat?'#C62828':'#333';
      return`<th class="day-th" style="background:${bg};color:${col};">${d}</th>`;
    }).join('');

    // Anomaly notes for this equipment this month
    const eqAnoms=S.anomalies.filter(a=>{
      if(a.eid!==eid)return false;
      const[ay,am]=a.date.split('-');
      return parseInt(ay)===year&&parseInt(am)===month;
    });
    const anomSection=eqAnoms.length>0?`
    <div class="anom-section">
      <div class="anom-title">▼ 異常記録</div>
      <table class="anom-table">
        <thead><tr><th>日付</th><th>点検項目</th><th>内容</th><th>対応状況</th><th>発見者</th></tr></thead>
        <tbody>
          ${eqAnoms.map(a=>{
            const stMap={open:'未対応',['in-progress']:'対応中',resolved:'解決済'};
            const stCol={open:'#c62828',['in-progress']:'#e65100',resolved:'#2e7d32'};
            const dd=new Date(a.date);
            return`<tr>
              <td>${dd.getMonth()+1}/${dd.getDate()}(${WDAYS[dd.getDay()]})</td>
              <td>${a.iname}</td>
              <td style="color:#c62828;">${a.comment}</td>
              <td style="color:${stCol[a.status]};font-weight:700;">${stMap[a.status]||a.status}</td>
              <td>${a.by}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`:'';

    function buildSection(items,label,inspType){
      if(!items.length)return'';
      const rows=items.map((it,idx)=>{
        const cells=days.map(d=>{
          const r=getResult(eid,it.id,inspType,d);
          const sym=r==='ok'?'○':r==='ng'?'×':'';
          const wknd=isWeekend(d);
          return`<td class="day-td${r==='ng'?' ng-cell':''}" style="${wknd?'background:#f9f9f9;':''}">${sym}</td>`;
        }).join('');
        const groupTd=idx===0?`<td class="group-td" rowspan="${items.length}">${label}</td>`:'';
        return`<tr>${groupTd}<td class="no-td">${idx+1}</td><td class="item-td">${it.n}</td>${cells}<td class="sig-td"></td><td class="sig-td"></td></tr>`;
      }).join('');
      const noteText={毎日点検:'毎日点検：機械使用前に実施',['10日点検']:'10日点検：10日ごとに1回実施',月次点検:'月次点検：月1回実施'}[inspType]||'';
      return`<tr class="section-note"><td colspan="${daysInMonth+5}">${noteText}</td></tr>${rows}`;
    }

    return`
    <div class="eq-page">
      <!-- Page header -->
      <div class="page-header">
        <div class="page-header-left">
          <div class="page-title">日常点検表</div>
          <div class="page-sub">${line.name}（${line.desc}）　▶　<strong>${eq.name}</strong></div>
        </div>
        <div class="page-header-right">
          <div>${year}年&nbsp;&nbsp;${month}月</div>
          <div>確認者：<strong>${adminName}</strong>（管理者）</div>
          <div>点検項目数：${eq.items.length}件</div>
        </div>
      </div>

      <!-- Main table -->
      <table>
        <thead>
          <tr class="hdr-row">
            <th class="group-td">区分</th>
            <th class="no-td">No</th>
            <th class="item-td">点　検　項　目</th>
            ${dayHdrs}
            <th class="sig-th">点検者</th>
            <th class="sig-th">確認者</th>
          </tr>
        </thead>
        <tbody>
          ${buildSection(dailyItems,'日\n常',  '毎日点検')}
          ${buildSection(tenItems,  '10\n日',  '10日点検')}
          ${buildSection(monthItems,'月\n次',  '月次点検')}
          ${!dailyItems.length&&!tenItems.length&&!monthItems.length?
            `<tr><td colspan="${daysInMonth+5}" style="text-align:center;padding:14px;color:#aaa;">点検項目が登録されていません</td></tr>`:''}
        </tbody>
      </table>

      <!-- Legend -->
      <div class="legend">
        <strong>記入例：</strong>
        <span>正常：<strong>○</strong></span>
        <span>異常：<strong style="color:#c62828;">×</strong></span>
        <span class="sun-leg">日曜</span>
        <span class="sat-leg">土曜</span>
        <span>異常発生時は異常記録欄に詳細を記入すること</span>
      </div>

      ${anomSection}
    </div>`;
  }).join('');

  const html=`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<title>設備別点検表 ${year}年${month}月</title>
<style>
@page{size:A3 landscape;margin:7mm;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;font-size:9px;background:white;color:#000;}
.eq-page{page-break-after:always;}
.eq-page:last-child{page-break-after:avoid;}
.page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px;padding-bottom:5px;border-bottom:2px solid #111;}
.page-title{font-size:15px;font-weight:800;margin-bottom:2px;}
.page-sub{font-size:9px;color:#444;}
.page-header-right{text-align:right;font-size:8px;color:#555;line-height:1.8;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
th,td{border:0.5px solid #777;padding:1px 2px;text-align:center;vertical-align:middle;}
.hdr-row th{background:#333;color:white;font-size:7.5px;font-weight:700;padding:3px 2px;}
.group-td{width:14px;font-size:7px;writing-mode:vertical-rl;text-orientation:upright;background:#555;color:white;font-weight:800;white-space:pre-line;line-height:1.3;}
.no-td{width:16px;font-size:8px;}
.item-td{width:130px;text-align:left;padding:2px 4px;font-size:8px;line-height:1.3;}
.day-th{width:${Math.max(10,Math.floor(650/daysInMonth))}px;font-size:7px;padding:1px;}
.day-td{font-size:9px;padding:1px;height:18px;}
.sig-th{width:28px;font-size:7px;background:#aaa;}
.sig-td{width:28px;height:18px;}
.ng-cell{background:#ffebee;color:#c62828;font-weight:800;}
.section-note td{background:#f5f5f5;text-align:left;padding:2px 6px;font-size:7.5px;color:#555;border-top:1px solid #999;font-style:italic;}
.legend{margin-top:4px;font-size:7.5px;display:flex;gap:14px;align-items:center;padding:3px 6px;border:0.5px solid #ccc;background:#fafafa;}
.sun-leg{color:#1565C0;font-weight:700;}
.sat-leg{color:#C62828;font-weight:700;}
.anom-section{margin-top:8px;}
.anom-title{font-size:9px;font-weight:800;background:#c62828;color:white;padding:3px 8px;}
.anom-table{width:100%;border-collapse:collapse;margin-top:0;}
.anom-table th{background:#444;color:white;font-size:8px;padding:3px 6px;text-align:left;border:0.5px solid #333;}
.anom-table td{font-size:8.5px;padding:3px 6px;border:0.5px solid #ddd;}
@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
</style></head><body>
${pages}
<script>window.onload=function(){window.print();}<\/script>
</body></html>`;

  printHtml(html);
}

function renderInspRun(){
  const assignedEqs = getAllAssignedEquip() || S.equipments;
  if(!assignedEqs.length){
    return`<div style="display:flex;flex-direction:column;height:100vh;align-items:center;justify-content:center;background:#F8F9FC;">
      <div style="font-size:44px;margin-bottom:14px;">🔧</div>

      <div style="font-size:13px;color:#9CA3AF;margin-bottom:20px;">管理者に設定を依頼してください</div>
      <button onclick="nav('HOME')" style="padding:11px 24px;background:#F8F9FC;border:1.5px solid #E4E8EF;border-radius:12px;font-size:13px;font-weight:600;color:#6B7280;cursor:pointer;font-family:inherit;">ホームへ戻る</button>
    </div>${btabs()}`;
  }
  if(!S.inspRunEqTab||!assignedEqs.find(e=>e.id===S.inspRunEqTab)) S.inspRunEqTab=assignedEqs[0].id;
  if(!S.inspRunResults) S.inspRunResults={};
  const results=S.inspRunResults;
  const selectedEq=assignedEqs.find(e=>e.id===S.inspRunEqTab);

  let totalAll=0,doneAll=0;
  assignedEqs.forEach(eq=>{
    const items=eq.items.filter(isTargetDay);
    totalAll+=items.length;
    doneAll+=items.filter(i=>results[eq.id+'_'+i.id]).length;
  });
  const pctAll=totalAll>0?Math.round(doneAll/totalAll*100):0;

  const todayItems=selectedEq.items.filter(isTargetDay);
  const eqDone=todayItems.filter(i=>results[selectedEq.id+'_'+i.id]).length;
  const eqTotal=todayItems.length;
  const eqAllDone=eqDone===eqTotal&&eqTotal>0;
  const eqHasNg=todayItems.some(i=>results[selectedEq.id+'_'+i.id]==='ng');

  const tabsHtml=assignedEqs.map(eq=>{
    const eqItems=eq.items.filter(isTargetDay);
    const d=eqItems.filter(i=>results[eq.id+'_'+i.id]).length;
    const t=eqItems.length;
    const done100=d===t&&t>0;
    const hasNg=eqItems.some(i=>results[eq.id+'_'+i.id]==='ng');
    const isActive=eq.id===S.inspRunEqTab;
    const dotCol=done100?(hasNg?'#C8292A':'#22C55E'):d>0?'#D97706':'#CBD5E1';
    return`<button onclick="S.inspRunEqTab='${eq.id}';render();"
      style="flex:0 0 auto;padding:10px 16px;border-radius:22px;border:2px solid ${isActive?'#C8292A':'#E4E8EF'};
      background:${isActive?'#C8292A':'#FFFFFF'};color:${isActive?'white':'#374151'};
      font-size:13px;font-weight:700;white-space:nowrap;cursor:pointer;touch-action:manipulation;
      font-family:inherit;display:inline-flex;align-items:center;gap:6px;

      ${eq.name}${eq.equipmentNumber?`<small style="font-size:10px;opacity:.7;">No.${eq.equipmentNumber}</small>`:''}

        ?`<span style="font-size:10px;background:${isActive?'rgba(255,255,255,0.22)':'#F0FDF4'};color:${isActive?'white':'#16A34A'};padding:1px 7px;border-radius:8px;font-weight:700;">✓</span>`

    </button>`;

      </div>
      <div style="font-size:17px;font-weight:${isDone?500:700};color:${isOk?'#15803D':isNg?'#991B1B':'#111827'};line-height:1.4;margin-bottom:14px;${isOk?'text-decoration:line-through;opacity:.65;':''}">${it.n}</div>
      <div style="display:flex;gap:10px;">

function inspBulkOkAll(){
  if(!S.inspRunResults)S.inspRunResults={};
  const selLines=getVisibleLines().filter(l=>S.inspSelectedLines.includes(l.id));
  let cnt=0;
  selLines.forEach(line=>getVisibleEquip(line).forEach(eq=>{
    eq.items.filter(isTargetDay).forEach(it=>{
      const key=eq.id+'_'+it.id;
      if(!S.inspRunResults[key]){S.inspRunResults[key]='ok';cnt++;}
    });
  }));
  const scrollEl=document.getElementById('insp-run-scroll');
  const st=scrollEl?scrollEl.scrollTop:0;
  toast(cnt>0?`${cnt}件をすべて○に一括入力`:'未入力の項目はありません',cnt>0?'ok':'info');
  render();
  requestAnimationFrame(()=>{const el=document.getElementById('insp-run-scroll');if(el)el.scrollTop=st;});
}

function inspBulkOkEq(eqId){
  if(!S.inspRunResults)S.inspRunResults={};
  const selLines=getVisibleLines().filter(l=>S.inspSelectedLines.includes(l.id));
  let eq=null;
  for(const line of selLines){eq=getVisibleEquip(line).find(e=>e.id===eqId);if(eq)break;}
  if(!eq)return;
  // [v4] isTargetDay でフィルタリング
  const items=eq.items.filter(isTargetDay);
  let cnt=0;
  items.forEach(it=>{
    if(!S.inspRunResults[eqId+'_'+it.id]){
      S.inspRunResults[eqId+'_'+it.id]='ok';
      cnt++;
    }
  });
  toast(cnt>0?`${cnt}件を○に一括入力しました`:'未入力の項目はありません',cnt>0?'ok':'info');
  const scrollEl=document.getElementById('insp-run-scroll');
  const scrollTop=scrollEl?scrollEl.scrollTop:0;
  render();
  requestAnimationFrame(()=>{const el=document.getElementById('insp-run-scroll');if(el)el.scrollTop=scrollTop;});
}

function inspSetRes(eqId,itemId,result){
  if(!S.inspRunResults)S.inspRunResults={};
  const key=eqId+'_'+itemId;
  S.inspRunResults[key]=result;
  // Update button styles inline (no re-render)
  const okBtn=document.getElementById('ibtn-ok-'+key);
  const ngBtn=document.getElementById('ibtn-ng-'+key);
  if(okBtn){
    if(result==='ok'){okBtn.style.cssText+='background:#22C55E;color:white;border-color:#22C55E;box-shadow:0 4px 16px rgba(34,197,94,0.35);';}
    else{okBtn.style.cssText='height:48px;min-width:64px;padding:0 14px;border-radius:12px;border:1.5px solid;font-size:20px;font-weight:700;cursor:pointer;touch-action:manipulation;font-family:inherit;transition:transform .1s,background .12s,box-shadow .12s;background:#F8F9FC;color:#22C55E;border-color:rgba(34,197,94,0.5);';}
  }
  if(ngBtn){
    if(result==='ng'){ngBtn.style.cssText+='background:#C8292A;color:white;border-color:#C8292A;box-shadow:0 4px 16px rgba(200,41,42,0.32);';}
    else{ngBtn.style.cssText='height:48px;min-width:64px;padding:0 14px;border-radius:12px;border:1.5px solid;font-size:20px;font-weight:700;cursor:pointer;touch-action:manipulation;font-family:inherit;transition:transform .1s,background .12s,box-shadow .12s;background:#F8F9FC;color:#C8292A;border-color:rgba(200,41,42,0.5);';}
  }
  // Update eq card header
  const selLines=S.lines.filter(l=>S.inspSelectedLines.includes(l.id));
  for(const line of selLines){
    const eq=getLineEquip(line).find(e=>e.id===eqId);
    if(eq){
      const items=eq.items.filter(i=>i.t==='毎日');
      const done=items.filter(i=>S.inspRunResults[eqId+'_'+i.id]).length;
      const allDone=done===items.length&&items.length>0;
      const card=document.getElementById('ec-'+eqId);
      const ep=document.getElementById('ep-'+eqId);
      if(card)card.style.borderColor=allDone?'rgba(34,197,94,0.35)':'#E4E8EF';
      if(ep){
        if(allDone){ep.textContent='完了';ep.style.cssText='font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;margin-left:auto;background:rgba(34,197,94,0.12);color:#16A34A;';}
        else{ep.textContent=done+'/'+items.length;ep.style.cssText='font-size:11px;font-weight:600;margin-left:auto;color:#9CA3AF;';}
      }
      break;
    }
  }
  // Update progress bar
  // [FIXED] getVisibleEquip() で担当設備のみカウント（全設備を数えると未入力判定がずれる）
  let total=0,doneAll=0;
  selLines.forEach(line=>getVisibleEquip(line).forEach(eq=>{
    const items=eq.items.filter(i=>i.t==='毎日');
    total+=items.length;
    doneAll+=items.filter(i=>S.inspRunResults[eq.id+'_'+i.id]).length;
  }));
  const pct=total>0?Math.round(doneAll/total*100):0;
  const fill=document.querySelector('#insp-run-scroll')?.closest('div')?.querySelector('.prog-fill');
  // Update the progress bar directly
  const progBars=document.querySelectorAll('[style*="width:'+Math.max(0,pct-1)+'%"]');
  // Simpler: find via parent traversal
  const progFill=document.evaluate('//div[contains(@style,"linear-gradient(90deg,#C8292A")]',document,null,XPathResult.FIRST_ORDERED_NODE_TYPE,null).singleNodeValue;
  if(progFill)progFill.style.width=pct+'%';
  const progNums=document.evaluate('//div[contains(text()," / ")]',document,null,XPathResult.FIRST_ORDERED_NODE_TYPE,null).singleNodeValue;
  if(progNums)progNums.textContent=doneAll+' / '+total;
}

function inspFinish(){
  if(!S.inspRunResults)S.inspRunResults={};
  // [v4] getVisibleLines との交差で担当ライン判定
  const selLines=getVisibleLines().filter(l=>S.inspSelectedLines.includes(l.id));
  let total=0,done=0,ng=0;
  selLines.forEach(line=>getVisibleEquip(line).forEach(eq=>{
    // [v4] isTargetDay で今日対象の項目のみカウント
    const items=eq.items.filter(isTargetDay);
    total+=items.length;
    items.forEach(it=>{
      const r=S.inspRunResults[eq.id+'_'+it.id];
      if(r)done++;
      if(r==='ng')ng++;
    });
  }));
  if(done<total){toast(`未入力が ${total-done} 件あります`,'warn');return;}
  // 履歴保存（毎日点検 キーで統一）
  selLines.forEach(line=>getVisibleEquip(line).forEach(eq=>{
    const items=eq.items.filter(isTargetDay);
    const key=eq.id+':毎日点検';
    S.insps[key]={date:TODAY,results:{},by:S.currentName||'点検者',lines:S.inspSelectedLines.slice()};
    items.forEach(it=>{
      const r=S.inspRunResults[eq.id+'_'+it.id]||'ok';
      S.insps[key].results[it.id]={r,comment:'',photos:0};
      if(r==='ng'){
        const existing=S.anomalies.find(a=>a.eid===eq.id&&a.iid===it.id&&a.status!=='resolved');
        if(!existing)S.anomalies.push({id:'AN'+Date.now()+Math.random().toString(36).slice(2),lid:line.id,eid:eq.id,iid:it.id,iname:it.n,comment:'点検にてNG',status:'open',date:TODAY,by:S.currentName||'点検者'});
      }
    });
  }));
  S.inspRunResults={};
  toast(ng>0?`点検完了（異常 ${ng} 件）`:'点検完了！すべて正常です');
  setTimeout(()=>nav('HOME'),1600);
}

function getInspectionByDate(eid,date,type){

// ═══════════════════════════════════════════════════════════════════
// [REDESIGNED v2] 担当設備紐づけ管理画面
// ─ DOM操作を全廃 → 全インタラクションで render() に統一
// ─ 二重render問題を解消（saveAssignment内renderを使わない）
// ─ S._asgn にステートを集約
// ═══════════════════════════════════════════════════════════════════

// ── ステート初期化（担当者切り替え時に呼ぶ）
function asgnInit(name){
  const cur=getUserAssignment(name)||{equipmentIds:[]};
  // openLines: 初期は全ライン展開
  const openLines=S._asgn&&S._asgn.selName===name
    ? S._asgn.openLines                    // 同一担当者なら展開状態を維持
    : [];                                  // 別担当者なら全折りたたみにリセット
  S._asgn={
    selName:name,
    openLines:[...openLines],
    checked:[...cur.equipmentIds]          // 保存済みの担当設備で初期化
  };
}

// ── ステート取得（未初期化なら自動初期化）
function asgnState(){
  const allNames=[...S.names.inspector,...S.names.admin];
  if(!S._assignSelName) S._assignSelName=allNames[0]||'';
  if(!S._asgn||S._asgn.selName!==S._assignSelName) asgnInit(S._assignSelName);
  return S._asgn;
}

// ── 担当者切り替え
function asgnSetName(name){
  S._assignSelName=name;
  asgnInit(name);
  render();
}

// ── ライン折りたたみトグル（render呼び出し）
function asgnToggleOpen(lid){
  const st=asgnState();
  const i=st.openLines.indexOf(lid);
  if(i>=0) st.openLines.splice(i,1); else st.openLines.push(lid);
  render();
}

// ── ライン内全設備チェック/アンチェック（render呼び出し）
function asgnToggleLine(lid){
  const st=asgnState();
  const line=getLn(lid); if(!line)return;
  const eqIds=getLineEquip(line).map(e=>e.id);
  const allOn=eqIds.every(id=>st.checked.includes(id));
  if(allOn){
    st.checked=st.checked.filter(id=>!eqIds.includes(id)); // 全解除
  } else {
    eqIds.forEach(id=>{if(!st.checked.includes(id))st.checked.push(id);}); // 全選択
  }
  render();
}

// ── 個別設備チェックトグル（render呼び出し）
function asgnToggleEq(eid){
  const st=asgnState();
  const i=st.checked.indexOf(eid);
  if(i>=0) st.checked.splice(i,1); else st.checked.push(eid);
  render();
}

// ── 保存（二重render解消: saveAssignmentを直接呼ばず自前で保存）
function asgnSave(){
  const st=asgnState();
  const name=st.selName;
  if(!name){toast('担当者を選択してください','warn');return;}
  const equipIds=[...st.checked];
  // ⑤ lineIds は選択された設備が属するラインから自動算出
  const lineIds=[...new Set(
    S.lines.filter(l=>getLineEquip(l).some(e=>equipIds.includes(e.id))).map(l=>l.id)
  )];
  // データ保存（saveAssignment内のrenderは呼ばず直接保存）
  const idx=S.assignments.findIndex(a=>a.name===name);
  const data={name,lineIds,equipIds};
  if(idx>=0) S.assignments[idx]=data; else S.assignments.push(data);
  toast('紐づけを保存しました');
  // 保存後にstateを最新データで再初期化してからrender（1回のみ）
  asgnInit(name);
  render();
}

// [v6] 点検履歴 新データ層
// コレクション: S.inspections[]
// 1設備 × 1日 × 種別 = 1レコード
// ══════════════════════════════════════════════════════════

// 点検種別の正規化
function normType(t){
  if(t==='daily'||t==='毎日点検'||t==='毎日')return'daily';
  if(t==='tenDay'||t==='10日点検'||t==='10日')return'tenDay';
  if(t==='monthly'||t==='月次点検'||t==='月次')return'monthly';
  return'daily';
}
function typeToLabel(t){return{daily:'毎日点検',tenDay:'10日点検',monthly:'月次点検'}[normType(t)]||t;}
function typeToItemFilter(t){return{daily:'毎日',tenDay:'10日',monthly:'月次'}[normType(t)]||'毎日';}

// ステータス自動判定
function statusFromResults(itemsArr){
  if(!itemsArr||!itemsArr.length)return'incomplete';
  if(itemsArr.some(i=>i.result==='✕'))return'ng';
  if(itemsArr.every(i=>i.result==='〇'))return'completed';
  return'incomplete';
}

// S.insps の results → items配列に変換
function resultsToItems(eq,type,results){
  const filter=typeToItemFilter(type);
  return (eq.items||[]).filter(i=>i.t===filter).map(it=>({
    itemId:it.id, itemName:it.n,
    result: results[it.id]?.r==='ng'?'✕':'〇',
    comment: results[it.id]?.comment||''
  }));
}

// 新レコードを生成して S.inspections に保存（同日・同設備・同種別は上書き）
function saveInspRecord(eq, date, typeRaw, results){
  const type=normType(typeRaw);
  const itemsArr=resultsToItems(eq,type,results);
  const okCnt=itemsArr.filter(i=>i.result==='〇').length;
  const ngCnt=itemsArr.filter(i=>i.result==='✕').length;
  const status=statusFromResults(itemsArr);
  const lineId=(eq.lineIds&&eq.lineIds[0])||S.lines.find(function(l){return(l.equipmentIds||[]).includes(eq.id);})?.id||'';
  const rec={
    id: eq.id+'_'+date+'_'+type,
    userId: S.currentName||'',
    userName: S.currentName||'',
    equipmentId: eq.id,
    equipmentName: eq.equipmentName||eq.name,
    equipmentNumber: eq.equipmentNumber||'',
    lineId: lineId,
    lineName: getLn(lineId)?.name||'',
    date: date,
    yearMonth: date.slice(0,7),
    type: type,
    status: status,
    items: itemsArr,
    summary:{ totalCount:itemsArr.length, okCount:okCnt, ngCount:ngCnt },
    createdAt: new Date().toISOString()
  };
  // 上書き（同キー）
  const idx=S.inspections.findIndex(function(r){return r.id===rec.id;});
  if(idx>=0)S.inspections[idx]=rec; else S.inspections.push(rec);
  return rec;
}

// クエリ：equipmentId + yearMonth で絞り込み（高速化）
function queryInspections(eid, yearMonth, type){
  return S.inspections.filter(function(r){
    return r.equipmentId===eid
      && (!yearMonth||r.yearMonth===yearMonth)
      && (!type||normType(r.type)===normType(type));
  });
}

// 新構造優先で点検データを取得（なければ旧 S.insps にフォールバック）
function getInspectionByDate(eid, date, typeRaw){
  const type=normType(typeRaw);
  // ① 新構造から検索
  const rec=S.inspections.find(function(r){return r.equipmentId===eid&&r.date===date&&normType(r.type)===type;});
  if(rec){
    // 旧形式に変換して返す（既存コードと互換）
    const results={};
    rec.items.forEach(function(it){results[it.itemId]={r:it.result==='✕'?'ng':'ok',comment:it.comment||''};});
    return{date:rec.date,results:results,_v6:rec};
  }
  // ② 旧 S.insps からフォールバック
  const label=typeToLabel(type);
  const key=eid+':'+label;
  const data=S.insps[key];
  if(data&&data.date===date)return data;
  return null;
}

// 月単位の設備ステータス取得（履歴タブ用）
function getEqMonthSummary(eid, yearMonth){
  const recs=queryInspections(eid,yearMonth,'daily');
  const recMap={};
  recs.forEach(function(r){recMap[r.date]=r;});
  return recMap;
}

// ステータスラベル（日本語）
function statusLabel(s){return{completed:'完了',ng:'異常',incomplete:'一部未入力'}[s]||'未実施';}

/* ═══════════ INSP RUN v8 ヘルパー関数 ═══════════ */
function inspSetRes2(eqId, itemId, result){
  if(!S.inspRunResults) S.inspRunResults={};
  const key=eqId+'_'+itemId;
  // 同じボタンをもう一度押したらリセット（取消）
  if(S.inspRunResults[key]===result){
    delete S.inspRunResults[key];
    render(); return;
  }
  S.inspRunResults[key]=result;
  // 全項目完了チェック → 自動トースト
  const eq=getEq(eqId);
  if(eq){
    const todayItems=eq.items.filter(isTargetDay);
    const allDone=todayItems.length>0&&todayItems.every(i=>S.inspRunResults[eqId+'_'+i.id]);
    if(allDone){
      const hasNg=todayItems.some(i=>S.inspRunResults[eqId+'_'+i.id]==='ng');
      toast(hasNg?`${eq.name}：異常あり`:`${eq.name}：全項目正常✓`,hasNg?'warn':'ok');
    }
  }
  render();
}

function inspBulkOkEq2(eqId){
  if(!S.inspRunResults) S.inspRunResults={};
  const eq=getEq(eqId);
  if(!eq) return;
  const items=eq.items.filter(isTargetDay);
  let cnt=0;
  items.forEach(it=>{
    if(!S.inspRunResults[eqId+'_'+it.id]){
      S.inspRunResults[eqId+'_'+it.id]='ok'; cnt++;
    }
  });
  if(cnt>0) toast(`${cnt}件をすべて正常に入力しました`,'ok');
  else toast('未入力の項目はありません');
  render();
}

function inspFinish2(){
  if(!S.inspRunResults) S.inspRunResults={};
  const assignedEqs=getAllAssignedEquip()||S.equipments;
  let total=0,done=0,ng=0;
  assignedEqs.forEach(eq=>{
    const items=eq.items.filter(isTargetDay);
    total+=items.length;
    items.forEach(it=>{
      const r=S.inspRunResults[eq.id+'_'+it.id];
      if(r){done++; if(r==='ng')ng++;}
    });
  });
  if(done<total){toast(`未入力が ${total-done} 件あります`,'warn');return;}
  // 保存
  assignedEqs.forEach(eq=>{
    const items=eq.items.filter(isTargetDay);
    if(!items.length) return;
    const key=eq.id+':毎日点検';
    S.insps[key]={date:TODAY,results:{},by:S.currentName||'点検者'};
    items.forEach(it=>{
      const r=S.inspRunResults[eq.id+'_'+it.id]||'ok';
      S.insps[key].results[it.id]={r,comment:'',photos:0};
      if(r==='ng'){
        const line=S.lines.find(l=>(l.equipmentIds||[]).includes(eq.id));
        const existing=S.anomalies.find(a=>a.eid===eq.id&&a.iid===it.id&&a.status!=='resolved');
        if(!existing) S.anomalies.push({
          id:'AN'+Date.now()+Math.random().toString(36).slice(2),
          lid:line?.id||'',eid:eq.id,iid:it.id,iname:it.n,
          comment:'点検にてNG',status:'open',date:TODAY,by:S.currentName||'点検者'
        });
      }
    });
    saveInspRecord(eq,TODAY,'毎日点検',S.insps[key].results);
  });
  S.inspRunResults={};
  toast(ng>0?`点検完了（異常 ${ng} 件）`:'点検完了！全項目正常です');
  setTimeout(()=>nav('HOME'),1600);
}

(function(){
  const sn=localStorage.getItem('dk_insp_name');
  const sl=JSON.parse(localStorage.getItem('dk_insp_lines')||'[]');
  if(sn){
    S.currentRole='inspector';
    S.currentName=sn;
    S.inspLastLines=sl;
    S.inspSelectedLines=S.lines.map(l=>l.id);
    // 担当設備タブ初期化
    const assigned=(function(){
      const a=S.assignments.find(x=>x.name===sn);
      if(!a||!a.equipmentIds||!a.equipmentIds.length)return null;
      return a.equipmentIds.map(id=>S.equipments.find(e=>e.id===id)).filter(Boolean);
    })();
    const firstEq=(assigned||S.equipments)[0];
    if(firstEq) S.inspRunEqTab=firstEq.id;
    S.view='INSP_RUN';
  }
})();

render();
</script>
</body>
</html>
