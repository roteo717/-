<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>日常点検システム v5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red:      #C8292A;
  --red-dk:   #A82020;
  --red-lt:   #FFF1F1;
  --green:    #16A34A;
  --green-lt: #F0FDF4;
  --orange:   #D97706;
  --orange-lt:#FFFBEB;
  --bg:       #FFFFFF;
  --surface:  #FFFFFF;
  --surface2: #F8F9FC;
  --border:   #E4E8EF;
  --text:     #111827;
  --text2:    #6B7280;
  --text3:    #9CA3AF;
  --navy:     #1E3A8A;
  --r-sm:     10px;
  --r:        16px;
  --r-lg:     20px;
  --shadow:   0 1px 3px rgba(0,0,0,0.05), 0 4px 14px rgba(0,0,0,0.06);
  --shadow-md:0 4px 24px rgba(0,0,0,0.10);
  /* Inspector light theme */
  --insp-bg:    #F8F9FC;
  --insp-card:  #FFFFFF;
  --insp-card2: #F1F3F8;
  --insp-border:#E4E8EF;
  --insp-text:  #111827;
  --insp-text2: #6B7280;
  --insp-red:   #C8292A;
  --insp-green: #16A34A;
  --insp-orange:#D97706;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:'Noto Sans JP',-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;color:var(--text);}
#app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);}
.screen{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── Header ── */
.phdr{
  background:#FFFFFF;
  border-bottom:1px solid var(--border);
  padding:calc(env(safe-area-inset-top,0px) + 20px) 24px 22px;
  display:flex;align-items:flex-end;gap:14px;
  flex-shrink:0;overflow:hidden;position:relative;z-index:10;
}
.phdr::before{content:'';position:absolute;left:0;bottom:0;width:100%;height:2px;background:linear-gradient(90deg,var(--red) 0%,var(--red-dk) 40%,transparent 100%);pointer-events:none;}
.hdr-back-btn{
  width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;z-index:1;
  transition:transform .12s,background .15s;touch-action:manipulation;
}
.hdr-back-btn:active{transform:scale(.90);background:var(--border);}
.hdr-center{flex:1;position:relative;z-index:1;min-width:0;}
.hdr-eyebrow{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.5px;margin-bottom:3px;}
.hdr-title{font-size:21px;font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1.1;}
.hdr-action-btn{
  display:flex;align-items:center;gap:6px;
  background:var(--surface2);border:1px solid var(--border);border-radius:22px;
  padding:8px 16px;height:36px;color:var(--text2);font-size:13px;font-weight:600;
  cursor:pointer;flex-shrink:0;white-space:nowrap;position:relative;z-index:1;
  transition:transform .12s,background .15s,color .15s;touch-action:manipulation;font-family:inherit;
}
.hdr-action-btn:active{transform:scale(.94);background:var(--border);}
.home-hero{
  background:#FFFFFF;
  border-bottom:1px solid var(--border);
  padding:calc(env(safe-area-inset-top,0px) + 26px) 24px 28px;
  flex-shrink:0;position:relative;overflow:hidden;
}
.home-hero::after{content:'';position:absolute;left:0;bottom:0;width:100%;height:2px;background:linear-gradient(90deg,var(--red) 0%,var(--red-dk) 40%,transparent 100%);}

/* ── Scroll ── */
.scroll{overflow-y:auto;overflow-x:hidden;flex:1;min-height:0;padding:24px 20px calc(env(safe-area-inset-bottom,0px) + 100px);-webkit-overflow-scrolling:touch;background:var(--surface2);}

/* ── Cards ── */
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:10px;border:1px solid var(--border);}
.card-tap{cursor:pointer;transition:transform .12s,opacity .12s;}
.card-tap:active{transform:scale(.98);opacity:.85;}
.section-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin:18px 0 8px 2px;}
.section-label:first-child{margin-top:0;}

/* ── Inspection Cards ── */
.icard{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;margin-bottom:10px;border:1.5px solid var(--border);transition:border-color .2s,background .2s;user-select:none;}
.icard.rok{border-color:var(--green);background:var(--green-lt);}
.icard.rng{border-color:var(--red);background:var(--red-lt);}

/* ── Judge Buttons ── */
.jbtn{flex:1;height:52px;border-radius:14px;border:1.5px solid;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;touch-action:manipulation;transition:transform .1s,background .12s,box-shadow .12s;}
.jbtn:active{transform:scale(.94);}
.jok{background:var(--green-lt);color:var(--green);border-color:var(--green);}
.jok:active{background:var(--green);color:white;box-shadow:0 4px 18px rgba(22,163,74,0.3);}
.jng{background:var(--red-lt);color:var(--red);border-color:var(--red);}
.jng:active{background:var(--red);color:white;box-shadow:0 4px 18px rgba(200,41,42,0.3);}
@media(min-width:769px){
  .jok:hover{background:var(--green);color:white;}
  .jng:hover{background:var(--red);color:white;}
}

/* ── Badges ── */
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;letter-spacing:.2px;}
.bOk{background:var(--green-lt);color:var(--green);}
.bNg{background:var(--red-lt);color:var(--red);}
.bWarn{background:var(--orange-lt);color:var(--orange);}
.bGray{background:var(--surface2);color:var(--text3);}

/* ── Bottom Tabs ── */
.btabs{display:flex;border-top:1px solid var(--border);padding:8px 0 calc(env(safe-area-inset-bottom,0px) + 8px);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;z-index:20;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);background:rgba(255,255,255,0.96);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 2px;border:none;background:none;font-size:11px;font-weight:600;color:var(--text3);touch-action:manipulation;font-family:inherit;transition:color .15s;}
.tab.active{color:var(--red);}

/* ── Progress ── */
.prog-wrap{background:var(--surface2);border-radius:6px;height:6px;overflow:hidden;}
.prog-fill{height:100%;border-radius:6px;transition:width .4s cubic-bezier(.4,0,.2,1);}

/* ── Pill Selector ── */
.pill-row{display:flex;gap:4px;background:var(--surface2);border-radius:12px;padding:3px;border:1px solid var(--border);}
.pill{flex:1;padding:7px 4px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text2);touch-action:manipulation;transition:all .15s;font-family:inherit;}
.pill.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.10);border:1px solid var(--border);}
/* ── Inspection-type pill row (home screen) ── */
.itype-row{display:flex;gap:6px;padding:3px;}
.itype-pill{flex:1;padding:10px 6px 9px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;touch-action:manipulation;font-family:inherit;text-align:center;transition:background .15s,border-color .15s,transform .1s;}
.itype-pill:active{transform:scale(.96);}
.itype-pill .itp-label{font-size:13px;font-weight:700;color:var(--text2);display:block;line-height:1;}
.itype-pill .itp-sub{font-size:10px;font-weight:500;color:var(--text3);display:block;margin-top:4px;line-height:1.2;}
.itype-pill.active{background:var(--red);border-color:var(--red);box-shadow:0 4px 16px rgba(200,41,42,0.24);}
.itype-pill.active .itp-label{color:white;}
.itype-pill.active .itp-sub{color:rgba(255,255,255,0.78);}

/* ── Bulk Bar ── */
.bulk-bar{background:linear-gradient(90deg,rgba(200,41,42,.05),transparent);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(200,41,42,.12);}

/* ── Overlay / Sheet ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:50;display:flex;align-items:flex-end;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surface);border-radius:28px 28px 0 0;padding:26px 20px calc(env(safe-area-inset-bottom,0px) + 26px);width:100%;max-height:88vh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.34,1.2,.64,1);box-shadow:0 -12px 60px rgba(0,0,0,0.12),0 0 0 1px var(--border);}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 22px;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ── Form ── */
.finput{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:15px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s;}
.finput:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(30,58,138,0.08);}
.flabel{font-size:13px;color:var(--text2);display:block;margin-bottom:6px;font-weight:500;}

/* ── Toast ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:24px;font-size:13px;font-weight:600;color:white;z-index:99;white-space:nowrap;pointer-events:none;animation:fadeUp .25s ease;font-family:inherit;box-shadow:0 8px 32px rgba(0,0,0,0.22);letter-spacing:.2px;}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* ── Utility ── */
.icon-circle{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.empty-state{text-align:center;padding:48px 20px;color:var(--text2);}
.btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,#C8292A,#A82020);color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(200,41,42,0.28);transition:transform .12s,box-shadow .12s;touch-action:manipulation;font-family:inherit;letter-spacing:.2px;}
.btn-primary:active{transform:scale(.97);}
.btn-ghost{width:100%;padding:13px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;cursor:pointer;color:var(--text2);font-weight:500;transition:transform .12s,background .15s;touch-action:manipulation;font-family:inherit;}
.btn-ghost:active{transform:scale(.97);}
@keyframes cardIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card,.icard{animation:cardIn .2s ease both;}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.10);border-radius:2px;}

/* ── Responsive visibility ── */
.pc-only{display:none;}

/* ── PC Layout (769px+) ── */
@media(min-width:769px){
  #app{max-width:1120px;}
  .btabs{max-width:1120px;}
  .hdr-action-btn:hover{background:var(--surface2);color:var(--text);}
  .jok:hover{background:var(--green);color:white;}
  .jng:hover{background:var(--red);color:white;}
  .mobile-only{display:none !important;}
  .pc-only{display:flex;}

  /* History 2-col */
  .hist-pc-body{flex-direction:row !important;overflow:hidden;min-height:0;}
  .hist-sidebar{
    display:flex !important;flex-direction:column;
    width:280px;flex-shrink:0;
    border-right:1.5px solid #E4E8EF;
    background:#FAFBFC;overflow:hidden;
  }
  .hist-sidebar-hdr{padding:20px 20px 14px;border-bottom:1px solid #E4E8EF;flex-shrink:0;}
  .hist-sidebar-scroll{flex:1;min-height:0;overflow-y:auto;padding:14px 14px 24px;-webkit-overflow-scrolling:touch;}
  .hist-sidebar-scroll::-webkit-scrollbar{width:3px;}
  .hist-main-area{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 28px calc(env(safe-area-inset-bottom,0px)+100px);}

  /* Equipment list cards in sidebar */
  .hist-eq-card{
    display:flex;align-items:center;gap:10px;
    padding:10px 12px;border-radius:12px;cursor:pointer;
    border:1.5px solid transparent;margin-bottom:6px;
    transition:background .12s,border-color .15s,transform .1s;
    position:relative;
  }
  .hist-eq-card:hover{background:#F0F2F8;border-color:#C7CDE8;transform:translateX(2px);}
  .hist-eq-card.hist-eq-active{background:#EEF2FF;border-color:#6366F1;}
  .hist-eq-card:hover .hist-eq-hover-tip{opacity:1;}

  /* Equipment sidebar hover badge */
  .hist-eq-hover-tip{
    position:absolute;left:calc(100% + 12px);top:50%;transform:translateY(-50%);
    background:#1E293B;color:white;font-size:11px;padding:7px 12px;
    border-radius:9px;white-space:nowrap;z-index:40;
    opacity:0;pointer-events:none;
    transition:opacity .15s;box-shadow:0 4px 16px rgba(0,0,0,0.22);
  }
  .hist-eq-hover-tip::before{
    content:'';position:absolute;right:100%;top:50%;transform:translateY(-50%);
    border:5px solid transparent;border-right-color:#1E293B;
  }

  /* Larger calendar cells on PC */
  .cal-cell-item{min-height:62px !important;padding:6px 4px !important;position:relative !important;}
  .cal-cell-item:hover .cal-day-tip{display:block;}
  .cal-cell-item > div:first-child{font-size:12px !important;}

  /* Calendar hover tooltip */
  .cal-day-tip{
    display:none;position:absolute;
    bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
    background:#1E293B;color:white;font-size:11px;
    padding:7px 12px;border-radius:8px;white-space:nowrap;
    z-index:30;pointer-events:none;
    box-shadow:0 4px 16px rgba(0,0,0,0.22);text-align:center;line-height:1.6;
  }
  .cal-day-tip::after{
    content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
    border:5px solid transparent;border-top-color:#1E293B;
  }
}

/* ── Calendar Grid ── */
.cal-screen{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;}
.cal-month{font-size:17px;font-weight:700;letter-spacing:-.3px;}
.cal-nav-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;transition:background .12s;flex-shrink:0;}
.cal-nav-btn:active{background:rgba(0,0,0,.15);}
.cal-filter-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;touch-action:manipulation;font-family:inherit;white-space:nowrap;}
.cal-unreported{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;background:var(--red-lt);color:var(--red);font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;border:none;font-family:inherit;touch-action:manipulation;}
.cal-body{display:flex;flex:1;min-height:0;overflow:hidden;}
.cal-left{flex-shrink:0;width:90px;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;}
.cal-right{flex:1;min-width:0;overflow-x:auto;overflow-y:hidden;display:flex;flex-direction:column;-webkit-overflow-scrolling:touch;}
.cal-left-hdr{height:44px;flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border);}
.cal-right-hdr{display:flex;height:44px;flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border);}
.cal-day-col{min-width:80px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:0.5px solid var(--border);padding:4px 2px;}
.cal-day-col.today{background:rgba(200,41,42,.06);}
.cal-day-num{font-size:15px;font-weight:700;line-height:1;color:var(--text);}
.cal-day-col.today .cal-day-num{color:var(--red);}
.cal-day-wd{font-size:9px;font-weight:600;color:var(--text2);margin-top:2px;letter-spacing:.3px;}
.cal-day-col.today .cal-day-wd{color:var(--red);}
.cal-day-col.sun .cal-day-num,.cal-day-col.sun .cal-day-wd{color:#1D4ED8;}
.cal-day-col.sat .cal-day-num,.cal-day-col.sat .cal-day-wd{color:#C62828;}
.cal-scroll-body{display:flex;flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.cal-left-body{width:90px;flex-shrink:0;overflow:hidden;border-right:1px solid var(--border);}
.cal-right-body{flex:1;overflow:hidden;}
.cal-group-hdr{display:flex;align-items:center;background:#1E293B;color:white;font-size:11px;font-weight:700;padding:5px 8px;letter-spacing:.2px;}
.cal-group-hdr.line{background:#F1F3F8;color:var(--text2);font-size:10px;font-weight:600;padding:4px 8px;}
.cal-eq-left{display:flex;align-items:center;padding:0 6px 0 8px;border-bottom:0.5px solid var(--border);min-height:52px;}
.cal-eq-right-row{display:flex;border-bottom:0.5px solid var(--border);min-height:52px;}
.cal-eq-name-txt{font-size:11px;font-weight:600;color:var(--text);line-height:1.3;word-break:break-all;}
.cal-cell{min-width:80px;flex-shrink:0;border-right:0.5px solid var(--border);padding:4px;display:flex;flex-direction:column;gap:3px;justify-content:center;align-items:flex-start;}
.cal-cell.today-col{background:rgba(200,41,42,.04);}
.cal-badge{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:600;padding:3px 7px;border-radius:20px;white-space:nowrap;max-width:72px;overflow:hidden;text-overflow:ellipsis;}
.cal-badge.ok{background:#EFF6FF;color:#1D4ED8;}
.cal-badge.ng{background:var(--red-lt);color:var(--red);}
.cal-badge.partial{background:var(--orange-lt);color:var(--orange);}
.cal-badge.done-daily{background:#E8F5E9;color:#16A34A;}
/* ── Equipment Tabs ── */
.equip-tabs-wrap{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 16px 12px;scroll-snap-type:x mandatory;}
.equip-tabs-wrap::-webkit-scrollbar{display:none;}
.equip-tabs{display:flex;gap:8px;min-width:max-content;}
.equip-tab{flex:0 0 auto;padding:10px 18px;border-radius:22px;border:1.5px solid transparent;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;touch-action:manipulation;font-family:inherit;transition:background .15s,color .15s,border-color .15s,box-shadow .15s;scroll-snap-align:start;}
.equip-tab:active{transform:scale(.96);}
.equip-tab.inactive{background:#F1F3F8;color:#1F2937;border-color:#D1D5DB;}
.equip-tab.active{background:#C8292A;color:white;border-color:#C8292A;box-shadow:0 3px 12px rgba(200,41,42,0.28);}
.equip-tab .tab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
/* Cal cell improvements */
.cal-cell-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-cell-item{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:5px 2px 4px;border-radius:10px;min-height:64px;transition:opacity .1s,transform .08s;overflow:hidden;}
.cal-cell-item:active{transform:scale(.92);}
.cal-missing-dot{width:8px;height:8px;border-radius:50%;background:#C8292A;margin:3px 0 2px;animation:dotPulse 2s ease-in-out infinite;}
@keyframes dotPulse{0%,100%{opacity:.7}50%{opacity:1}}
/* Mobile: make card padding tighter so calendar has more room */
@media(max-width:768px){
  .cal-cell-grid{gap:3px;}
  .cal-cell-item{min-height:66px;padding:5px 1px 4px;border-radius:9px;}
}


/* ── INSP_RUN v8 ── */
#insp-run-scroll::-webkit-scrollbar{display:none;}
.irt::-webkit-scrollbar{display:none;}
.htabs::-webkit-scrollbar{display:none;}

/* PC: History 2-col overrides */
@media(min-width:769px){
  .hist-main-area{padding:16px 24px calc(env(safe-area-inset-bottom,0px)+90px) !important;}
}
</style>
</head>
<body>
<div id="app"><div id="screen" class="screen"></div></div>
<script>
const TODAY=(()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;})();

function getLn(id){return S.lines.find(l=>l.id===id);}

// [v5] ③ 設備マスターから取得（ライン横断で検索不要）
function getEq(id){ return S.equipments.find(e=>e.id===id)||null; }

// [v5] ④ ライン→設備オブジェクト配列（マスター参照）
function getLineEquip(line){
  if(!line) return [];
  return (line.equipmentIds||[]).map(id=>getEq(id)).filter(Boolean);
}

// [v5 NEW] isTargetDay — 周期に基づく表示判定
function isTargetDay(item){
  const day = new Date().getDate();
  const t = item.t || item.cycle;
  if(t === 'daily'  || t === '毎日') return true;
  if(t === '10day'  || t === '10日') return day % 10 === 0;
  if(t === 'monthly'|| t === '月次') return day === 1;
  return true;
}
function getTodayInspTypes(){
  const day = new Date().getDate();
  const types = ['毎日'];
  if(day % 10 === 0) types.push('10日毎');
  if(day === 1)      types.push('月次');
  return types;
}

// [v5] ⑤ 担当者の紐づけデータを取得
function getUserAssignment(name){
  return S.assignments.find(a => a.name === name);
}
// [v5] ⑥ 担当者のラインのみ返す（未設定なら全ライン）
function getVisibleLines(){
  const a = getUserAssignment(S.currentName);
  if(!a) return S.lines;
  return S.lines.filter(l => a.lineIds.includes(l.id));
}
// [v5/v6] ⑦ 担当者の設備のみ返す（マスターから参照 + 担当フィルタ）
function getVisibleEquip(line){
  const eqs = getLineEquip(line);
  const a = getUserAssignment(S.currentName);
  if(!a || !a.equipmentIds || a.equipmentIds.length === 0) return eqs;
  return eqs.filter(e => a.equipmentIds.includes(e.id));
}
// [v6] 担当者の全設備（ライン横断）
function getAllAssignedEquip(){
  const a = getUserAssignment(S.currentName);
  if(!a || !a.equipmentIds || a.equipmentIds.length === 0) return null; // null = 未設定 = 全設備
  return a.equipmentIds.map(id=>getEq(id)).filter(Boolean);
}
// ⑧ 紐づけ保存処理
function saveAssignment(name, lineIds, equipmentIds){
  if(!name){toast('担当者を選択してください','warn');return;}
  const idx = S.assignments.findIndex(a => a.name === name);
  const data = { name, lineIds, equipmentIds };
  if(idx >= 0){ S.assignments[idx] = data; }
  else { S.assignments.push(data); }
  toast('紐づけを保存しました');
  render();
}

// ── Demo data seed ──
(function seedDemo(){
  const d=new Date();
  function ds(offset){const x=new Date(d);x.setDate(x.getDate()+offset);return`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;}
  const okR=(items)=>{const r={};items.forEach(i=>{r[i.id]={r:'ok',comment:'',photos:0};});return r;};
  const ngR=(items,ngId)=>{const r=okR(items);r[ngId]={r:'ng',comment:'異常あり',photos:1};return r;};

  function mkInspRecord(eq,date,type,results){
    const items = eq.items.filter(i=>i.t===(type==='毎日点検'?'毎日':type==='10日点検'?'10日':'月次'));
    const lineId = (eq.lineIds&&eq.lineIds[0]) || S.lines.find(l=>(l.equipmentIds||[]).includes(eq.id))?.id || '';
    const lineName = getLn(lineId)?.name||'';
    const itemsArr = items.map(it=>({
      itemId:it.id, itemName:it.n,
      result: results[it.id]?.r==='ng'?'✕':'〇',
      comment: results[it.id]?.comment||''
    }));
    const okCnt=itemsArr.filter(i=>i.result==='〇').length;
    const ngCnt=itemsArr.filter(i=>i.result==='✕').length;
    const status=ngCnt>0?'ng':okCnt<itemsArr.length?'incomplete':'completed';
    const ym=date.slice(0,7);
    return{
      id:eq.id+'_'+date+'_'+type.replace(/点検/,''),
      userId:'', userName:'デモ',
      equipmentId:eq.id, equipmentName:eq.equipmentName||eq.name, equipmentNumber:eq.equipmentNumber||'',
      lineId, lineName,
      date, yearMonth:ym,
      type:type==='毎日点検'?'daily':type==='10日点検'?'tenDay':'monthly',
      status, items:itemsArr,
      summary:{totalCount:itemsArr.length,okCount:okCnt,ngCount:ngCnt},
      createdAt:date+'T09:00:00'
    };
  }

  // [v5] S.equipments マスターからデモデータ生成
  [0,-1,-2,-3,-4,-5].forEach(offset=>{
    const date=ds(offset);
    S.equipments.forEach((eq,ei)=>{
      if((ei+Math.abs(offset))%3===2)return;
      const items=eq.items.filter(i=>i.t==='毎日');
      if(!items.length)return;
      const hasNg=(offset===-1&&ei===1)||(offset===-3&&ei===0);
      const results=hasNg?ngR(items,items[0].id):okR(items);
      const key=eq.id+':毎日点検';
      S.insps[key]={date,results};
      // [v6] 新構造にも保存
      S.inspections.push(mkInspRecord(eq,date,'毎日点検',results));
      if(offset===0&&ei===0){
        const d10=new Date(date);const dw10=d10.getDay();
        if(dw10!==0&&dw10!==6){
          const items10=eq.items.filter(i=>i.t==='10日');
          if(items10.length){
            const r10=okR(items10);
            S.insps[eq.id+':10日点検']={date,results:r10};
            S.inspections.push(mkInspRecord(eq,date,'10日点検',r10));
          }
        }
      }
    });
  });
})();
// [v5] getEq はマスターから（旧：line.equip を横断検索していた）
function getEq(id){ return S.equipments.find(e=>e.id===id)||null; }
// Initialize selectedEquipmentId to first equipment

S.selectedEquipmentId=S.equipments[0]?.id||null;
function getInsps(eid,type){type=type||S.inspType;return S.insps[eid+':'+type];}
function typeItems(eq,type){
  const m={'毎日点検':'毎日','10日点検':'all2','月次点検':'all'};const t=m[type]||'毎日';
  if(t==='毎日')return eq.items.filter(i=>i.t==='毎日');
  if(t==='all2')return eq.items.filter(i=>i.t==='毎日'||i.t==='10日');
  return eq.items;
}
function lineStats(lid){
  // [v5] getLineEquip() でマスター参照
  const l=getLn(lid);const eqs=getLineEquip(l);let done=0,ng=0,pend=0;
  for(const eq of eqs){const st=eqStatus(eq.id);if(st==='done')done++;else if(st==='ng')ng++;else pend++;}
  return{total:eqs.length,done,ng,pend};
}
function eqStatus(eid){
  const eq=getEq(eid);const insp=getInsps(eid,S.inspType);const items=typeItems(eq,S.inspType);
  if(!insp||insp.date!==TODAY)return'pending';
  const rs=insp.results;
  if(items.some(i=>rs[i.id]?.r==='ng'))return'ng';
  if(items.every(i=>rs[i.id]))return'done';
  return'partial';
}

function toast(msg,type='ok'){
  const old=document.querySelector('.toast');if(old)old.remove();
  const t=document.createElement('div');t.className='toast';
  t.style.background=type==='ok'?'#1B5E20':type==='warn'?'#BF360C':'#0D47A1';
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}

function bulkOk(){
  const eid=S.selectedEq;const eq=getEq(eid);const items=typeItems(eq,S.inspType);
  const _bk=eid+':'+S.inspType;
  if(!S.insps[_bk])S.insps[_bk]={date:TODAY,results:{}};
  let cnt=0;items.forEach(it=>{if(!S.insps[_bk].results[it.id]){S.insps[_bk].results[it.id]={r:'ok',comment:'',photos:0};cnt++;}});
  toast(cnt>0?`${cnt}件を○に一括入力しました`:'未入力の項目はありません',cnt>0?'ok':'info');render();
}
function resetResult(iid){const eid=S.selectedEq;const _rk=eid+':'+S.inspType;if(S.insps[_rk])delete S.insps[_rk].results[iid];render();}
function submitInsp(){
  const eid=S.selectedEq;const eq=getEq(eid);const items=typeItems(eq,S.inspType);
  const _sk=eid+':'+S.inspType;const rs=S.insps[_sk]?.results||{};const pend=items.filter(i=>!rs[i.id]).length;
  if(pend>0){toast(`未入力が${pend}件あります`,'warn');return;}
  // [v6] 新構造に保存（旧S.inspsと並行）
  saveInspRecord(eq, TODAY, S.inspType, rs);
  if(S.inspType!=='毎日点検'){S.approvals.push({id:'A'+Date.now(),lid:getEq(eid)?S.lines.find(l=>(l.equipmentIds||[]).includes(eid))?.id||null:null,eid,type:S.inspType,date:TODAY,status:'pending',by:'現場作業者',approver:null});toast('点検完了。承認申請しました');}
  else toast('点検完了しました');
  if(S.bulkActive){
    const l=getLn(S.bulkLineId);const eqs=getLineEquip(l);const ni=S.bulkIdx+1;
    if(ni<eqs.length){S.bulkIdx=ni;S.selectedEq=eqs[ni].id;render();}
    else{S.bulkActive=false;toast('ライン点検完了！');nav('LINE_DETAIL',{selectedLine:S.bulkLineId});}
  }else nav('LINE_DETAIL');
}

/* ─── 定期点検スケジュール計算 ─── */
// 休日（土日）の場合は前の平日に移動
function toPrevWeekday(d){
  const x=new Date(d);
  while(x.getDay()===0||x.getDay()===6)x.setDate(x.getDate()-1);
  return x;
}
function toDateStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

// 今月の10日点検予定日（10日・20日・月末）を休日調整して返す
function get10DaySchedule(){
  const [y,m]=TODAY.split('-').map(Number);
  const lastDay=new Date(y,m,0).getDate();
  const raw=[10,20,lastDay];
  const seen=new Set();
  return raw.map(d=>{
    const adjusted=toPrevWeekday(new Date(y,m-1,d));
    const ds=toDateStr(adjusted);
    if(seen.has(ds))return null;
    seen.add(ds);
    return{scheduled:d,date:ds,day:adjusted.getDate()};
  }).filter(Boolean);
}

// 今月の月次点検予定日（月末 → 休日なら前平日）
function getMonthlySchedule(){
  const [y,m]=TODAY.split('-').map(Number);
  const lastDay=new Date(y,m,0).getDate();
  const adjusted=toPrevWeekday(new Date(y,m-1,lastDay));
  return{scheduled:lastDay,date:toDateStr(adjusted),day:adjusted.getDate()};
}

// 今日が定期点検日かチェック → 該当する点検種別の配列を返す
function getTodayScheduledTypes(){
  const alerts=[];
  const ten=get10DaySchedule();
  if(ten.some(s=>s.date===TODAY))alerts.push('10日点検');
  const monthly=getMonthlySchedule();
  if(monthly.date===TODAY)alerts.push('月次点検');
  return alerts;
}

// 次の定期点検日を返す（種別ごと）
function getNextScheduleLabel(type){
  const WDAYS=['日','月','火','水','木','金','土'];
  if(type==='10日点検'){
    const list=get10DaySchedule();
    const next=list.find(s=>s.date>=TODAY)||list[0];
    const d=new Date(next.date);
    return`${d.getMonth()+1}月${d.getDate()}日(${WDAYS[d.getDay()]})`;
  }
  if(type==='月次点検'){
    const s=getMonthlySchedule();
    const d=new Date(s.date);
    return`${d.getMonth()+1}月${d.getDate()}日(${WDAYS[d.getDay()]})`;
  }
  return'';
}

function printHtml(html){
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  let fr=document.getElementById('_print_frame');
  if(!fr){fr=document.createElement('iframe');fr.id='_print_frame';fr.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;border:none;';document.body.appendChild(fr);}
  fr.onload=function(){
    try{fr.contentWindow.focus();fr.contentWindow.print();}catch(e){}
    setTimeout(()=>URL.revokeObjectURL(url),60000);
  };
  fr.src=url;
}

// 日別詳細PDF（詳細画面から）
function exportHistoryDayPDF(date){
  const d=new Date(date);
  const WDAYS=['日','月','火','水','木','金','土'];
  const dateLbl=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日(${WDAYS[d.getDay()]})`;
  const adminName=S.currentName||'管理者';
  const genDate=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});

  const rows=[];
  S.lines.forEach(line=>{
    getLineEquip(line).forEach(eq=>{
      const keys=Object.keys(S.insps).filter(k=>k.startsWith(eq.id+':')&&S.insps[k].date===date);
      if(!keys.length){
        rows.push({line:line.name,desc:line.desc,eq:eq.name,type:'－',status:'未実施',statusCls:'pending',items:[]});
        return;
      }
      keys.forEach(key=>{
        const type=key.split(':')[1];
        const insp=S.insps[key];
        const items=typeItems(eq,type);
        const rs=insp.results;
        const ngItems=items.filter(i=>rs[i.id]?.r==='ng');
        const done=items.filter(i=>rs[i.id]).length;
        let status='完了',statusCls='ok';
        if(ngItems.length>0){status=`異常 ${ngItems.length}件`;statusCls='ng';}
        else if(done<items.length){status=`一部 ${done}/${items.length}`;statusCls='partial';}
        const detail=items.map(it=>{
          const r=rs[it.id];
          const sym=r?.r==='ok'?'○':r?.r==='ng'?'×':'－';
          const comment=r?.comment?`（${r.comment}）`:'';
          return`<tr class="${r?.r==='ng'?'ng-row':''}"><td>${sym}</td><td>${it.n}</td><td>${comment}</td></tr>`;
        }).join('');
        rows.push({line:line.name,desc:line.desc,eq:eq.name,type,status,statusCls,itemTable:detail,total:items.length,done,ng:ngItems.length});
      });
    });
  });

  const dayAnoms=S.anomalies.filter(a=>a.date===date);

  const statusBg={ok:'#e8f5e9',ng:'#ffebee',partial:'#fff3e0',pending:'#f5f5f5'};
  const statusColor={ok:'#2e7d32',ng:'#c62828',partial:'#e65100',pending:'#888'};

  const tableRows=rows.map(r=>`
    <tr class="eq-row">
      <td class="td-line">${r.line}<span class="sub"> ${r.desc}</span></td>
      <td class="td-eq">${r.eq}</td>
      <td>${r.type}</td>
      <td style="background:${statusBg[r.statusCls]};color:${statusColor[r.statusCls]};font-weight:700;text-align:center;">${r.status}</td>
      <td>${r.ng>0?`<span style="color:#c62828;font-weight:700;">異常 ${r.ng}件</span>`:r.statusCls==='ok'?'<span style="color:#2e7d32;">全項目正常</span>':'<span style="color:#888;">未実施</span>'}</td>
    </tr>
    ${r.itemTable?`<tr class="detail-row"><td colspan="5"><table class="item-table"><tbody>${r.itemTable}</tbody></table></td></tr>`:''}`).join('');

  const anomRows=dayAnoms.length>0?dayAnoms.map(a=>{
    const eq=getEq(a.eid);const l=getLn(a.lid);
    const stMap={open:'未対応',['in-progress']:'対応中',resolved:'解決済'};
    const stBg={open:'#ffebee',['in-progress']:'#fff3e0',resolved:'#e8f5e9'};
    const stCol={open:'#c62828',['in-progress']:'#e65100',resolved:'#2e7d32'};
    return`<tr>
      <td>${l?.name||'-'} / ${eq?.name||'-'}</td>
      <td>${a.iname}</td>
      <td>${a.comment}</td>
      <td style="background:${stBg[a.status]};color:${stCol[a.status]};font-weight:700;">${stMap[a.status]||a.status}</td>
      <td>${a.by}</td>
    </tr>`;
  }).join(''):`<tr><td colspan="5" style="text-align:center;padding:10px;color:#888;">この日の異常記録はありません</td></tr>`;

  const html=`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<title>点検日報 ${dateLbl}</title>
<style>

table{width:100%;border-collapse:collapse;}

/* ═══════════ HOME ═══════════ */
function renderHome(){
  if(S.currentRole==='inspector')return renderInspectorHome();
  return renderAdminHome();
}

/* ─── Inspector: change inspector ─── */
function inspChangeUser(){
  localStorage.removeItem('dk_insp_name');
  localStorage.removeItem('dk_insp_lines');
  S.currentName=null;S.currentRole=null;
  S.inspSelectedLines=[];S.inspLastLines=[];
  nav('ROLE_SELECT');
}
/* ─── Inspector: toggle line ─── */
function inspToggleLine(lid){
  const i=S.inspSelectedLines.indexOf(lid);
  if(i>=0)S.inspSelectedLines.splice(i,1);
  else S.inspSelectedLines.push(lid);
  // update card UI without full re-render
  const card=document.getElementById('ilc-'+lid);
  if(card){
    const on=S.inspSelectedLines.includes(lid);
    card.classList.toggle('ilc-on',on);
  }
  inspUpdateStartBtn();
}
function inspUpdateStartBtn(){
  const n=S.inspSelectedLines.length;
  const btn=document.getElementById('insp-start-btn');
  const pill=document.getElementById('insp-sel-cnt');
  if(!btn)return;
  btn.disabled=n===0;
  if(n>0){pill.textContent=n+' ライン';pill.style.display='';}
  else pill.style.display='none';
}
function inspQuickStart(){
  S.inspSelectedLines=[...S.inspLastLines];
  inspDoStart();
}
function inspDoStart(){
  if(!S.inspSelectedLines.length)return;
  localStorage.setItem('dk_insp_lines',JSON.stringify(S.inspSelectedLines));
  S.inspLastLines=[...S.inspSelectedLines];
  nav('INSP_RUN');
}

/* ─── Inspector Home (設備タブ型 INSP_RUN に直行) ─── */
function renderInspectorHome(){
  // ログイン済みの点検者はINSP_RUNへ直行
  if(S.currentName){
    // inspRunEqTab が未設定なら初期化
    const assignedEqs=getAllAssignedEquip()||S.equipments;
    if(!S.inspRunEqTab&&assignedEqs.length) S.inspRunEqTab=assignedEqs[0].id;
    S.view='INSP_RUN';
    return renderInspRun();
  }
  // 未ログインなら名前選択へ
  return renderNameSelect();
}

/* ═══════════ LINE DETAIL ═══════════ */
function renderLineDetail(){
  const l=getLn(S.selectedLine);if(!l)return renderHome();
  const bulkBtn=`<button class="hdr-action-btn" onclick="S.bulkActive=true;S.bulkLineId='${l.id}';S.bulkIdx=0;nav('INSPECTION',{selectedEq:'${getLineEquip(l)[0]?.id}'})">${PLAY_ICO} 一括</button>`;

    const st=eqStatus(eq.id);

    const insp=getInsps(eq.id,S.inspType);
    const done=insp?items.filter(i=>insp.results[i.id]).length:0;
    const total=items.length;

        </div>

  return`${phdr(l.name,'HOME',S.inspType,bulkBtn)}

          <div style="font-size:20px;font-weight:800;color:#111827;letter-spacing:-.4px;">承認待ち <span style="color:#4F8EF7;">${pend.length}</span>件</div>
        </div>
      </div>
    </div>
    <div style="flex:1;min-height:0;overflow-y:auto;padding:0 16px calc(env(safe-area-inset-bottom,0px) + 88px);-webkit-overflow-scrolling:touch;">
      ${pend.length===0?`<div style="text-align:center;padding:60px 20px;"><div style="width:56px;height:56px;background:rgba(52,199,89,0.12);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;"><svg width="26" height="26" viewBox="0 0 26 26" fill="none"><circle cx="13" cy="13" r="10" stroke="#34C759" stroke-width="2"/><path d="M8 13l3.5 3.5 6.5-6.5" stroke="#34C759" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div style="font-size:16px;font-weight:700;color:#111111;margin-bottom:5px;">承認待ちはありません</div><div style="font-size:13px;color:#999999;">すべての申請が処理済みです</div></div>`:''}
      ${pend.length>0?`<div style="font-size:11px;font-weight:700;color:#4F8EF7;letter-spacing:.8px;margin:4px 2px 10px;">承認待ち (${pend.length})</div>`:''}
      ${pend.map(a=>acard(a,true)).join('')}
      ${hist.length>0?`<div style="font-size:11px;font-weight:700;color:#999999;letter-spacing:.8px;margin:18px 2px 10px;">処理済み (${hist.length})</div>${hist.map(a=>acard(a,false)).join('')}`:''}
    </div>
  </div>${btabs()}`;
}

/* ═══════════ HISTORY ═══════════ */
function renderHistory(){
  if(S.histView==='detail'&&S.histDate)return renderHistoryDetail(S.histDate);
  S.histView='list';return renderHistoryList();
}

function getHistoryDates(){
  // 今日を含む過去30日間 + inspsにある日付をすべてマージして降順で返す
  const ds=new Set();
  Object.values(S.insps).forEach(insp=>ds.add(insp.date));
  for(let i=0;i<30;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    ds.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  }
  return Array.from(ds).sort((a,b)=>b.localeCompare(a));
}

function getDateSummary(date){
  // [v6] 新構造優先でサマリー集計
  const v6recs=S.inspections.filter(function(r){return r.date===date;});
  const eqMap={};
  if(v6recs.length>0){
    v6recs.forEach(function(r){
      if(!eqMap[r.equipmentId])eqMap[r.equipmentId]={ok:0,ng:0,filled:0,total:0};
      eqMap[r.equipmentId].ok+=(r.summary?.okCount||0);
      eqMap[r.equipmentId].ng+=(r.summary?.ngCount||0);
      eqMap[r.equipmentId].filled+=(r.summary?.okCount||0)+(r.summary?.ngCount||0);
      eqMap[r.equipmentId].total+=(r.summary?.totalCount||0);
    });
  } else {
    // 旧フォールバック
    Object.entries(S.insps).forEach(([key,insp])=>{
      if(insp.date!==date)return;
      const [eid,type]=key.split(':');
      const eq=getEq(eid);if(!eq)return;
      const items=typeItems(eq,type);const rs=insp.results;
      if(!eqMap[eid])eqMap[eid]={ok:0,ng:0,filled:0,total:0};
      eqMap[eid].ok+=items.filter(i=>rs[i.id]?.r==='ok').length;
      eqMap[eid].ng+=items.filter(i=>rs[i.id]?.r==='ng').length;
      eqMap[eid].filled+=items.filter(i=>rs[i.id]).length;
      eqMap[eid].total+=items.length;
    });
  }
  const totalEq=S.lines.reduce((s,l)=>s+getLineEquip(l).length,0);
  const inspected=Object.keys(eqMap).length;
  const ngEq=Object.values(eqMap).filter(e=>e.ng>0).length;
  const doneEq=Object.values(eqMap).filter(e=>e.ng===0&&e.filled===e.total&&e.total>0).length;
  let status='未入力';
  if(inspected>0){
    if(ngEq>0)status='異常';
    else if(doneEq===totalEq)status='完了';
    else status='一部';
  }
  return{status,inspected,ngEq,doneEq,totalEq};
}

function getEqStatusForDate(eid,date){
  // [v6] 新構造優先チェック（複数種別すべてを対象に）
  const v6recs=S.inspections.filter(function(r){return r.equipmentId===eid&&r.date===date;});
  if(v6recs.length>0){
    const hasNg=v6recs.some(function(r){return r.status==='ng';});
    const allComplete=v6recs.every(function(r){return r.status==='completed';});
    const anyFilled=v6recs.some(function(r){return r.summary&&r.summary.okCount>0;});
    if(hasNg)return'ng';
    if(allComplete)return'done';
    if(anyFilled)return'partial';
    return'partial';
  }
  // 旧 S.insps フォールバック
  const keys=Object.keys(S.insps).filter(k=>k.startsWith(eid+':')&&S.insps[k].date===date);
  if(!keys.length)return'pending';
  let hasNg=false,filled=0,total=0;
  keys.forEach(key=>{
    const eq=getEq(eid);const type=key.split(':')[1];
    const items=eq?typeItems(eq,type):[];const rs=S.insps[key].results;
    total+=items.length;filled+=items.filter(i=>rs[i.id]).length;
    if(items.some(i=>rs[i.id]?.r==='ng'))hasNg=true;
  });
  if(hasNg)return'ng';
  if(filled===total&&total>0)return'done';
  if(filled>0)return'partial';
  return'pending';
}

function changeDate(offset){
  const dates=getHistoryDates();
  const ni=dates.indexOf(S.histDate)+offset;
  if(ni>=0&&ni<dates.length){S.histDate=dates[ni];render();}
}

function renderHistoryList(){
  const now=new Date();
  if(!S.histFilter) S.histFilter='all';

  // 担当設備取得
  const allEquip=[];
  const visibleLines=S.lines;
  visibleLines.forEach(l=>getLineEquip(l).forEach(eq=>allEquip.push({eq,line:l})));

  // 点検者は担当設備のみ
  let displayEquip=allEquip;
  if(S.currentRole==='inspector'){
    const assignedEqs=getAllAssignedEquip();
    if(assignedEqs){
      displayEquip=allEquip.filter(({eq})=>assignedEqs.find(e=>e.id===eq.id));
    }
  }

  if(!displayEquip.length) return`<div class="empty-state">設備がありません</div>`;

  if(!S.selectedEquipmentId||!displayEquip.find(({eq})=>eq.id===S.selectedEquipmentId)){
    S.selectedEquipmentId=displayEquip[0].eq.id;
  }
  const eid=S.selectedEquipmentId;
  const {eq:selectedEq,line:selectedLine}=displayEquip.find(({eq})=>eq.id===eid)||displayEquip[0];

  // ── 設備タブ ──
  const nowY=now.getFullYear(),nowM=now.getMonth()+1;
  const monthStr=`${nowY}-${String(nowM).padStart(2,'0')}`;

  function eqMonthStatus(e){
    const v6Map=getEqMonthSummary(e.id,monthStr);
    let hasNg=false,hasMissed=false;
    const daysInM=new Date(nowY,nowM,0).getDate();
    for(let d=1;d<=daysInM;d++){
      const ds=`${monthStr}-${String(d).padStart(2,'0')}`;
      const dow=new Date(ds).getDay();
      const isFuture=new Date(ds)>now;
      if(!isFuture&&dow!==0&&dow!==6){
        const v6rec=v6Map[ds];
        if(v6rec){if(v6rec.status==='ng')hasNg=true;}
        else{const insp=getInspectionByDate(e.id,ds,'毎日点検');if(!insp)hasMissed=true;else if(Object.values(insp.results||{}).some(r=>r.r==='ng'))hasNg=true;}
      }
    }
    return hasNg?'ng':hasMissed?'miss':'ok';
  }

  const tabsHtml=displayEquip.map(({eq,line})=>{
    const isActive=eq.id===eid;
    const st=eqMonthStatus(eq);
    const dotCol=st==='ng'?'#C8292A':st==='miss'?'#D97706':'#22C55E';
    return`<button onclick="changeEquipment('${eq.id}')"
      style="flex:0 0 auto;padding:10px 16px;border-radius:22px;border:2px solid ${isActive?'#2563EB':'#E4E8EF'};
      background:${isActive?'#2563EB':'#FFFFFF'};color:${isActive?'white':'#374151'};
      font-size:13px;font-weight:700;white-space:nowrap;cursor:pointer;touch-action:manipulation;
      font-family:inherit;display:inline-flex;align-items:center;gap:6px;
      box-shadow:${isActive?'0 4px 14px rgba(37,99,235,0.25)':'0 1px 3px rgba(0,0,0,0.05)'};transition:all .15s;">
      <div style="width:7px;height:7px;border-radius:50%;background:${isActive?'rgba(255,255,255,0.75)':dotCol};flex-shrink:0;${st==='miss'&&!isActive?'animation:dotPulse 2s ease-in-out infinite;':''}"></div>
      ${eq.name}${eq.equipmentNumber?`<small style="font-size:10px;opacity:.7;">No.${eq.equipmentNumber}</small>`:''}
      ${st==='ng'&&!isActive?`<span style="font-size:9px;background:#FFF1F1;color:#C8292A;padding:1px 6px;border-radius:6px;font-weight:700;">NG</span>`:''}
    </button>`;
  }).join('');

  // ── 日付リスト生成（過去60日） ──
  const WDAYS=['日','月','火','水','木','金','土'];
  const dateRows=[];
  for(let i=0;i<60;i++){
    const d=new Date();
    d.setDate(d.getDate()-i);
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const dow=d.getDay();
    const isFuture=d>now;
    if(isFuture) continue;

    const status=getEqStatusForDate(eid,ds);
    const isWeekend=dow===0||dow===6;
    const isToday=ds===TODAY;

    // 未入力フィルター
    if(S.histFilter==='missing'&&status!=='pending') continue;

    // V6データ取得
    const v6rec=S.inspections.find(r=>r.equipmentId===eid&&r.date===ds&&r.type==='daily');
    const dailyItems=selectedEq.items.filter(i=>i.t==='毎日');
    const totalItems=v6rec?.summary?.totalCount||dailyItems.length;
    const okItems=v6rec?.summary?.okCount||0;
    const ngItems=v6rec?.summary?.ngCount||0;
    const filledItems=okItems+ngItems;

    let sym,statusText,statusColor,bgColor,bdColor;
    if(status==='done'||status==='ng'){
      if(status==='ng'){sym='✕';statusText=`NGあり（${ngItems}/${totalItems}）`;statusColor='#C8292A';bgColor='#FFF1F1';bdColor='rgba(200,41,42,0.3)';}
      else{sym='〇';statusText=`正常（${filledItems}/${totalItems}）`;statusColor='#16A34A';bgColor='#F0FDF4';bdColor='rgba(34,197,94,0.3)';}
    } else if(status==='partial'){
      sym='△';statusText=`一部完了（${filledItems}/${totalItems}）`;statusColor='#D97706';bgColor='#FFFBEB';bdColor='rgba(217,119,6,0.3)';
    } else {
      // 未入力
      if(isWeekend){sym='—';statusText='休日';statusColor='#D1D5DB';bgColor='#FFFFFF';bdColor='#E4E8EF';}
      else{sym='';statusText='未入力';statusColor='#9CA3AF';bgColor='#F9FAFB';bdColor='#E4E8EF';}
    }

    const clickable=status!=='pending';
    const dayLabel=`${d.getMonth()+1}/${d.getDate()}（${WDAYS[dow]}）`;
    const dayNumColor=isToday?'#2563EB':dow===0?'#C8292A':dow===6?'#2563EB':'#111827';

    dateRows.push(`<div style="background:${bgColor};border:1.5px solid ${isToday?'#2563EB':bdColor};border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;cursor:${clickable?'pointer':'default'};${isToday?'box-shadow:0 0 0 2.5px rgba(37,99,235,0.2);':''}"
      ${clickable?`onclick="S.histView='detail';S.histDate='${ds}';S.histEqId='${eid}';render();"`:''}>
      <!-- 日付 -->
      <div style="min-width:88px;">
        <div style="font-size:15px;font-weight:800;color:${dayNumColor};display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
          ${dayLabel}
          ${isToday?`<span style="font-size:9px;color:#2563EB;background:#EFF6FF;padding:1px 6px;border-radius:6px;font-weight:700;">今日</span>`:''}
        </div>
      </div>
      <!-- ステータスアイコン -->
      <div style="width:38px;height:38px;border-radius:50%;background:${statusColor}18;border:1.5px solid ${statusColor}40;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <span style="font-size:${sym?'20':'13'}px;font-weight:800;color:${statusColor};">${sym||'未'}</span>
      </div>
      <!-- ステータステキスト -->
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;font-weight:700;color:${statusColor};">${statusText}</div>
      </div>
      ${clickable?`<svg width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1l5 5-5 5" stroke="#CBD5E1" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
    </div>`);
  }

  const dateList=dateRows.join('');

  // 月サマリー
  const v6Map=getEqMonthSummary(eid,monthStr);
  const daysInM=new Date(nowY,nowM,0).getDate();
  let mDone=0,mNg=0,mMissed=0,mExpected=0;
  for(let d=1;d<=daysInM;d++){
    const ds=`${monthStr}-${String(d).padStart(2,'0')}`;
    const dow=new Date(ds).getDay();
    const isFuture=new Date(ds)>now;
    if(!isWeekend(dow)&&!isFuture){
      mExpected++;
      const v6r=v6Map[ds];
      if(v6r){mDone++;if(v6r.status==='ng')mNg++;}
      else mMissed++;
    }
  }
  function isWeekend(dow){return dow===0||dow===6;}
  const mRate=mExpected>0?Math.round(mDone/mExpected*100):0;
  const barCol=mNg>0?'#C8292A':mRate<60?'#D97706':'#16A34A';

  // PC 2カラム用サイドバー
  const sidebarEqHtml=displayEquip.map(({eq,line})=>{
    const isActive=eq.id===eid;
    const st=eqMonthStatus(eq);
    const dotColor=st==='ng'?'#C8292A':st==='miss'?'#D97706':'#16A34A';
    const v6m=getEqMonthSummary(eq.id,monthStr);
    const doneD=Object.values(v6m).filter(r=>r.status==='completed'||r.status==='ng').length;
    const ngD=Object.values(v6m).filter(r=>r.status==='ng').length;
    return`<div class="hist-eq-card ${isActive?'hist-eq-active':''}" onclick="changeEquipment('${eq.id}')">
      <div style="width:8px;height:8px;border-radius:50%;background:${dotColor};flex-shrink:0;box-shadow:0 0 0 3px ${dotColor}22;"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:${isActive?700:600};color:${isActive?'#1D4ED8':'#111827'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${eq.name}${eq.equipmentNumber?`<span style="font-size:10px;color:#9CA3AF;margin-left:4px;">No.${eq.equipmentNumber}</span>`:''}</div>
        <div style="font-size:10px;color:#9CA3AF;margin-top:1px;">${doneD}日 · ${st==='ng'?`<span style="color:#C8292A;font-weight:700;">NG${ngD}日</span>`:st==='miss'?`<span style="color:#D97706;">未入力あり</span>`:'全日完了'}</div>
      </div>
      ${st==='ng'?`<span style="font-size:9px;font-weight:700;color:#C8292A;background:#FFF1F1;padding:2px 7px;border-radius:8px;flex-shrink:0;">NG</span>`:st==='miss'?`<span style="font-size:9px;font-weight:700;color:#D97706;background:#FFFBEB;padding:2px 7px;border-radius:8px;flex-shrink:0;">未</span>`:''}
    </div>`;
  }).join('');

  return`
  <div style="display:flex;flex-direction:column;height:100vh;background:#F8F9FC;overflow:hidden;">
    <!-- ヘッダー -->
    <div style="background:#FFFFFF;border-bottom:1px solid #E4E8EF;padding:calc(env(safe-area-inset-top,0px)+14px) 18px 0;flex-shrink:0;position:relative;">
      <div style="position:absolute;left:0;top:0;right:0;height:2.5px;background:linear-gradient(90deg,#2563EB 0%,#4F46E5 50%,transparent);pointer-events:none;"></div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <div style="flex:1;">
          <div style="font-size:10px;color:#9CA3AF;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;">点検履歴</div>
          <div style="font-size:20px;font-weight:800;color:#111827;letter-spacing:-.4px;">${nowY}年${nowM}月</div>
        </div>
        <div style="display:flex;gap:6px;">
          <button onclick="S.histFilter=S.histFilter==='missing'?'all':'missing';render();"
            style="padding:7px 13px;border-radius:20px;border:1.5px solid ${S.histFilter==='missing'?'#C8292A':'#E4E8EF'};background:${S.histFilter==='missing'?'#FFF1F1':'#F8F9FC'};color:${S.histFilter==='missing'?'#C8292A':'#6B7280'};font-size:11px;font-weight:700;cursor:pointer;touch-action:manipulation;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap;">
            <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><circle cx="4.5" cy="4.5" r="4" stroke="currentColor" stroke-width="1.4"/></svg>
            未入力のみ
          </button>
        </div>
      </div>
      <!-- 設備タブ（スマホのみ） -->
      <div class="mobile-only" style="overflow-x:auto;overflow-y:hidden;scrollbar-width:none;margin:0 -18px;padding:0 18px 12px;">
        <style>.htabs::-webkit-scrollbar{display:none;}</style>
        <div class="htabs" style="display:flex;gap:7px;min-width:max-content;">${tabsHtml}</div>
      </div>
    </div>

    <!-- PC/スマホ分岐ボディ -->
    <div class="hist-pc-body" style="flex:1;min-height:0;display:flex;overflow:hidden;">
      <!-- PC: サイドバー（スマホ非表示） -->
      <div class="hist-sidebar pc-only">
        <div class="hist-sidebar-hdr">
          <div style="font-size:11px;font-weight:700;color:#9CA3AF;letter-spacing:.8px;">設備一覧</div>
        </div>
        <div class="hist-sidebar-scroll">${sidebarEqHtml}</div>
      </div>

      <!-- メインコンテンツ -->
      <div class="hist-main-area" style="flex:1;min-height:0;overflow-y:auto;padding:14px 16px calc(env(safe-area-inset-bottom,0px)+80px);">

        <!-- 月サマリーカード -->
        <div style="background:#FFFFFF;border:1.5px solid #E4E8EF;border-radius:16px;padding:14px 16px;margin-bottom:12px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
            <div>
              <div style="font-size:10px;color:#9CA3AF;font-weight:700;letter-spacing:1px;margin-bottom:2px;">今月の実施率</div>
              <div style="font-size:13px;font-weight:600;color:#374151;">${selectedEq.name}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:28px;font-weight:800;color:${barCol};line-height:1;">${mRate}<span style="font-size:13px;font-weight:600;color:#9CA3AF;">%</span></div>
              <div style="font-size:10px;color:#9CA3AF;">${mDone}/${mExpected}日</div>
            </div>
          </div>
          <div style="height:6px;background:#F1F3F8;border-radius:3px;overflow:hidden;margin-bottom:8px;">
            <div style="height:100%;width:${mRate}%;background:${barCol};border-radius:3px;transition:width .4s;"></div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${mNg>0?`<span style="font-size:11px;font-weight:700;color:#C8292A;background:#FFF1F1;padding:2px 9px;border-radius:8px;border:1px solid rgba(200,41,42,0.2);">✕ NG ${mNg}日</span>`:''}
            ${mMissed>0?`<span style="font-size:11px;font-weight:700;color:#D97706;background:#FFFBEB;padding:2px 9px;border-radius:8px;border:1px solid rgba(217,119,6,0.2);">未入力 ${mMissed}日</span>`:''}
            ${mNg===0&&mMissed===0&&mDone>0?`<span style="font-size:11px;font-weight:700;color:#16A34A;background:#F0FDF4;padding:2px 9px;border-radius:8px;border:1px solid rgba(34,197,94,0.2);">✓ 全日完了</span>`:''}
          </div>
        </div>

        <!-- 凡例 -->
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;padding:0 2px;">
          <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#6B7280;font-weight:600;"><div style="width:14px;height:14px;border-radius:50%;background:#F0FDF4;border:1.5px solid rgba(34,197,94,0.4);display:flex;align-items:center;justify-content:center;font-size:8px;color:#16A34A;font-weight:800;">〇</div>正常</div>
          <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#6B7280;font-weight:600;"><div style="width:14px;height:14px;border-radius:50%;background:#FFF1F1;border:1.5px solid rgba(200,41,42,0.4);display:flex;align-items:center;justify-content:center;font-size:8px;color:#C8292A;font-weight:800;">✕</div>異常あり</div>
          <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#6B7280;font-weight:600;"><div style="width:14px;height:14px;border-radius:50%;background:#F9FAFB;border:1.5px solid #E4E8EF;display:flex;align-items:center;justify-content:center;font-size:7px;color:#9CA3AF;font-weight:800;">未</div>未入力</div>
        </div>

        <!-- 日付リスト -->
        ${dateList||`<div style="text-align:center;padding:44px 20px;color:#9CA3AF;"><div style="font-size:32px;margin-bottom:10px;">✅</div><div style="font-size:14px;font-weight:600;">${S.histFilter==='missing'?'未入力の日はありません':'データがありません'}</div></div>`}
      </div>
    </div>
  </div>
  ${btabs()}`;
}


function renderHistoryDetail(date){
  const dates=getHistoryDates();
  const idx=dates.indexOf(date);
  const hasPrev=idx<dates.length-1,hasNext=idx>0;
  const d=new Date(date);const dw=['日','月','火','水','木','金','土'];
  const dl=`${d.getMonth()+1}月${d.getDate()}日(${dw[d.getDay()]})`;

  /* status icon helpers */
  const ico=(st)=>({
    done:`<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="var(--green)" stroke-width="1.8"/><path d="M6 10l3 3 5-5" stroke="var(--green)" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    ng:`<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="var(--red)" stroke-width="1.8"/><path d="M7 7l6 6M13 7l-6 6" stroke="var(--red)" stroke-width="1.9" stroke-linecap="round"/></svg>`,
    partial:`<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="var(--orange)" stroke-width="1.8"/><path d="M10 6v5M10 13v1" stroke="var(--orange)" stroke-width="1.9" stroke-linecap="round"/></svg>`,
    pending:`<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="var(--text3)" stroke-width="1.8"/><path d="M10 6v4l2.5 2.5" stroke="var(--text3)" stroke-width="1.8" stroke-linecap="round"/></svg>`,
  }[st]);
  const stLbl={done:'完了',ng:'異常',partial:'一部',pending:'未実施'};
  const stBg={done:'var(--green-lt)',ng:'var(--red-lt)',partial:'var(--orange-lt)',pending:'rgba(0,0,0,.05)'};
  const stCol={done:'var(--green)',ng:'var(--red)',partial:'var(--orange)',pending:'var(--text3)'};

  const lineBlocks=S.lines.map(l=>{
    const eqList=S.histEqId?getLineEquip(l).filter(eq=>eq.id===S.histEqId):getLineEquip(l);
    if(!eqList.length)return'';
    const eqRows=eqList.map(eq=>{
      const st=getEqStatusForDate(eq.id,date);
      const ngItems=[];
      Object.keys(S.insps).filter(k=>k.startsWith(eq.id+':')&&S.insps[k].date===date).forEach(key=>{
        const type=key.split(':')[1];
        typeItems(eq,type).filter(i=>S.insps[key].results[i.id]?.r==='ng').forEach(i=>ngItems.push(i.n));
      });
      return`<div style="display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:0.5px solid var(--border);">
        <div style="flex:1;min-width:0;">
          <div style="font-size:14px;font-weight:600;">${eq.name}</div>
          ${ngItems.length>0?`<div style="font-size:11px;color:var(--red);margin-top:2px;">${ngItems.join(' / ')}</div>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
          <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:${stBg[st]};color:${stCol[st]};">${stLbl[st]}</span>
          ${ico(st)}
        </div>
      </div>`;
    }).join('');
    return`<div class="card" style="margin-bottom:10px;padding:14px 16px;">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;padding-bottom:8px;border-bottom:1.5px solid var(--border);">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2.5" stroke="var(--text2)" stroke-width="1.4"/><path d="M4 7h6M4 10h4" stroke="var(--text2)" stroke-width="1.3" stroke-linecap="round"/></svg>
        <span style="font-size:12px;font-weight:700;color:var(--text2);">${l.name}</span>
        <span style="font-size:11px;color:var(--text3);">${l.desc}</span>
      </div>
      ${eqRows}
    </div>`;
  }).join('');

  /* date nav buttons */
  const navBtns=`<div style="display:flex;gap:6px;flex-shrink:0;">
    <button onclick="changeDate(1)" style="width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,${hasPrev?.2:.07});color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;opacity:${hasPrev?1:.4};" ${hasPrev?'':'disabled'}>
      <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M6 1L1 7l5 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button onclick="changeDate(-1)" style="width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,${hasNext?.2:.07});color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;opacity:${hasNext?1:.4};" ${hasNext?'':'disabled'}>
      <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M2 1l5 6-5 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>`;

  /* custom header with back → list */
  const histEq=S.histEqId?S.lines.flatMap(l=>getLineEquip(l)).find(e=>e.id===S.histEqId):null;
  const hdr=`<div class="phdr">
    <button class="hdr-back-btn" onclick="S.histView='list';S.histEqId=null;render();">${BACK_ICO}</button>
    <div class="hdr-center" style="display:flex;flex-direction:column;align-items:flex-start;gap:1px;min-width:0;">
      <div class="hdr-eyebrow" style="margin:0;white-space:nowrap;">${histEq?histEq.name:'点検状況'}</div>
      <div class="hdr-title" style="font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${dl}</div>
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0;">
      ${S.currentRole==='admin'?`<button onclick="openEqPdfModal()" class="hdr-action-btn" style="padding:8px 10px;">${PDF_ICO} 月次</button>`:''}
      ${navBtns}
    </div>
  </div>`;

  return`${hdr}<div class="scroll">${lineBlocks}</div>${btabs()}`;
}

      ${isOpen?`<button onclick="anomStatus('${a.id}','in-progress')" style="width:100%;padding:12px;background:rgba(249,115,22,0.15);border:1.5px solid rgba(249,115,22,0.35);border-radius:12px;color:#F97316;font-size:14px;font-weight:700;cursor:pointer;touch-action:manipulation;font-family:inherit;transition:transform .1s,background .12s;" onmousedown="this.style.transform='scale(.97)';this.style.background='rgba(249,115,22,0.28)'" onmouseup="this.style.transform='';this.style.background='rgba(249,115,22,0.15)'">対応開始</button>`:''}
      ${isIp?`<button onclick="anomStatus('${a.id}','resolved')" style="width:100%;padding:12px;background:rgba(52,199,89,0.15);border:1.5px solid rgba(52,199,89,0.35);border-radius:12px;color:#34C759;font-size:14px;font-weight:700;cursor:pointer;touch-action:manipulation;font-family:inherit;transition:transform .1s,background .12s;" onmousedown="this.style.transform='scale(.97)';this.style.background='rgba(52,199,89,0.28)'" onmouseup="this.style.transform='';this.style.background='rgba(52,199,89,0.15)'"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" style="display:inline-block;vertical-align:middle;margin-right:4px;"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>解決済にする</button>`:''}
    </div>`;
  };
  const totalActive=open.length+ip.length;
  return`<div style="display:flex;flex-direction:column;height:100vh;background:#F8F9FC;overflow:hidden;">
    <div style="background:#F7F7F9;padding:calc(env(safe-area-inset-top,0px) + 20px) 20px 18px;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:12px;">

          <div style="font-size:20px;font-weight:800;color:#111827;letter-spacing:-.4px;">未対応 <span style="color:#F97316;">${totalActive}</span>件</div>
        </div>
      </div>
    </div>
    <div style="flex:1;min-height:0;overflow-y:auto;padding:0 16px calc(env(safe-area-inset-bottom,0px) + 88px);-webkit-overflow-scrolling:touch;">
      ${totalActive===0?`<div style="text-align:center;padding:60px 20px;"><div style="width:56px;height:56px;background:rgba(52,199,89,0.12);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;"><svg width="26" height="26" viewBox="0 0 26 26" fill="none"><circle cx="13" cy="13" r="10" stroke="#34C759" stroke-width="2"/><path d="M8 13l3.5 3.5 6.5-6.5" stroke="#34C759" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div style="font-size:16px;font-weight:700;color:#111111;margin-bottom:5px;">異常はありません</div></div>`:``}

            ${tenCnt?`<span style="font-size:10px;font-weight:600;color:${freqColor('10日')};background:${freqBg('10日')};padding:1px 6px;border-radius:5px;">10日${tenCnt}</span>`:''}
            ${monCnt?`<span style="font-size:10px;font-weight:600;color:${freqColor('月次')};background:${freqBg('月次')};padding:1px 6px;border-radius:5px;">月次${monCnt}</span>`:''}
            ${!dailyCnt&&!tenCnt&&!monCnt?`<span style="font-size:10px;color:#9CA3AF;">点検項目なし</span>`:''}

          ${lineNames.length>0
            ?`<div style="font-size:10px;color:#6B7280;margin-top:2px;display:flex;align-items:center;gap:4px;">
                <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="8" rx="1.5" stroke="#9CA3AF" stroke-width="1.1"/><path d="M3 3.5h4M3 5h3M3 6.5h2" stroke="#9CA3AF" stroke-width="1" stroke-linecap="round"/></svg>
