<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>日常点検システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red:      #E24B4A;
  --red-dk:   #C73A39;
  --red-lt:   #FDECEA;
  --green:    #2E7D32;
  --green-lt: #E8F5E9;
  --orange:   #E65100;
  --orange-lt:#FFF3E0;
  --bg:       #FFFFFF;
  --surface:  #FFFFFF;
  --border:   rgba(0,0,0,0.07);
  --text:     #111111;
  --text2:    #666666;
  --text3:    #AAAAAA;
  --r-sm:     10px;
  --r:        16px;
  --r-lg:     20px;
  --shadow:   0 2px 12px rgba(0,0,0,0.07);
  --shadow-md:0 4px 20px rgba(0,0,0,0.10);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#111111;--surface:#1E1E1E;
    --border:rgba(255,255,255,0.09);
    --text:#F0F0F0;--text2:#999999;--text3:#555555;
    --shadow:0 2px 12px rgba(0,0,0,0.4);
    --shadow-md:0 4px 24px rgba(0,0,0,0.5);
    --red-lt:#2A1010;--green-lt:#0D2010;--orange-lt:#251800;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:'Noto Sans JP',-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;color:var(--text);}
#app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);}
.screen{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── Header ── */
.phdr{
  background:linear-gradient(135deg,#E24B4A 0%,#C73A39 100%);
  padding:calc(env(safe-area-inset-top,0px) + 18px) 20px 22px;
  display:flex;align-items:flex-end;gap:14px;
  flex-shrink:0;overflow:hidden;position:relative;z-index:10;
}
.phdr::before{content:'';position:absolute;top:-60px;right:-50px;width:220px;height:220px;background:rgba(255,255,255,0.07);border-radius:50%;pointer-events:none;}
.hdr-back-btn{
  width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,0.18);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  color:white;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;z-index:1;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.25);
  transition:transform .12s,background .15s;touch-action:manipulation;
}
.hdr-back-btn:active{transform:scale(.90);background:rgba(255,255,255,0.28);}
.hdr-center{flex:1;position:relative;z-index:1;min-width:0;}
.hdr-eyebrow{font-size:11px;color:rgba(255,255,255,0.72);font-weight:500;letter-spacing:.5px;margin-bottom:3px;}
.hdr-title{font-size:22px;font-weight:700;color:white;letter-spacing:-.4px;line-height:1.1;}
.hdr-action-btn{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.18);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.25);border-radius:22px;
  padding:8px 16px;height:38px;color:white;font-size:13px;font-weight:500;
  cursor:pointer;flex-shrink:0;white-space:nowrap;position:relative;z-index:1;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.2);
  transition:transform .12s;touch-action:manipulation;font-family:inherit;
}
.hdr-action-btn:active{transform:scale(.94);}
.home-hero{
  background:linear-gradient(135deg,#E24B4A 0%,#C73A39 100%);
  padding:calc(env(safe-area-inset-top,0px) + 20px) 20px 28px;
  flex-shrink:0;position:relative;overflow:hidden;
}
.home-hero::before{content:'';position:absolute;top:-80px;right:-40px;width:260px;height:260px;background:rgba(255,255,255,0.07);border-radius:50%;pointer-events:none;}
.home-hero::after{content:'';position:absolute;bottom:-100px;left:-30px;width:200px;height:200px;background:rgba(255,255,255,0.04);border-radius:50%;pointer-events:none;}

/* ── Scroll ── */
.scroll{overflow-y:auto;flex:1;padding:16px 16px calc(env(safe-area-inset-bottom,0px) + 90px);-webkit-overflow-scrolling:touch;}

/* ── Cards ── */
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:10px;border:0.5px solid var(--border);}
.card-tap{cursor:pointer;transition:transform .12s,opacity .12s;}
.card-tap:active{transform:scale(.98);opacity:.85;}
.section-label{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.4px;margin:18px 0 8px 2px;}
.section-label:first-child{margin-top:0;}

/* ── Inspection Cards ── */
.icard{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;margin-bottom:10px;border:1.5px solid var(--border);transition:border-color .2s,background .2s;user-select:none;}
.icard.rok{border-color:var(--green);background:var(--green-lt);}
.icard.rng{border-color:var(--red);background:var(--red-lt);}

/* ── Judge Buttons ── */
.jbtn{flex:1;height:52px;border-radius:14px;border:1.5px solid;cursor:pointer;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;touch-action:manipulation;transition:transform .1s,background .12s,box-shadow .12s;}
.jbtn:active{transform:scale(.94);}
.jok{background:var(--green-lt);color:var(--green);border-color:var(--green);}
.jok:active{background:var(--green);color:white;box-shadow:0 4px 16px rgba(46,125,50,0.3);}
.jng{background:var(--red-lt);color:var(--red);border-color:var(--red);}
.jng:active{background:var(--red);color:white;box-shadow:0 4px 16px rgba(226,75,74,0.3);}
@media(min-width:769px){
  .jok:hover{background:var(--green);color:white;}
  .jng:hover{background:var(--red);color:white;}
}

/* ── Badges ── */
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.bOk{background:var(--green-lt);color:var(--green);}
.bNg{background:var(--red-lt);color:var(--red);}
.bWarn{background:var(--orange-lt);color:var(--orange);}
.bGray{background:rgba(0,0,0,.06);color:var(--text2);}

/* ── Bottom Tabs ── */
.btabs{display:flex;border-top:0.5px solid var(--border);padding:8px 0 calc(env(safe-area-inset-bottom,0px) + 8px);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;z-index:20;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,0.93);}
@media(prefers-color-scheme:dark){.btabs{background:rgba(30,30,30,0.93);}}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 2px;border:none;background:none;font-size:10px;font-weight:500;color:var(--text3);touch-action:manipulation;font-family:inherit;transition:color .15s;}
.tab.active{color:var(--red);}

/* ── Progress ── */
.prog-wrap{background:rgba(0,0,0,.07);border-radius:6px;height:8px;overflow:hidden;}
.prog-fill{height:100%;border-radius:6px;transition:width .4s cubic-bezier(.4,0,.2,1);}

/* ── Pill Selector ── */
.pill-row{display:flex;gap:4px;background:rgba(0,0,0,.05);border-radius:12px;padding:3px;}
.pill{flex:1;padding:7px 4px;border-radius:9px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);touch-action:manipulation;transition:all .15s;font-family:inherit;}
.pill.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.12);}

/* ── Bulk Bar ── */
.bulk-bar{background:linear-gradient(90deg,rgba(226,75,74,.07),transparent);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:0.5px solid rgba(226,75,74,.15);}

/* ── Overlay / Sheet ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:50;display:flex;align-items:flex-end;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surface);border-radius:24px 24px 0 0;padding:24px 20px calc(env(safe-area-inset-bottom,0px) + 24px);width:100%;max-height:88vh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.34,1.2,.64,1);box-shadow:0 -8px 40px rgba(0,0,0,0.14);}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ── Form ── */
.finput{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:15px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s;}
.finput:focus{border-color:var(--red);}
.flabel{font-size:13px;color:var(--text2);display:block;margin-bottom:6px;font-weight:500;}

/* ── Toast ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:22px;font-size:13px;font-weight:500;color:white;z-index:99;white-space:nowrap;pointer-events:none;animation:fadeUp .25s ease;font-family:inherit;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* ── Utility ── */
.icon-circle{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.empty-state{text-align:center;padding:48px 20px;color:var(--text2);}
.btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,#E24B4A,#C73A39);color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(194,42,42,0.3);transition:transform .12s;touch-action:manipulation;font-family:inherit;}
.btn-primary:active{transform:scale(.97);}
.btn-ghost{width:100%;padding:13px;background:none;border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;cursor:pointer;color:var(--text2);transition:transform .12s;touch-action:manipulation;font-family:inherit;}
.btn-ghost:active{transform:scale(.97);}
@keyframes cardIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card,.icard{animation:cardIn .2s ease both;}

@media(min-width:769px){
  #app{max-width:900px;}
  .btabs{max-width:900px;}
  .hdr-action-btn:hover{background:rgba(255,255,255,0.3);}
}
</style>
</head>
<body>
<div id="app"><div id="screen" class="screen"></div></div>
<script>
const TODAY=(()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;})();
const S={
  view:'HOME',selectedLine:null,selectedEq:null,inspType:'毎日点検',
  bulkActive:false,bulkLineId:null,bulkIdx:0,
  modal:null,ngModal:{on:false,itemId:null,comment:'',photos:0},
  lines:[
    {id:'L1',name:'組立ライン',desc:'A棟1F',equip:[
      {id:'E1',name:'組立機A',lid:'L1',items:[{id:'i11',n:'油圧ゲージ確認',t:'毎日'},{id:'i12',n:'潤滑油レベル',t:'毎日'},{id:'i13',n:'異音・異臭確認',t:'毎日'},{id:'i14',n:'ベルト張力確認',t:'10日'},{id:'i15',n:'フィルター清掃',t:'月次'}]},
      {id:'E2',name:'組立機B',lid:'L1',items:[{id:'i21',n:'油圧ゲージ確認',t:'毎日'},{id:'i22',n:'回転数確認',t:'毎日'},{id:'i23',n:'温度確認',t:'毎日'},{id:'i24',n:'カップリング点検',t:'10日'}]},
      {id:'E3',name:'コンベア1',lid:'L1',items:[{id:'i31',n:'ベルト状態確認',t:'毎日'},{id:'i32',n:'駆動部潤滑',t:'毎日'},{id:'i33',n:'テンション調整',t:'10日'}]},
      {id:'E4',name:'溶接ロボット',lid:'L1',items:[{id:'i41',n:'アーム動作確認',t:'毎日'},{id:'i42',n:'ワイヤー残量',t:'毎日'},{id:'i43',n:'冷却水確認',t:'毎日'},{id:'i44',n:'キャリブレーション',t:'月次'}]},
      {id:'E5',name:'検査装置',lid:'L1',items:[{id:'i51',n:'センサー動作確認',t:'毎日'},{id:'i52',n:'精度チェック',t:'10日'}]},
    ]},
    {id:'L2',name:'加工ライン',desc:'A棟2F',equip:[
      {id:'E6',name:'NC旋盤1',lid:'L2',items:[{id:'i61',n:'主軸回転確認',t:'毎日'},{id:'i62',n:'クーラント確認',t:'毎日'},{id:'i63',n:'刃具摩耗確認',t:'毎日'},{id:'i64',n:'精度測定',t:'10日'}]},
      {id:'E7',name:'マシニングセンタ',lid:'L2',items:[{id:'i71',n:'ATC動作確認',t:'毎日'},{id:'i72',n:'切削油確認',t:'毎日'},{id:'i73',n:'主軸温度確認',t:'毎日'},{id:'i74',n:'スピンドル点検',t:'月次'}]},
      {id:'E8',name:'研削盤',lid:'L2',items:[{id:'i81',n:'砥石状態確認',t:'毎日'},{id:'i82',n:'冷却液確認',t:'毎日'},{id:'i83',n:'バランス調整',t:'10日'}]},
    ]},
    {id:'L3',name:'塗装ライン',desc:'B棟1F',equip:[
      {id:'E9',name:'塗装ブース1',lid:'L3',items:[{id:'i91',n:'排気ファン確認',t:'毎日'},{id:'i92',n:'フィルター状態',t:'毎日'},{id:'i93',n:'塗料粘度確認',t:'毎日'}]},
      {id:'E10',name:'乾燥炉',lid:'L3',items:[{id:'i101',n:'温度プロファイル確認',t:'毎日'},{id:'i102',n:'バーナー状態確認',t:'毎日'},{id:'i103',n:'チェーン潤滑',t:'10日'}]},
    ]},
  ],
  insps:{},
  approvals:[
    {id:'A1',lid:'L1',eid:'E1',type:'10日点検',date:'2026-04-08',status:'pending',by:'山田太郎',approver:null},
    {id:'A2',lid:'L2',eid:'E6',type:'月次点検',date:'2026-04-05',status:'pending',by:'佐藤花子',approver:null},
    {id:'A3',lid:'L1',eid:'E3',type:'10日点検',date:'2026-04-01',status:'approved',by:'田中一郎',approver:'鈴木部長'},
  ],
  anomalies:[
    {id:'AN1',lid:'L1',eid:'E2',iid:'i22',iname:'回転数確認',comment:'異常振動あり。要確認',status:'open',date:'2026-04-09',by:'山田太郎'},
    {id:'AN2',lid:'L2',eid:'E6',iid:'i63',iname:'刃具摩耗確認',comment:'摩耗が著しい。交換が必要',status:'in-progress',date:'2026-04-08',by:'佐藤花子'},
  ],
};

function getLn(id){return S.lines.find(l=>l.id===id);}
function getEq(id){for(const l of S.lines){const e=l.equip.find(e=>e.id===id);if(e)return e;}return null;}
function getInsps(eid){return S.insps[eid];}
function typeItems(eq,type){
  const m={'毎日点検':'毎日','10日点検':'all2','月次点検':'all'};const t=m[type]||'毎日';
  if(t==='毎日')return eq.items.filter(i=>i.t==='毎日');
  if(t==='all2')return eq.items.filter(i=>i.t==='毎日'||i.t==='10日');
  return eq.items;
}
function lineStats(lid){
  const l=getLn(lid);let done=0,ng=0,pend=0;
  for(const eq of l.equip){const st=eqStatus(eq.id);if(st==='done')done++;else if(st==='ng')ng++;else pend++;}
  return{total:l.equip.length,done,ng,pend};
}
function eqStatus(eid){
  const eq=getEq(eid);const insp=getInsps(eid);const items=typeItems(eq,S.inspType);
  if(!insp||insp.type!==S.inspType||insp.date!==TODAY)return'pending';
  const rs=insp.results;
  if(items.some(i=>rs[i.id]?.r==='ng'))return'ng';
  if(items.every(i=>rs[i.id]))return'done';
  return'partial';
}
function pendApprovals(){return S.approvals.filter(a=>a.status==='pending');}
function openAnoms(){return S.anomalies.filter(a=>a.status!=='resolved');}

function toast(msg,type='ok'){
  const old=document.querySelector('.toast');if(old)old.remove();
  const t=document.createElement('div');t.className='toast';
  t.style.background=type==='ok'?'#1B5E20':type==='warn'?'#BF360C':'#0D47A1';
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}
function nav(view,data={}){Object.assign(S,{view},data);window.scrollTo(0,0);render();}
function setResult(itemId,r){
  if(r==='ng'){S.ngModal={on:true,itemId,comment:'',photos:0};render();return;}
  const eid=S.selectedEq;
  if(!S.insps[eid])S.insps[eid]={date:TODAY,type:S.inspType,results:{}};
  S.insps[eid].results[itemId]={r:'ok',comment:'',photos:0};render();
}
function bulkOk(){
  const eid=S.selectedEq;const eq=getEq(eid);const items=typeItems(eq,S.inspType);
  if(!S.insps[eid])S.insps[eid]={date:TODAY,type:S.inspType,results:{}};
  let cnt=0;items.forEach(it=>{if(!S.insps[eid].results[it.id]){S.insps[eid].results[it.id]={r:'ok',comment:'',photos:0};cnt++;}});
  toast(cnt>0?`${cnt}件を○に一括入力しました`:'未入力の項目はありません',cnt>0?'ok':'info');render();
}
function resetResult(iid){const eid=S.selectedEq;if(S.insps[eid])delete S.insps[eid].results[iid];render();}
function submitInsp(){
  const eid=S.selectedEq;const eq=getEq(eid);const items=typeItems(eq,S.inspType);
  const rs=S.insps[eid]?.results||{};const pend=items.filter(i=>!rs[i.id]).length;
  if(pend>0){toast(`未入力が${pend}件あります`,'warn');return;}
  if(S.inspType!=='毎日点検'){S.approvals.push({id:'A'+Date.now(),lid:eq.lid,eid,type:S.inspType,date:TODAY,status:'pending',by:'現場作業者',approver:null});toast('点検完了。承認申請しました');}
  else toast('点検完了しました');
  if(S.bulkActive){
    const l=getLn(S.bulkLineId);const ni=S.bulkIdx+1;
    if(ni<l.equip.length){S.bulkIdx=ni;S.selectedEq=l.equip[ni].id;render();}
    else{S.bulkActive=false;toast('ライン点検完了！');nav('LINE_DETAIL',{selectedLine:S.bulkLineId});}
  }else nav('LINE_DETAIL');
}
function approve(id){const a=S.approvals.find(x=>x.id===id);if(a){a.status='approved';a.approver='管理者';}toast('承認しました');render();}
function reject(id){const a=S.approvals.find(x=>x.id===id);if(a)a.status='rejected';toast('差し戻しました','warn');render();}
function anomStatus(id,st){const a=S.anomalies.find(x=>x.id===id);if(a)a.status=st;toast(st==='in-progress'?'対応開始しました':'解決済にしました');render();}
function confirmNg(){
  const c=document.getElementById('ng-c')?.value?.trim()||'';
  if(!c){toast('コメントを入力してください','warn');return;}
  if(S.ngModal.photos===0){toast('写真を追加してください','warn');return;}
  const eid=S.selectedEq;const eq=getEq(eid);const iid=S.ngModal.itemId;const item=eq.items.find(i=>i.id===iid);
  if(!S.insps[eid])S.insps[eid]={date:TODAY,type:S.inspType,results:{}};
  S.insps[eid].results[iid]={r:'ng',comment:c,photos:S.ngModal.photos};
  if(!S.anomalies.find(a=>a.eid===eid&&a.iid===iid&&a.status!=='resolved')){
    S.anomalies.push({id:'AN'+Date.now(),lid:eq.lid,eid,iid,iname:item.n,comment:c,status:'open',date:TODAY,by:'現場作業者'});
  }
  S.ngModal={on:false,itemId:null,comment:'',photos:0};render();
}
function addEqConfirm(lid){
  const n=document.getElementById('meq-n')?.value?.trim();
  if(!n){toast('設備名を入力してください','warn');return;}
  getLn(lid).equip.push({id:'E'+Date.now(),name:n,lid,items:[{id:'I'+Date.now()+'a',n:'外観確認',t:'毎日'},{id:'I'+Date.now()+'b',n:'動作確認',t:'毎日'}]});
  S.modal=null;toast(`${n}を追加しました`);render();
}
function addLineConfirm(){
  const n=document.getElementById('mln-n')?.value?.trim();const d=document.getElementById('mln-d')?.value?.trim()||'';

}
function delLine(lid){
  const l=getLn(lid);if(!confirm(`${l.name}を削除しますか？`))return;

}

  return`${phdr('点検履歴','HOME',fmtDate(TODAY),pdfBtn())}
  <div class="scroll">
    ${all.length===0?`<div class="empty-state"><div style="font-size:40px;margin-bottom:12px;">📋</div><div style="font-weight:600;font-size:16px;margin-bottom:4px;">点検履歴はありません</div><div style="font-size:13px;">点検を実施すると記録が表示されます</div></div>`
    :all.map(({eq,l,insp,ok,ng,total})=>`<div class="card">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="icon-circle" style="background:${ng>0?'var(--red-lt)':'var(--green-lt)'};">
          <span style="font-size:20px;">${ng>0?'❌':'✅'}</span>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;">
            <div style="font-weight:600;font-size:15px;">${eq?.name||'-'}</div>
            <span class="badge ${ng>0?'bNg':'bOk'}">${ng>0?`異常 ${ng}`:'正常'}</span>
          </div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">${l?.name} · ${insp.type} · ${insp.date}</div>
          <div style="display:flex;gap:14px;">
            <span style="font-size:12px;color:var(--green);font-weight:600;">○ 正常 ${ok}</span>
            ${ng>0?`<span style="font-size:12px;color:var(--red);font-weight:600;">✗ 異常 ${ng}</span>`:''}
            <span style="font-size:12px;color:var(--text3);">計 ${total}項目</span>
          </div>
        </div>
      </div>
    </div>`).join('')}
  </div>${btabs()}`;
}

/* ═══════════ ANOMALY ═══════════ */
function renderAnomaly(){
  const open=S.anomalies.filter(a=>a.status==='open');const ip=S.anomalies.filter(a=>a.status==='in-progress');const res=S.anomalies.filter(a=>a.status==='resolved');
  const acard=a=>{
    const eq=getEq(a.eid);const l=getLn(a.lid);
    const cfg={open:{cls:'bNg',lbl:'未対応',col:'var(--red)'},['in-progress']:{cls:'bWarn',lbl:'対応中',col:'var(--orange)'},resolved:{cls:'bOk',lbl:'解決済',col:'var(--green)'}};const c=cfg[a.status];
    return`<div class="card" style="${a.status!=='resolved'?`border-left:3px solid ${c.col};`:''}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;">
        <div style="flex:1;"><span class="badge ${c.cls}" style="margin-bottom:5px;display:inline-block;">${c.lbl}</span>
          <div style="font-weight:600;font-size:15px;margin-bottom:2px;">${a.iname}</div>
          <div style="font-size:12px;color:var(--text2);">${eq?.name||'-'} · ${l?.name} · ${a.date}</div>
        </div>
      </div>
      <div style="font-size:13px;padding:10px 12px;background:var(--bg);border-radius:10px;color:var(--text2);margin-bottom:${a.status!=='resolved'?'12px':'0'};">${a.comment}</div>
      ${a.status==='open'?`<button onclick="anomStatus('${a.id}','in-progress')" style="width:100%;padding:11px;background:var(--orange-lt);border:1px solid var(--orange);border-radius:var(--r-sm);color:var(--orange);font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation;font-family:inherit;transition:transform .12s;" onmousedown="this.style.transform='scale(.97)'" onmouseup="this.style.transform=''">対応開始</button>`:''}
      ${a.status==='in-progress'?`<button onclick="anomStatus('${a.id}','resolved')" style="width:100%;padding:11px;background:var(--green-lt);border:1px solid var(--green);border-radius:var(--r-sm);color:var(--green);font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation;font-family:inherit;transition:transform .12s;" onmousedown="this.style.transform='scale(.97)'" onmouseup="this.style.transform=''">✓ 解決済にする</button>`:''}
    </div>`;
  };
  return`${phdr('異常管理','HOME',`未対応 ${open.length+ip.length}件`)}
  <div class="scroll">
    ${open.length===0&&ip.length===0?`<div class="empty-state"><div style="font-size:40px;margin-bottom:12px;">✅</div><div style="font-weight:600;font-size:16px;margin-bottom:4px;">異常はありません</div></div>`:``}
    ${open.length>0?`<div class="section-label">未対応 (${open.length})</div>${open.map(acard).join('')}`:''}
    ${ip.length>0?`<div class="section-label">対応中 (${ip.length})</div>${ip.map(acard).join('')}`:''}
    ${res.length>0?`<div class="section-label">解決済 (${res.length})</div>${res.map(acard).join('')}`:''}
  </div>${btabs()}`;
}

/* ═══════════ EQ/LINE MGMT ═══════════ */
function renderEqMgmt(){
  return`${phdr('設備管理','HOME','',pdfBtn())}
  <div class="scroll">
    ${S.lines.map(l=>`
      <div style="display:flex;align-items:center;justify-content:space-between;margin:18px 2px 8px;"><span class="section-label" style="margin:0;">${l.name}</span>
        <button onclick="S.modal={type:'addEq',lid:'${l.id}'};render();" style="font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;touch-action:manipulation;font-family:inherit;font-weight:600;">＋ 追加</button>
      </div>
      ${l.equip.map(eq=>`<div class="card" style="display:flex;align-items:center;justify-content:space-between;">
        <div><div style="font-weight:600;font-size:15px;margin-bottom:2px;">${eq.name}</div><div style="font-size:12px;color:var(--text2);">項目 ${eq.items.length}件</div></div>
        <button onclick="delEq('${eq.id}')" style="padding:7px 14px;border:1px solid var(--red-lt);border-radius:20px;background:var(--red-lt);color:var(--red);font-size:12px;font-weight:600;cursor:pointer;touch-action:manipulation;font-family:inherit;">削除</button>
      </div>`).join('')}
    `).join('')}
  </div>${btabs()}`;
}

function renderLineMgmt(){
  return`${phdr('ライン管理','HOME',`全 ${S.lines.length} ライン`)}
  <div class="scroll">
    ${S.lines.map(l=>`<div class="card" style="display:flex;align-items:center;justify-content:space-between;">
      <div><div style="font-weight:600;font-size:15px;margin-bottom:2px;">${l.name}</div><div style="font-size:12px;color:var(--text2);">${l.desc} · 設備 ${l.equip.length}台</div></div>
      <button onclick="delLine('${l.id}')" style="padding:7px 14px;border:1px solid var(--red-lt);border-radius:20px;background:var(--red-lt);color:var(--red);font-size:12px;font-weight:600;cursor:pointer;touch-action:manipulation;font-family:inherit;">削除</button>
    </div>`).join('')}
    <button onclick="S.modal={type:'addLine'};render();" style="width:100%;padding:14px;border:1.5px dashed var(--border);background:none;border-radius:var(--r);color:var(--text2);cursor:pointer;font-size:14px;margin-top:4px;touch-action:manipulation;font-family:inherit;">＋ ラインを追加</button>
  </div>${btabs()}`;
}

/* ═══════════ NG SHEET ═══════════ */
function renderNgSheet(){
  return`<div class="overlay" onclick="if(event.target===this){S.ngModal={on:false,itemId:null,comment:'',photos:0};render();}">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
      <div style="width:44px;height:44px;background:var(--red-lt);border-radius:12px;display:flex;align-items:center;justify-content:center;">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 3l14 14M17 3L3 17" stroke="var(--red)" stroke-width="2.4" stroke-linecap="round"/></svg>
      </div>
      <div><div style="font-size:18px;font-weight:700;color:var(--red);">異常を記録</div><div style="font-size:12px;color:var(--text2);">コメントと写真が必須です</div></div>
    </div>
    <div style="margin-bottom:14px;">
      <label class="flabel">異常の内容 <span style="color:var(--red);">*</span></label>
      <textarea id="ng-c" placeholder="異常内容を詳しく入力してください" style="width:100%;padding:12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;resize:none;height:80px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s;" onfocus="this.style.borderColor='var(--red)'" onblur="this.style.borderColor='var(--border)'"></textarea>
    </div>
    <div style="margin-bottom:22px;">
      <label class="flabel">写真 <span style="color:var(--red);">*</span></label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button onclick="S.ngModal.photos++;render();" style="width:72px;height:72px;border:1.5px dashed var(--border);border-radius:var(--r-sm);background:var(--bg);cursor:pointer;font-size:26px;color:var(--text3);touch-action:manipulation;display:flex;align-items:center;justify-content:center;">+</button>
        ${Array.from({length:S.ngModal.photos},(_,i)=>`<div style="width:72px;height:72px;background:var(--red-lt);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--red);font-weight:600;">写真${i+1}</div>`).join('')}
      </div>
      ${S.ngModal.photos===0?`<div style="font-size:11px;color:var(--red);margin-top:6px;font-weight:500;">写真を1枚以上追加してください</div>`:''}
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="S.ngModal={on:false,itemId:null,comment:'',photos:0};render();" class="btn-ghost" style="flex:1;width:auto;">キャンセル</button>
      <button onclick="confirmNg()" style="flex:2;padding:14px;background:var(--red);color:white;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;touch-action:manipulation;font-family:inherit;transition:transform .12s;" onmousedown="this.style.transform='scale(.97)'" onmouseup="this.style.transform=''">異常を登録</button>
    </div>
  </div></div>`;
}

/* ═══════════ MODAL SHEET ═══════════ */
function renderModalSheet(){
  const m=S.modal;let inner='';
  if(m.type==='addEq'){inner=`
    <div class="sheet-handle"></div>
    <div style="font-size:18px;font-weight:700;margin-bottom:4px;">設備を追加</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:18px;">新しい設備の名前を入力してください</div>
    <div style="margin-bottom:20px;"><label class="flabel">設備名</label><input id="meq-n" class="finput" type="text" placeholder="例: NC旋盤3"></div>
    <div style="display:flex;gap:10px;">
      <button onclick="S.modal=null;render();" class="btn-ghost" style="flex:1;width:auto;">キャンセル</button>
      <button onclick="addEqConfirm('${m.lid}')" class="btn-primary" style="flex:2;width:auto;padding:13px;">追加する</button>
    </div>`;}
  else if(m.type==='addLine'){inner=`
    <div class="sheet-handle"></div>
    <div style="font-size:18px;font-weight:700;margin-bottom:4px;">ラインを追加</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:18px;">新しいラインの情報を入力してください</div>
    <div style="margin-bottom:12px;"><label class="flabel">ライン名</label><input id="mln-n" class="finput" type="text" placeholder="例: 検査ライン"></div>
    <div style="margin-bottom:20px;"><label class="flabel">場所</label><input id="mln-d" class="finput" type="text" placeholder="例: C棟1F"></div>
    <div style="display:flex;gap:10px;">
      <button onclick="S.modal=null;render();" class="btn-ghost" style="flex:1;width:auto;">キャンセル</button>
      <button onclick="addLineConfirm()" class="btn-primary" style="flex:2;width:auto;padding:13px;">追加する</button>
    </div>`;}
  return`<div class="overlay" onclick="if(event.target===this){S.modal=null;render();}"><div class="sheet">${inner}</div></div>`;
}

/* ═══════════ RENDER ═══════════ */
function render(){
  const sc=document.getElementById('screen');
  let body='';
  switch(S.view){
    case'HOME':body=renderHome();break;
    case'LINE_DETAIL':body=renderLineDetail();break;
    case'INSPECTION':body=renderInspection();break;
    case'APPROVAL':body=renderApproval();break;
    case'HISTORY':body=renderHistory();break;
    case'ANOMALY':body=renderAnomaly();break;
    case'EQUIPMENT_MGMT':body=renderEqMgmt();break;
    case'LINE_MGMT':body=renderLineMgmt();break;
    default:body=renderHome();
  }
  sc.innerHTML=body;
  if(S.ngModal.on)sc.insertAdjacentHTML('beforeend',renderNgSheet());
  if(S.modal)sc.insertAdjacentHTML('beforeend',renderModalSheet());
}

render();
</script>
</body>
</html>
