<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#ffffff"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="点検"/>
<title>日常点検アプリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
/* ─── iOS System Tokens ─────────────────────────────────────── */
:root {
  --blue:   #007AFF; --blue-bg:  #E8F2FF;
  --green:  #34C759; --green-bg: #DFFAE9;
  --red:    #FF3B30; --red-bg:   #FFEBE9;
  --orange: #FF9500; --orange-bg:#FFF2D9;
  --gray1:  #8E8E93; --gray2:    #AEAEB2;
  --gray3:  #C7C7CC; --gray4:    #D1D1D6;
  --gray5:  #E5E5EA; --gray6:    #F2F2F7;
  --sep:    rgba(60,60,67,0.22);
  --bg:     #F2F2F7;
  --card:   #FFFFFF;
  --t1:     #000000;
  --t2:     rgba(60,60,67,0.75);
  --t3:     rgba(60,60,67,0.50);
  --f: 'Noto Sans JP', -apple-system, sans-serif;
  --r-sm:10px; --r-md:13px; --r-lg:16px; --r-xl:22px;
  --sh-xs: 0 1px 3px rgba(0,0,0,.06);
  --sh-sm: 0 2px 8px rgba(0,0,0,.08);
  --sh-md: 0 6px 20px rgba(0,0,0,.10);
  --sh-lg: 0 12px 40px rgba(0,0,0,.14);
  --spring: cubic-bezier(0.34,1.56,0.64,1);
  --ios:    cubic-bezier(0.25,0.46,0.45,0.94);
  --dur: 0.25s;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--f);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;user-select:none;-webkit-user-select:none;}
::-webkit-scrollbar{display:none;}
*{scrollbar-width:none;}
#root{height:100%;display:flex;flex-direction:column;}

/* ─── Page ─── */
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(80px + env(safe-area-inset-bottom,0px));}

/* ─── Large Title Header ─── */
.lt-header{
  padding: calc(env(safe-area-inset-top,0px) + 16px) 20px 0;
}
.lt-title{font-size:34px;font-weight:700;letter-spacing:-0.5px;line-height:1.15;color:var(--t1);}
.lt-date{font-size:15px;color:var(--gray1);font-weight:400;margin-top:2px;margin-bottom:18px;}
.lt-greeting{font-size:15px;color:var(--t2);font-weight:500;margin-bottom:4px;}

/* ─── Section Label ─── */
.sec-lbl{font-size:13px;font-weight:600;color:var(--gray1);text-transform:uppercase;letter-spacing:.05em;padding:20px 20px 8px;}

/* ─── iOS Grouped Card ─── */
.g-card{background:var(--card);border-radius:var(--r-lg);margin:0 20px;box-shadow:var(--sh-xs);overflow:hidden;}
.g-row{display:flex;align-items:center;padding:14px 16px;background:var(--card);position:relative;cursor:pointer;transition:background var(--dur);}
.g-row:active{background:var(--gray5);}
.g-row+.g-row::before{content:'';position:absolute;top:0;left:16px;right:0;height:.5px;background:var(--sep);}
.g-row-ncursor{cursor:default;}
.g-row-ncursor:active{background:var(--card);}

/* ─── Plain Card ─── */
.p-card{background:var(--card);border-radius:var(--r-lg);margin:0 20px;padding:18px 16px;box-shadow:var(--sh-xs);}

/* ─── Badge ─── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:99px;font-size:12px;font-weight:600;white-space:nowrap;}
.b-grey{background:var(--gray5);color:var(--gray1);}
.b-green{background:var(--green-bg);color:#1A7A35;}
.b-orange{background:var(--orange-bg);color:#B35B00;}
.b-red{background:var(--red-bg);color:#C0160D;}
.b-blue{background:var(--blue-bg);color:#005EC4;}

/* ─── Buttons ─── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-family:var(--f);font-weight:600;border-radius:var(--r-md);transition:transform var(--dur) var(--spring),opacity .15s;touch-action:manipulation;-webkit-user-select:none;}
.btn:active{transform:scale(.94);opacity:.85;}
.btn:disabled{opacity:.35;pointer-events:none;}
.btn-blue{background:var(--blue);color:#fff;box-shadow:0 4px 16px rgba(0,122,255,.35);}
.btn-green{background:var(--green);color:#fff;box-shadow:0 4px 16px rgba(52,199,89,.35);}
.btn-red{background:var(--red);color:#fff;box-shadow:0 4px 16px rgba(255,59,48,.30);}
.btn-ghost{background:var(--gray5);color:var(--t1);}
.btn-text{background:transparent;color:var(--blue);box-shadow:none;}

/* ─── Input ─── */
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--gray4);border-radius:var(--r-md);font-family:var(--f);font-size:16px;color:var(--t1);background:var(--card);outline:none;transition:border-color var(--dur),box-shadow var(--dur);-webkit-appearance:none;}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.12);}
textarea.inp{resize:none;line-height:1.6;}

/* ─── Animations ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes sheetIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes overlayFade{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes popBtn{0%{transform:scale(1)}35%{transform:scale(1.14)}100%{transform:scale(1)}}
@keyframes shakeSoft{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes hlGreen{0%{background:var(--green-bg)}100%{background:var(--card)}}
.fade-up{animation:fadeUp var(--dur) var(--ios) both;}
.pop{animation:popBtn .25s var(--spring);}
.shake{animation:shakeSoft .3s ease;}
.hl-green{animation:hlGreen 1.2s var(--ios) forwards;}

/* ─── Navigation Bar ─── */
#nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(56px + env(safe-area-inset-bottom,0px));
  padding-bottom:env(safe-area-inset-bottom,0px);
  background:rgba(255,255,255,.85);
  backdrop-filter:saturate(180%) blur(24px);
  -webkit-backdrop-filter:saturate(180%) blur(24px);
  border-top:.5px solid var(--sep);
  display:flex;z-index:100;
}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;cursor:pointer;position:relative;touch-action:manipulation;padding:6px 0 4px;transition:transform var(--dur) var(--spring);}
.nav-tab:active{transform:scale(.82);}
.nav-icon{font-size:20px;line-height:1;position:relative;transition:transform var(--dur) var(--spring);}
.nav-tab.active .nav-icon{transform:scale(1.1);}
.nav-label{font-size:10px;font-weight:500;color:var(--gray1);font-family:var(--f);transition:color var(--dur);}
.nav-tab.active .nav-label{color:var(--blue);font-weight:600;}
.nav-badge{position:absolute;top:-4px;right:-10px;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:99px;min-width:16px;text-align:center;font-family:var(--f);border:1.5px solid #fff;}

/* ─── Page Header (exec / detail) ─── */
.nav-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 10px;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:.5px solid var(--sep);
  flex-shrink:0;position:sticky;top:0;z-index:10;
}
.nh-title{font-size:17px;font-weight:600;color:var(--t1);}
.back-btn{background:none;border:none;cursor:pointer;font-size:17px;font-weight:400;color:var(--blue);font-family:var(--f);display:flex;align-items:center;gap:3px;padding:4px 0;min-width:60px;touch-action:manipulation;}
.back-btn:active{opacity:.6;}
.back-btn svg{width:10px;height:16px;fill:none;stroke:var(--blue);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

/* ─── Cbar ─── */
.cbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--card);border-bottom:.5px solid var(--sep);flex-shrink:0;}
.pending-pill{background:var(--orange-bg);color:#B35B00;padding:4px 12px;border-radius:99px;font-size:13px;font-weight:600;}
.done-pill{background:var(--green-bg);color:#1A7A35;padding:4px 12px;border-radius:99px;font-size:13px;font-weight:600;}

/* ─── Stats Grid ─── */
.stats-grid{display:flex;gap:10px;margin:0 20px;}
.stat-tile{flex:1;background:var(--card);border-radius:var(--r-lg);text-align:center;padding:16px 8px 14px;box-shadow:var(--sh-xs);}
.stat-num{font-size:30px;font-weight:700;line-height:1;letter-spacing:-.5px;}
.stat-lbl{font-size:11px;color:var(--gray1);margin-top:4px;font-weight:500;}

/* ─── Type Card ─── */
.type-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;margin-right:14px;}
.type-name{font-size:17px;font-weight:600;color:var(--t1);}
.type-sub{font-size:12px;color:var(--gray1);margin-top:2px;}
.chevron-icon{font-size:16px;color:var(--gray3);margin-left:6px;flex-shrink:0;}

/* ─── Item Card ─── */
.item-card{
  background:var(--card);margin:0 20px 10px;border-radius:var(--r-lg);
  padding:18px 16px;box-shadow:var(--sh-xs);
  transition:background .3s ease,transform .2s var(--spring);
  overflow:hidden;position:relative;
}
.item-card.is-ok{background:var(--green-bg);}
.item-card.is-ng{background:var(--red-bg);border-left:3px solid var(--red);}
.swipe-hint-l,.swipe-hint-r{position:absolute;top:50%;transform:translateY(-50%);font-size:22px;font-weight:700;opacity:0;transition:opacity .12s;pointer-events:none;}
.swipe-hint-r{left:14px;color:var(--green);}
.swipe-hint-l{right:14px;color:var(--red);}
.item-card.sw-right .swipe-hint-r{opacity:1;}
.item-card.sw-left  .swipe-hint-l{opacity:1;}
.item-label{font-size:16px;font-weight:600;flex:1;line-height:1.4;color:var(--t1);}

/* ─── Choice Buttons ─── */
.choice-btn{
  width:54px;height:54px;border-radius:14px;
  border:1.5px solid var(--gray4);background:var(--gray6);
  color:var(--gray3);font-size:20px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s var(--spring);touch-action:manipulation;
  font-family:var(--f);-webkit-tap-highlight-color:transparent;
}
.choice-btn:active{transform:scale(.88);}
.choice-btn.ok{background:var(--green);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(52,199,89,.42);transform:scale(1.06);}
.choice-btn.ng{background:var(--red);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(255,59,48,.40);transform:scale(1.06);}

/* ─── Expand Area ─── */
.expand-area{margin-top:14px;padding-top:14px;border-top:.5px solid var(--sep);}
.expand-lbl{font-size:12px;font-weight:600;color:var(--gray1);display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;}
.photo-btn{width:100%;height:52px;border:1.5px dashed var(--gray3);border-radius:var(--r-md);background:transparent;color:var(--gray1);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--f);display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.photo-btn:active{opacity:.7;transform:scale(.98);}
.photo-preview{position:relative;border-radius:var(--r-md);overflow:hidden;}
.photo-preview img{width:100%;max-height:200px;object-fit:cover;display:block;}
.photo-change{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f);}

/* ─── FAB (Floating Bulk Button) ─── */
.fab-wrap{
  position:fixed;
  bottom:calc(64px + env(safe-area-inset-bottom,0px) + 12px);
  left:20px;right:20px;z-index:90;
  animation:fadeUp .28s var(--ios);
}
.fab-bulk{
  width:100%;height:58px;font-size:15px;font-weight:700;border-radius:18px;
  background:rgba(0,122,255,.9);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:#fff;border:none;cursor:pointer;font-family:var(--f);
  box-shadow:0 8px 28px rgba(0,122,255,.38);
  transition:transform var(--dur) var(--spring),opacity .15s;
  touch-action:manipulation;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.fab-bulk:active{transform:scale(.96);opacity:.9;}

/* ─── Overlay / Sheet / Modal ─── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:200;
  display:flex;align-items:flex-end;
  animation:overlayFade .22s ease;
}
.overlay-center{align-items:center;justify-content:center;padding:24px;}
.sheet{
  background:var(--card);border-radius:22px 22px 0 0;
  padding:8px 0 calc(24px + env(safe-area-inset-bottom,0px));
  width:100%;max-height:92vh;overflow-y:auto;
  animation:sheetIn .32s var(--ios);
}
.sheet-handle{width:36px;height:4px;background:var(--gray4);border-radius:99px;margin:0 auto 14px;}
.sheet-header{font-size:20px;font-weight:700;color:var(--t1);padding:0 20px 16px;border-bottom:.5px solid var(--sep);margin-bottom:4px;}
.modal-card{
  background:var(--card);border-radius:22px;
  padding:24px 20px;width:100%;max-width:340px;
  animation:scaleIn .25s var(--spring);
  box-shadow:var(--sh-lg);
}
.modal-title{font-size:17px;font-weight:700;text-align:center;color:var(--t1);margin-bottom:8px;}
.modal-body{font-size:14px;color:var(--gray1);line-height:1.7;text-align:center;margin-bottom:20px;}

/* ─── Filter Row ─── */
.filter-row{display:flex;gap:8px;overflow-x:auto;padding:12px 20px;}
.filter-pill{flex-shrink:0;padding:7px 16px;border-radius:99px;border:1.5px solid var(--gray4);background:var(--card);font-size:14px;font-weight:500;color:var(--gray1);cursor:pointer;font-family:var(--f);white-space:nowrap;transition:all .2s;}
.filter-pill:active{transform:scale(.93);}
.filter-pill.active{background:var(--blue);border-color:var(--blue);color:#fff;}

/* ─── Detail Item ─── */
.detail-item{background:var(--card);border-radius:var(--r-md);margin:0 20px 6px;padding:14px 16px;box-shadow:var(--sh-xs);}
.detail-item.ng-item{background:var(--red-bg);border-left:3px solid var(--red);}

/* ─── List Card ─── */
.list-card{background:var(--card);border-radius:var(--r-lg);box-shadow:var(--sh-xs);margin:0 20px 10px;padding:16px;cursor:pointer;transition:transform .2s var(--spring),background .15s;}
.list-card:active{background:var(--gray5);transform:scale(.99);}

/* ─── Info Box ─── */
.info-box{background:#FFF8E6;border:1px solid #FFD060;border-radius:var(--r-md);padding:12px 16px;font-size:14px;color:#7A5000;margin:0 20px 12px;line-height:1.5;}

/* ─── Approve Bar ─── */
.aprv-bar{padding:16px 20px calc(12px + env(safe-area-inset-bottom,0px));background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid var(--sep);display:flex;gap:10px;flex-shrink:0;}

/* ─── Empty ─── */
.empty{text-align:center;padding:60px 24px;color:var(--gray1);}
.empty .ei{font-size:54px;margin-bottom:14px;display:block;}
.empty p{font-size:16px;font-weight:500;}

/* ─── Name Edit Button ─── */
.name-edit-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;vertical-align:middle;touch-action:manipulation;}
.name-set-btn{background:none;border:none;cursor:pointer;color:var(--blue);font-weight:600;font-size:15px;font-family:var(--f);touch-action:manipulation;}

/* ─── Recent item ─── */
.recent-row{display:flex;align-items:center;padding:13px 16px;cursor:pointer;position:relative;background:var(--card);transition:background .15s;}
.recent-row:active{background:var(--gray5);}
.recent-row+.recent-row::before{content:'';position:absolute;top:0;left:16px;right:0;height:.5px;background:var(--sep);}
</style>
</head>

const ANOM_META = {
  open:        {label:'未対応', cls:'b-red',    color:'#FF3B30'},
  in_progress: {label:'対応中', cls:'b-orange', color:'#FF9500'},
  done:        {label:'完了',   cls:'b-green',  color:'#34C759'},
};

// ─── Haptic Feedback ─────────────────────────────────────────
function haptic(type='light'){
  if(navigator.vibrate){
    if(type==='light')   navigator.vibrate(8);
    if(type==='medium')  navigator.vibrate(15);
    if(type==='error')   navigator.vibrate([10,30,10]);
    if(type==='success') navigator.vibrate([5,20,8]);
  }
}

// ─── Firestore helpers ───────────────────────────────────────
async function createSession(type,equip){
  const items=ITEMS[type.id]||[];
  const results={};
  items.forEach(i=>{ results[i.id]={status:'pending',comment:'',photoUrl:''}; });
  const r2=await addDoc(collection(db,'inspections'),{
    typeId:type.id,typeLabel:type.label,equipmentName:equip,
    inspectorName:localStorage.getItem('inspName')||'未設定',
    status:'in_progress',results,
    createdAt:serverTimestamp(),startedAt:serverTimestamp(),
    completedAt:null,approvedAt:null,approvedBy:null,rejectedReason:null
  });
  return r2.id;
}
async function saveItem(sid,iid,{status,comment,photoUrl}){
  await updateDoc(doc(db,'inspections',sid),{
    [`results.${iid}.status`]:status,
    [`results.${iid}.comment`]:comment||'',
    [`results.${iid}.photoUrl`]:photoUrl||'',
    updatedAt:serverTimestamp()
  });
}
async function bulkOk(sid,ids){
  const upd={updatedAt:serverTimestamp()};
  ids.forEach(id=>{ upd[`results.${id}.status`]='ok'; });
  await updateDoc(doc(db,'inspections',sid),upd);
}
async function completeSession(sid,needsApproval){
  await updateDoc(doc(db,'inspections',sid),{
    status:needsApproval?'waiting_approval':'approved',
    completedAt:serverTimestamp(),updatedAt:serverTimestamp()
  });
}
async function doApprove(sid,name){
  await updateDoc(doc(db,'inspections',sid),{
    status:'approved',approvedAt:serverTimestamp(),approvedBy:name,updatedAt:serverTimestamp()
  });
  await addDoc(collection(db,'approvals'),{inspectionId:sid,action:'approved',approverName:name,createdAt:serverTimestamp()});
}
async function doReject(sid,name,reason){
  await updateDoc(doc(db,'inspections',sid),{
    status:'rejected',rejectedReason:reason,updatedAt:serverTimestamp()
  });
  await addDoc(collection(db,'approvals'),{inspectionId:sid,action:'rejected',approverName:name,reason,createdAt:serverTimestamp()});
}
async function saveAnomaly({sid,iid,label,comment,photoUrl,equip}){
  await addDoc(collection(db,'anomalies'),{
    inspectionId:sid,itemId:iid,itemLabel:label,
    comment,photoUrl:photoUrl||'',equipmentName:equip,
    status:'open',createdAt:serverTimestamp(),updatedAt:serverTimestamp()
  });
}
async function updateAnom(aid,status,note=''){
  await updateDoc(doc(db,'anomalies',aid),{status,note,updatedAt:serverTimestamp()});
}
async function uploadPhoto(file,path){
  const r=ref(storage,path);
  await uploadBytes(r,file);
  return getDownloadURL(r);
}

// ─── State ───────────────────────────────────────────────────
let state={
  tab:'dashboard',
  inspections:[],
  anomalies:[],
  executing:null,
  showSelector:false,
  histDetail:null,
  aprvDetail:null,
  anomFilter:'all',
  histFilter:'all',
  anomEditId:null,
  nameDialog:!localStorage.getItem('inspName'),
};

// ─── Subscriptions ───────────────────────────────────────────
onSnapshot(query(collection(db,'inspections'),orderBy('createdAt','desc')),snap=>{
  state.inspections=snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});
onSnapshot(query(collection(db,'anomalies'),orderBy('createdAt','desc')),snap=>{
  state.anomalies=snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

// ─── Render ──────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  if(state.executing)  { root.innerHTML=execScreen();     bindExec();     return; }
  if(state.histDetail) { root.innerHTML=histDetailScreen();bindHistDetail();return; }
  if(state.aprvDetail) { root.innerHTML=aprvDetailScreen();bindAprvDetail();return; }

  root.innerHTML =
    mainScreen() +
    navHTML() +
    (state.showSelector ? selectorHTML() : '') +
    (state.nameDialog   ? nameDialogHTML() : '');

  bindMain();
  bindNav();
  if(state.showSelector) bindSelector();
  if(state.nameDialog)   bindNameDialog();
}

// ─── Nav ─────────────────────────────────────────────────────
function navHTML(){
  const tabs=[
    {id:'dashboard',label:'ホーム',  icon:'🏠'},
    {id:'execute',  label:'点検',    icon:'✅'},
    {id:'history',  label:'履歴',    icon:'📋'},
    {id:'anomalies',label:'異常',    icon:'⚠️'},
    {id:'approval', label:'承認',    icon:'🔐'},
  ];
  const anomBadge=state.anomalies.filter(a=>a.status==='open').length;
  const aprvBadge=state.inspections.filter(i=>i.status==='waiting_approval'&&i.typeId!=='daily').length;
  return `<div id="nav">${tabs.map(t=>{
    const active=state.tab===t.id;
    const badge=t.id==='anomalies'?anomBadge:t.id==='approval'?aprvBadge:0;
    return `<button class="nav-tab${active?' active':''}" data-tab="${t.id}">
      <div class="nav-icon">${t.icon}${badge>0?`<span class="nav-badge">${badge}</span>`:''}</div>
      <div class="nav-label">${t.label}</div>
    </button>`;
  }).join('')}</div>`;
}
function bindNav(){
  document.querySelectorAll('.nav-tab').forEach(b=>{
    b.addEventListener('click',()=>{
      haptic('light');
      const t=b.dataset.tab;
      if(t==='execute'){ state.showSelector=true; render(); return; }
      state.tab=t; render();
    });
  });
}

// ─── Main ────────────────────────────────────────────────────
function mainScreen(){
  if(state.tab==='dashboard') return dashHTML();
  if(state.tab==='history')   return histHTML();
  if(state.tab==='anomalies') return anomHTML();
  if(state.tab==='approval')  return aprvHTML();
  return '';
}
function bindMain(){
  if(state.tab==='dashboard') bindDash();
  if(state.tab==='history')   bindHist();
  if(state.tab==='anomalies') bindAnom();
  if(state.tab==='approval')  bindAprv();
}

// ─── Dashboard ───────────────────────────────────────────────
function dashHTML(){
  const ins=state.inspections;
  const done=ins.filter(i=>i.status==='approved').length;
  const rej=ins.filter(i=>i.status==='rejected').length;
  const pending=ins.filter(i=>i.status==='in_progress').length;
  const today=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  const name=localStorage.getItem('inspName')||'';

  const typeCards=TYPES.map(t=>{
    const rel=ins.filter(i=>i.typeId===t.id);
    const st=rel.length?rel[0].status:'not_done';
    const m=STATUS_META[st]||STATUS_META.not_done;
    return `<div class="g-row" data-start="${t.id}" style="cursor:pointer;">
      <div class="type-icon" style="background:${t.color}18">${t.icon}</div>
      <div class="type-info">
        <div class="type-name">${t.label}</div>
        <div class="type-sub">${t.needsApproval?'管理者承認あり':'承認不要'}</div>
      </div>
      <span class="badge ${m.cls}" style="margin-right:8px">${m.icon} ${m.label}</span>
      <svg class="chevron-icon" width="7" height="12" viewBox="0 0 7 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,1 6,6 1,11"/></svg>
    </div>`;
  }).join('');

  const recentCards=ins.slice(0,3).map(i=>{
    const m=STATUS_META[i.status]||STATUS_META.not_done;
    const d=i.createdAt?.toDate?.()?.toLocaleDateString('ja-JP')||'—';
    return `<div class="recent-row" data-hist="${i.id}">
      <div style="flex:1;min-width:0">
        <div style="font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${i.typeLabel} — ${i.equipmentName||'—'}</div>
        <div style="font-size:12px;color:var(--gray1);margin-top:2px">${d} · ${i.inspectorName||'—'}</div>
      </div>
      <span class="badge ${m.cls}" style="margin-left:8px;flex-shrink:0">${m.label}</span>
    </div>`;
  }).join('');

  return `<div class="page">
    <div class="lt-header">
      <div style="font-size:15px;color:var(--gray1);font-weight:400">${today}</div>
      <div class="lt-title">日常点検</div>
      <div style="font-size:15px;color:var(--t2);font-weight:500;margin-bottom:18px">
        ${name
          ?`おはようございます、<strong>${name}</strong> さん <button id="editName" class="name-edit-btn">✏️</button>`
          :`<button id="editName" class="name-set-btn">名前を設定する →</button>`}
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-tile"><div class="stat-num">${ins.length}</div><div class="stat-lbl">総点検数</div></div>
      <div class="stat-tile"><div class="stat-num" style="color:var(--green)">${done}</div><div class="stat-lbl">完了</div></div>
      <div class="stat-tile"><div class="stat-num" style="color:var(--orange)">${pending}</div><div class="stat-lbl">実施中</div></div>
      <div class="stat-tile"><div class="stat-num" style="color:var(--red)">${rej}</div><div class="stat-lbl">差し戻し</div></div>
    </div>

    <div class="sec-lbl">点検種別</div>
    <div class="g-card" style="margin:0 20px">${typeCards}</div>

    ${ins.length?`
    <div class="sec-lbl">最近の点検</div>
    <div class="g-card" style="margin:0 20px">${recentCards}</div>
    `:''}
    <div style="height:16px"></div>
  </div>`;
}
function bindDash(){
  document.getElementById('editName')?.addEventListener('click',()=>{ haptic('light'); state.nameDialog=true; render(); });
  document.querySelectorAll('[data-start]').forEach(el=>{
    el.addEventListener('click',()=>{
      haptic('light');
      const t=TYPES.find(x=>x.id===el.dataset.start);
      if(t){ state.showSelector=true; state._preType=t; render(); }
    });
  });
  document.querySelectorAll('[data-hist]').forEach(el=>{
    el.addEventListener('click',()=>{
      haptic('light');
      const ins=state.inspections.find(i=>i.id===el.dataset.hist);
      if(ins){ state.histDetail=ins; state.tab='history'; render(); }
    });
  });
}

// ─── History ─────────────────────────────────────────────────
function histHTML(){
  const filt=state.histFilter;
  const list=filt==='all'?state.inspections:state.inspections.filter(i=>i.status===filt);
  const filters=[['all','すべて'],['approved','完了'],['waiting_approval','承認待ち'],['in_progress','実施中'],['rejected','差し戻し']];

  const cards=list.map((ins,idx)=>{
    const m=STATUS_META[ins.status]||STATUS_META.not_done;
    const d=ins.createdAt?.toDate?.()?.toLocaleDateString('ja-JP')||'—';
    const res=ins.results||{};
    const ok=Object.values(res).filter(r=>r.status==='ok').length;
    const ng=Object.values(res).filter(r=>r.status==='ng').length;
    return `<div class="list-card fade-up" style="animation-delay:${idx*.04}s" data-hid="${ins.id}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px">
        <div style="flex:1;min-width:0">
          <div style="font-size:16px;font-weight:600">${ins.typeLabel} — ${ins.equipmentName||'—'}</div>
          <div style="font-size:12px;color:var(--gray1);margin-top:2px">${d} · ${ins.inspectorName||'—'}</div>
        </div>
        <span class="badge ${m.cls}">${m.label}</span>
      </div>
      <div style="display:flex;gap:12px;font-size:13px;font-weight:600">
        <span style="color:var(--green)">〇 ${ok}</span>
        <span style="color:var(--red)">✕ ${ng}</span>
        <span style="color:var(--gray1);font-weight:400">/ ${Object.keys(res).length}項目</span>
      </div>
      ${ins.status==='rejected'&&ins.rejectedReason?`<div style="margin-top:8px;font-size:12px;color:#C0160D;background:var(--red-bg);padding:7px 10px;border-radius:8px">差し戻し理由：${ins.rejectedReason}</div>`:''}
    </div>`;
  }).join('');

  return `<div class="page">
    <div class="lt-header">
      <div class="lt-title">点検履歴</div>
      <div class="lt-date">${state.inspections.length}件</div>
    </div>
    <div class="filter-row">
      ${filters.map(([v,l])=>`<button class="filter-pill${filt===v?' active':''}" data-hf="${v}">${l}</button>`).join('')}
    </div>
    ${list.length===0?`<div class="empty"><span class="ei">📋</span><p>履歴がありません</p></div>`:cards}
  </div>`;
}
function bindHist(){
  document.querySelectorAll('[data-hf]').forEach(b=>{
    b.addEventListener('click',()=>{ haptic('light'); state.histFilter=b.dataset.hf; render(); });
  });
  document.querySelectorAll('[data-hid]').forEach(el=>{
    el.addEventListener('click',()=>{
      haptic('light');
      const ins=state.inspections.find(i=>i.id===el.dataset.hid);
      if(ins){ state.histDetail=ins; render(); }
    });
  });
}

// ─── History Detail ──────────────────────────────────────────
function histDetailScreen(){
  const ins=state.histDetail;
  const items=ITEMS[ins.typeId]||[];
  const res=ins.results||{};
  const cats=[...new Set(items.map(i=>i.cat))];
  const d=ins.createdAt?.toDate?.()?.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'})||'—';
  const infoRows=[
    ['設備',ins.equipmentName],['点検者',ins.inspectorName],['日付',d],
    ...(ins.approvedBy?[['承認者',ins.approvedBy]]:[])
  ].map(([k,v])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:.5px solid var(--sep)">
    <span style="font-size:14px;color:var(--gray1);font-weight:500">${k}</span>
    <span style="font-size:15px;font-weight:600">${v||'—'}</span>
  </div>`).join('');

  const catSec=cats.map(cat=>`
    <div class="sec-lbl">${cat}</div>
    ${items.filter(i=>i.cat===cat).map(item=>{
      const r=res[item.id]||{};
      const isNg=r.status==='ng',isOk=r.status==='ok';
      return `<div class="detail-item${isNg?' ng-item':''}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:15px;font-weight:600">${item.label}</span>
          <span style="font-size:20px;font-weight:700;color:${isOk?'var(--green)':isNg?'var(--red)':'var(--gray3)'}">${isOk?'〇':isNg?'✕':'—'}</span>
        </div>
        ${isNg&&r.comment?`<div style="margin-top:8px;font-size:13px;color:#3C3C43;background:rgba(255,255,255,.7);padding:8px 10px;border-radius:8px;line-height:1.6">${r.comment}</div>`:''}
        ${isNg&&r.photoUrl?`<img src="${r.photoUrl}" style="width:100%;max-height:180px;object-fit:cover;border-radius:10px;margin-top:8px"/>`:''}
      </div>`;
    }).join('')}
  `).join('');

  return `<div style="display:flex;flex-direction:column;height:100%;background:var(--bg)">
    <div class="nav-header">
      <button class="back-btn" id="backHist"><svg viewBox="0 0 7 12"><polyline points="6,1 1,6 6,11"/></svg> 一覧へ</button>
      <div class="nh-title">${ins.typeLabel}</div>
      <div style="width:60px"></div>
    </div>
    <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch">
      <div class="p-card" style="margin:16px 20px">${infoRows}</div>
      ${catSec}
      <div style="height:40px"></div>
    </div>
  </div>`;
}
function bindHistDetail(){
  document.getElementById('backHist').addEventListener('click',()=>{ haptic('light'); state.histDetail=null; render(); });
}

// ─── Anomalies ───────────────────────────────────────────────
function anomHTML(){
  const filt=state.anomFilter;
  const list=filt==='all'?state.anomalies:state.anomalies.filter(a=>a.status===filt);
  const open=state.anomalies.filter(a=>a.status==='open').length;
  const inp=state.anomalies.filter(a=>a.status==='in_progress').length;
  const done=state.anomalies.filter(a=>a.status==='done').length;
  const filters=[['all','すべて'],['open','未対応'],['in_progress','対応中'],['done','完了']];

  const cards=list.map((a,idx)=>{
    const m=ANOM_META[a.status]||ANOM_META.open;
    const d=a.createdAt?.toDate?.()?.toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit'})||'—';
    const t=a.createdAt?.toDate?.()?.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})||'';
    return `<div class="list-card fade-up" style="border-left:3.5px solid ${m.color};animation-delay:${idx*.04}s">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px">
        <div style="flex:1;min-width:0">
          <div style="font-size:16px;font-weight:600">${a.itemLabel}</div>
          <div style="font-size:12px;color:var(--gray1);margin-top:2px">${a.equipmentName} · ${d} ${t}</div>
        </div>
        <span class="badge ${m.cls}">${m.label}</span>
      </div>
      ${a.comment?`<div style="font-size:13px;color:var(--t2);background:var(--bg);padding:9px 12px;border-radius:9px;line-height:1.6;margin-bottom:10px">${a.comment}</div>`:''}
      ${a.photoUrl?`<img src="${a.photoUrl}" style="width:100%;max-height:180px;object-fit:cover;border-radius:10px;margin-bottom:10px"/>`:''}
      ${a.note?`<div style="font-size:13px;color:var(--t2);background:#EFF6FF;padding:9px 12px;border-radius:9px;margin-bottom:10px"><strong>対応メモ：</strong>${a.note}</div>`:''}
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:2px">
        ${a.status!=='in_progress'?`<button style="padding:6px 14px;border-radius:99px;border:1.5px solid var(--orange);background:transparent;font-size:12px;font-weight:600;cursor:pointer;color:var(--orange);font-family:var(--f);touch-action:manipulation" data-aset="${a.id}" data-st="in_progress">対応中にする</button>`:''}
        ${a.status!=='done'?`<button style="padding:6px 14px;border-radius:99px;border:1.5px solid var(--green);background:transparent;font-size:12px;font-weight:600;cursor:pointer;color:var(--green);font-family:var(--f);touch-action:manipulation" data-aset="${a.id}" data-st="done">完了にする</button>`:''}
        <button style="padding:6px 14px;border-radius:99px;border:1.5px solid var(--gray3);background:transparent;font-size:12px;font-weight:600;cursor:pointer;color:var(--gray1);font-family:var(--f);touch-action:manipulation" data-aedit="${a.id}">メモ編集</button>
      </div>
    </div>`;
  }).join('');

  const editId=state.anomEditId;
  const editAnom=editId?state.anomalies.find(a=>a.id===editId):null;
  const editSheet=editAnom?`
    <div class="overlay" id="anomOverlay">
      <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-header">異常ステータス更新</div>
        <div style="padding:16px 20px">
          <div style="font-size:12px;font-weight:600;color:var(--gray1);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">ステータス</div>
          <div style="display:flex;gap:8px;margin-bottom:20px">
            ${['open','in_progress','done'].map(s=>{
              const m=ANOM_META[s];
              const act=state._editAnomSt===s;
              return `<button style="flex:1;padding:10px 4px;border-radius:12px;border:1.5px solid ${act?m.color:'var(--gray4)'};background:${act?m.color+'18':'var(--bg)'};font-size:13px;font-weight:600;cursor:pointer;color:${act?m.color:'var(--gray1)'};font-family:var(--f);transition:all .2s;touch-action:manipulation" data-ast="${s}">${m.label}</button>`;
            }).join('')}
          </div>
          <div style="font-size:12px;font-weight:600;color:var(--gray1);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">対応メモ</div>
          <textarea class="inp" id="anomNote" placeholder="対応内容を入力..." rows="4" style="margin-bottom:20px">${state._editAnomNote||''}</textarea>
          <div style="display:flex;gap:10px">
            <button class="btn btn-ghost" id="anomCancel" style="flex:1;height:50px;border-radius:14px;font-size:16px">キャンセル</button>
            <button class="btn btn-blue" id="anomSave" style="flex:1;height:50px;border-radius:14px;font-size:16px">保存する</button>
          </div>
        </div>
      </div>
    </div>`:'';

  return `<div class="page">
    <div class="lt-header">
      <div class="lt-title">異常管理</div>
      <div class="lt-date">${state.anomalies.length}件</div>
    </div>
    <div class="stats-grid">
      <div class="stat-tile"><div class="stat-num" style="color:var(--red)">${open}</div><div class="stat-lbl">未対応</div></div>
      <div class="stat-tile"><div class="stat-num" style="color:var(--orange)">${inp}</div><div class="stat-lbl">対応中</div></div>
      <div class="stat-tile"><div class="stat-num" style="color:var(--green)">${done}</div><div class="stat-lbl">完了</div></div>
    </div>
    <div class="filter-row">
      ${filters.map(([v,l])=>`<button class="filter-pill${filt===v?' active':''}" data-af="${v}">${l}</button>`).join('')}
    </div>
    ${list.length===0?`<div class="empty"><span class="ei">✅</span><p>異常はありません</p></div>`:cards}
  </div>${editSheet}`;
}
function bindAnom(){
  document.querySelectorAll('[data-af]').forEach(b=>{
    b.addEventListener('click',()=>{ haptic('light'); state.anomFilter=b.dataset.af; render(); });
  });
  document.querySelectorAll('[data-aset]').forEach(b=>{
    b.addEventListener('click',async()=>{ haptic('medium'); await updateAnom(b.dataset.aset,b.dataset.st,''); });
  });
  document.querySelectorAll('[data-aedit]').forEach(b=>{
    b.addEventListener('click',()=>{
      haptic('light');
      const a=state.anomalies.find(x=>x.id===b.dataset.aedit);
      state.anomEditId=b.dataset.aedit;

// ─── Execution ───────────────────────────────────────────────
let _sid=null, _results={}, _expandedId=null, _bulkConfirm=false, _completeDialog=false, _uploading={};

async function startExec(type,equip){
  const items=ITEMS[type.id]||[];
  _results={};
  items.forEach(i=>{ _results[i.id]={status:'pending',comment:'',photoUrl:''}; });
  _expandedId=null; _bulkConfirm=false; _completeDialog=false; _uploading={};
  state.executing={type,equip};
  render();
  _sid=await createSession(type,equip);
}

function execScreen(){
  const type=state.executing.type;
  const items=ITEMS[type.id]||[];
  const pending=items.filter(i=>_results[i.id]?.status==='pending').map(i=>i.id);
  const ngCount=items.filter(i=>_results[i.id]?.status==='ng').length;
  const okCount=items.filter(i=>_results[i.id]?.status==='ok').length;
  const allDone=pending.length===0;
  const cats=[...new Set(items.map(i=>i.cat))];

  const catSec=cats.map(cat=>`
    <div class="sec-lbl">${cat}</div>
    ${items.filter(i=>i.cat===cat).map(item=>{
      const r=_results[item.id]||{};
      const isOk=r.status==='ok', isNg=r.status==='ng';
      const up=_uploading[item.id];
      return `<div class="item-card${isOk?' is-ok':isNg?' is-ng':''}" id="ic_${item.id}">
        <span class="swipe-hint-r">〇</span>
        <span class="swipe-hint-l">✕</span>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
          <div class="item-label">${item.label}</div>
          <div style="display:flex;gap:8px;flex-shrink:0">
            <button class="choice-btn${isOk?' ok':''}" data-tok="${item.id}">〇</button>
            <button class="choice-btn${isNg?' ng':''}" data-tng="${item.id}">✕</button>
          </div>
        </div>
        ${isNg?`<div class="expand-area">
          <label class="expand-lbl">コメント（必須）</label>
          <textarea class="inp" data-comment="${item.id}" placeholder="異常の内容を入力してください" rows="3">${r.comment||''}</textarea>
          <label class="expand-lbl" style="margin-top:12px">写真（必須）</label>
          ${r.photoUrl
            ?`<div class="photo-preview"><img src="${r.photoUrl}"/><button class="photo-change" data-rephoto="${item.id}">変更</button></div>`
            :`<button class="photo-btn" data-photo="${item.id}">${up?'⏳ アップロード中...':'📷 写真を追加'}</button>`}
          <input type="file" accept="image/*" capture="environment" id="fi_${item.id}" style="display:none"/>
        </div>`:''}
      </div>`;
    }).join('')}
  `).join('');

  const bulkSheet=_bulkConfirm?`
    <div class="overlay overlay-center" id="bulkOverlay">
      <div class="modal-card">
        <div style="font-size:36px;text-align:center;margin-bottom:8px">〇</div>
        <div class="modal-title">一括〇に設定</div>
        <p class="modal-body">未入力の <strong>${pending.length}件</strong> をすべて〇（正常）に設定します。<br/>✕（異常）の項目は変更されません。</p>
        <div style="display:flex;gap:10px">
          <button class="btn btn-ghost" id="bulkCancel" style="flex:1;height:50px;border-radius:14px;font-size:16px">キャンセル</button>
          <button class="btn btn-blue" id="bulkOk" style="flex:1;height:50px;border-radius:14px;font-size:16px">実行する</button>
        </div>
      </div>
    </div>`:'';

  const completeDlg=_completeDialog?`
    <div class="overlay overlay-center">
      <div class="modal-card" style="text-align:center">
        <div style="font-size:56px;margin-bottom:12px">🎉</div>
        <div class="modal-title" style="font-size:20px">点検完了！</div>
        <p class="modal-body">${type.needsApproval?'管理者の承認をお待ちください。':'データが正常に保存されました。'}</p>
        <button class="btn btn-blue" id="backToDash" style="width:100%;height:52px;border-radius:14px;font-size:17px">ダッシュボードへ</button>
      </div>
    </div>`:'';

  return `<div style="display:flex;flex-direction:column;height:100%;background:var(--bg)">
    <div class="nav-header">
      <button class="back-btn" id="execBack"><svg viewBox="0 0 7 12"><polyline points="6,1 1,6 6,11"/></svg> 戻る</button>
      <div class="nh-title">${type.label}</div>
      <div style="width:60px"></div>
    </div>
    <div class="cbar">
      <div>${pending.length>0
        ?`<span class="pending-pill">未入力 ${pending.length}件</span>`
        :`<span class="done-pill">✓ すべて入力済み</span>`}</div>
      <div style="font-size:14px;font-weight:700">
        <span style="color:var(--green)">〇 ${okCount}</span>
        <span style="color:var(--red);margin-left:10px">✕ ${ngCount}</span>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:4px">
      ${catSec}
      ${allDone?`<div style="padding:4px 20px 16px"><button class="btn btn-green" id="doComplete" style="width:100%;height:56px;font-size:17px;border-radius:18px">✓ 点検完了・${type.needsApproval?'承認申請':'登録'}</button></div>`:''}
      <div style="height:${pending.length>0?'90px':'32px'}"></div>
    </div>
    ${pending.length>0?`<div class="fab-wrap">
      <button class="fab-bulk" id="showBulk">
        <span style="font-size:18px">〇</span> 未入力をすべて〇にする（${pending.length}件）
      </button>
    </div>`:''}
    ${bulkSheet}${completeDlg}
  </div>`;
}

function bindExec(){
  document.getElementById('execBack')?.addEventListener('click',()=>{ haptic('light'); state.executing=null; render(); });
  document.getElementById('showBulk')?.addEventListener('click',()=>{ haptic('medium'); _bulkConfirm=true; render(); });
  document.getElementById('bulkCancel')?.addEventListener('click',()=>{ haptic('light'); _bulkConfirm=false; render(); });
  document.getElementById('bulkOverlay')?.addEventListener('click',e=>{ if(e.target===e.currentTarget){_bulkConfirm=false;render();} });
  document.getElementById('bulkOk')?.addEventListener('click',async()=>{
    haptic('success'); _bulkConfirm=false;
    const items=ITEMS[state.executing.type.id]||[];
    const pend=items.filter(i=>_results[i.id]?.status==='pending').map(i=>i.id);
    pend.forEach(id=>{ _results[id]={..._results[id],status:'ok'}; });
    render();
    pend.forEach((id,i)=>{
      setTimeout(()=>{
        const el=document.getElementById('ic_'+id);
        if(el){ el.classList.add('hl-green'); setTimeout(()=>el.classList.remove('hl-green'),1200); }
      },i*40);
    });
    if(_sid) await bulkOk(_sid,pend);
  });
  document.getElementById('doComplete')?.addEventListener('click',async()=>{
    haptic('success');
    const type=state.executing.type;
    const newStatus=type.needsApproval?'waiting_approval':'approved';

    // ── 楽観的ローカル更新（Firestore応答を待たずに即反映）──
    if(_sid){
      const idx=state.inspections.findIndex(i=>i.id===_sid);
      if(idx!==-1){
        state.inspections[idx]={
          ...state.inspections[idx],
          status:newStatus,
          results:Object.fromEntries(
            Object.entries(_results).map(([k,v])=>[k,{...v}])
          ),
          completedAt:{toDate:()=>new Date()}
        };
      } else {
        // まだリストにない場合は先頭に追加
        state.inspections.unshift({
          id:_sid,
          typeId:type.id, typeLabel:type.label,
          equipmentName:state.executing.equip,
          inspectorName:localStorage.getItem('inspName')||'未設定',
          status:newStatus,
          results:Object.fromEntries(Object.entries(_results).map(([k,v])=>[k,{...v}])),
          createdAt:{toDate:()=>new Date()},
          completedAt:{toDate:()=>new Date()}
        });
      }
    }

    _completeDialog=true; render();

    // ── Firestore保存（バックグラウンド）──
    if(_sid){
      try{
        const items=ITEMS[type.id]||[];
        const ngItems=items.filter(i=>_results[i.id]?.status==='ng');
        for(const item of ngItems){
          const r=_results[item.id];
          if(r&&!r.photoUrl) await saveAnomaly({sid:_sid,iid:item.id,label:item.label,comment:r.comment||'',photoUrl:'',equip:state.executing.equip});
        }
        await completeSession(_sid,type.needsApproval);
      }catch(e){ console.warn('Firestore complete error:',e); }
    }
  });
  document.getElementById('backToDash')?.addEventListener('click',()=>{
    haptic('light');
    _sid=null; _results={}; _expandedId=null;
    _bulkConfirm=false; _completeDialog=false; _uploading={};
    state.executing=null; state.tab='dashboard'; render();
  });

  // 〇 / ✕ buttons
  document.querySelectorAll('[data-tok]').forEach(b=>{
    b.addEventListener('click',async()=>{
      haptic('light');
      const id=b.dataset.tok;
      const cur=_results[id]?.status;
      const st=cur==='ok'?'pending':'ok';
      _results[id]={..._results[id],status:st};
      if(_expandedId===id) _expandedId=null;
      b.classList.add('pop'); setTimeout(()=>b.classList.remove('pop'),300);
      render();
      if(_sid) await saveItem(_sid,id,_results[id]);
    });
  });
  document.querySelectorAll('[data-tng]').forEach(b=>{
    b.addEventListener('click',async()=>{
      const id=b.dataset.tng;
      const cur=_results[id]?.status;
      const st=cur==='ng'?'pending':'ng';
      _results[id]={..._results[id],status:st};
      _expandedId=(st==='ng')?id:(_expandedId===id?null:_expandedId);
      if(st==='ng'){
        haptic('error');
        const card=document.getElementById('ic_'+id);
        card?.classList.add('shake'); setTimeout(()=>card?.classList.remove('shake'),350);
      } else {
        haptic('light');
      }
      render();
      if(_sid) await saveItem(_sid,id,_results[id]);
    });
  });

  // Swipe gestures on item cards
  document.querySelectorAll('.item-card').forEach(card=>{
    let sx=0, sy=0, moved=false;
    const id=card.id.replace('ic_','');
    card.addEventListener('touchstart',e=>{
      sx=e.touches[0].clientX; sy=e.touches[0].clientY; moved=false;
    },{passive:true});
    card.addEventListener('touchmove',e=>{
      const dx=e.touches[0].clientX-sx;
      const dy=e.touches[0].clientY-sy;
      if(Math.abs(dx)>Math.abs(dy)){
        moved=true;
        card.classList.remove('sw-right','sw-left');
        if(dx>30) card.classList.add('sw-right');
        else if(dx<-30) card.classList.add('sw-left');
      }
    },{passive:true});
    card.addEventListener('touchend',e=>{
      const dx=e.changedTouches[0].clientX-sx;
      card.classList.remove('sw-right','sw-left');
      if(!moved) return;
      if(dx>60){
        // swipe right → OK
        haptic('light');
        _results[id]={..._results[id],status:'ok'};
        render();
        if(_sid) saveItem(_sid,id,_results[id]);
      } else if(dx<-60){
        // swipe left → NG
        haptic('error');
        _results[id]={..._results[id],status:'ng'};
        _expandedId=id;
        const card2=document.getElementById('ic_'+id);
        card2?.classList.add('shake'); setTimeout(()=>card2?.classList.remove('shake'),350);
        render();
        if(_sid) saveItem(_sid,id,_results[id]);
      }
    },{passive:true});
  });

  // Comments
  document.querySelectorAll('[data-comment]').forEach(ta=>{
    ta.addEventListener('change',async()=>{
      const id=ta.dataset.comment;
      _results[id]={..._results[id],comment:ta.value};
      if(_sid) await saveItem(_sid,id,_results[id]);
    });
  });

  // Photos
  document.querySelectorAll('[data-photo]').forEach(b=>{
    b.addEventListener('click',()=>{ document.getElementById('fi_'+b.dataset.photo)?.click(); });
  });
  document.querySelectorAll('[data-rephoto]').forEach(b=>{
    b.addEventListener('click',()=>{ document.getElementById('fi_'+b.dataset.rephoto)?.click(); });
  });
  document.querySelectorAll('input[type=file]').forEach(inp=>{
    inp.addEventListener('change',async()=>{
      const file=inp.files[0]; if(!file) return;
      const id=inp.id.replace('fi_','');
      _uploading[id]=true; render();
      try{
        const path=`inspections/${_sid||'tmp'}/${id}_${Date.now()}.jpg`;
        const url=await uploadPhoto(file,path);
        _results[id]={..._results[id],photoUrl:url};
        if(_sid){
          await saveItem(_sid,id,_results[id]);
          await saveAnomaly({sid:_sid,iid:id,label:ITEMS[state.executing.type.id]?.find(x=>x.id===id)?.label||'',comment:_results[id].comment||'',photoUrl:url,equip:state.executing.equip});
        }
      }finally{ _uploading[id]=false; render(); }
    });
  });
}

// ─── Name Dialog ─────────────────────────────────────────────
function nameDialogHTML(){
  return `<div class="overlay overlay-center" id="nameOverlay">
    <div class="modal-card">
      <div style="font-size:32px;text-align:center;margin-bottom:8px">👤</div>
      <div class="modal-title">点検者名を入力</div>
      <p class="modal-body" style="margin-bottom:16px">お名前を入力してください</p>
      <input class="inp" id="nameInp" placeholder="例：山田 太郎" value="${localStorage.getItem('inspName')||''}" style="margin-bottom:14px"/>
      <button class="btn btn-blue" id="saveName" style="width:100%;height:50px;border-radius:14px;font-size:16px">保存する</button>
    </div>
  </div>`;
}
function bindNameDialog(){
  document.getElementById('saveName').addEventListener('click',()=>{
    const v=document.getElementById('nameInp').value.trim();
    if(v){ haptic('success'); localStorage.setItem('inspName',v); }
    state.nameDialog=false; render();
  });
  document.getElementById('nameInp').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('saveName').click(); });
}

// ─── Boot ────────────────────────────────────────────────────
render();
</script>
